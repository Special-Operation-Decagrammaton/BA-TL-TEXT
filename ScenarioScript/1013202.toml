[translation]
1013202-1 = "Modeling once again...!"
1013202-2 = "Fashion Show Venue - Backstage"
1013202-4 = "(I thought she had quit modeling... I was worried about Tsukuyo, so I asked to visit the site.)"
1013202-5 = "Ah, Sensei...!#nOver here!"
1013202-6 = "Did you have any trouble finding your way?"
1013202-7 = "[s] \"A staff member guided me here.\""
1013202-8 = "Oh, that's a relief..."
1013202-9 = "Actually, I told them in advance."
1013202-10 = "I told them that a very important person would be coming, so please take good care of you..."
1013202-11 = "[s] \"A very important person!?\""
1013202-12 = "Hehe...#nIt feels a bit strange, talking like this backstage."
1013202-13 = "Like we're meeting in secret..."
1013202-14 = "[s1] \"I suppose so.\"\n[s2] \"By the way, is the show preparation going well?\""
1013202-17 = "Yes.#nThe costume fitting is done, so... I was just rehearsing."
1013202-18 = "I'm wearing the shoes for the actual show right now... trying to get used to the heel height."
1013202-19 = "[s] \"As expected of a pro!\""
1013202-23 = "O-oh, no...!"
1013202-24 = "There are so many other pros here with much more experience than me...!"
1013202-25 = "Besides, I decided that this would be my last modeling job..."
1013202-26 = "Ah... S-Sensei, what do you think?"
1013202-32 = "Do I look okay in this dress...?"
1013202-33 = "[s3] \"It suits you!\"\n[s4] \"It's a very 'Tsukuyo' look!\""
1013202-36 = "F-feeeh..."
1013202-37 = "P-please don't praise me so much..."
1013202-38 = "But... I'm really happy to hear you say that.#nHehe..."
1013202-39 = "[s] \"By the way, why did you decide to model again?\""
1013202-40 = "Actually, a few days ago, I received an offer from Shine Cat Agency."
1013202-41 = "I tried to turn it down at first, but..."
1013202-42 = "When I heard the details, they said it would only be for one day..."
1013202-43 = "And above all, well..."
1013202-45 = "The organizer... offered me a certain condition."
1013202-46 = "[s] \"A certain condition...?\""
1013202-47 = "...Yes."
1013202-48 = "I mean, I had already quit modeling once..."
1013202-49 = "I was a little hesitant, but..."
1013202-50 = "I decided that if that was the condition... I would accept it."
1013202-51 = "[s] \"...What kind of condition is it?\""
1013202-52 = "It is—"
1013202-56 = "Ten minutes until the show starts, please stand by."
1013202-57 = "Ah, I'll tell you the rest later..."
1013202-58 = "Well then, I'm off... Sensei!"
1013202-64 = "(I had a bad feeling about this...)"
1013202-65 = "(I decided to watch over Tsukuyo from as close as possible.)"
1013202-67 = "Fashion Show Event Venue"
1013202-69 = "(After waiting for a while, the show began.)"
1013202-85 = "(Tsukuyo performed her modeling job perfectly...)"
1013202-86 = "(The show proceeded without any issues.)"
1013202-92 = "Fashion Show Venue - Outside"
1013202-93 = "(After it ended, I met up with Tsukuyo outside the venue.)"
1013202-97 = "Sensei!"
1013202-98 = "I'm sorry, I'm late...!"
1013202-99 = "[s] \"No worries, you did great.\""
1013202-100 = "Hehe..."
1013202-101 = "...I'm glad."
1013202-102 = "It ended safely, so let's head ho—"
1013202-104 = "Hey, hey, hold on a second."
1013202-108 = "Eh...?"
1013202-109 = "You weren't planning on just leaving like that, were you, Tsukuyo-san?"
1013202-110 = "...?"
1013202-111 = "...What about that condition?"
1013202-112 = "Don't tell me you forgot?"
1013202-113 = "Ah!#nI was in such a rush, I just..."
1013202-114 = "[s] \"Wait, that condition is...!\""
1013202-118 = "...Heh, so you know about it too?"
1013202-119 = "Then there's no need to be secretive..."
1013202-120 = "Yes, that condition is—"
1013202-124 = "Handing over the preview pamphlet for Director 'Shiba Inu Wanzou's' 13th film, 'Ninjas Live Seven Times'!"
1013202-125 = "[s] \"............Eh?\""
1013202-126 = "'Ninjas Live Seven Times'... It's quite a masterpiece, but because the preview was extremely small-scale, the pamphlet is now nearly impossible to get."
1013202-127 = "But!#nBelieve it or not, the organizer of that preview was our company!"
1013202-128 = "I used my authority as president to retrieve the pamphlet from the company warehouse, and Tsukuyo-san agreed to the contract on the condition that I give her this in addition to her regular pay...!"
1013202-129 = "[s] \"That's what it was!?\""
1013202-131 = "Yes! It's a very rare pamphlet...!#nIf I display it in the clubroom, I think the Club President and Izuna-chan will be so happy!"
1013202-132 = "Phew... I accepted the modeling job for this, and I almost..."
1013202-133 = "I almost went home without it... Hehe."
1013202-134 = "By the way, Tsukuyo-san."
1013202-135 = "Since this is fate, why don't you consider returning to the industry?"
1013202-136 = "...Excuse me?"
1013202-137 = "Actually, I had a chance to talk with Shine Cat at a fashion conference the other day."
1013202-138 = "They seem to still have a soft spot for you. They were happy you accepted this time. Why don't you think about it?"
1013202-139 = "O-oh, no..."
1013202-140 = "T-that's a very kind offer, but..."
1013202-144 = "Honestly, I'm scared to go back to those days..."
1013202-145 = "The hellish training... the diet restrictions... the tension of walking under the lights..."
1013202-146 = "Well, high-fashion modeling isn't a field you can survive on talent alone..."
1013202-147 = "My bad. I said too much."
1013202-148 = "N-no! Thank you for being so considerate!"
1013202-149 = "Alright, I've handed it over, so I'll be going. You did a great job, thanks!"
1013202-153 = "I-I feel kind of bad..."
1013202-158 = "Ah, w-well... actually, I've been on a diet for a few days, so..."
1013202-159 = "[s] \"Then, I'll treat you today.\""
1013202-160 = "Eh...?"
1013202-161 = "No way... A-are you sure...?"
1013202-162 = "[s5] \"He who does not work, shall not eat.\"\n[s6] \"In other words, a hard worker like Tsukuyo deserves to eat a lot!\""
1013202-165 = "...!"
1013202-166 = "I-in that case..."
1013202-167 = "I'll take you up on that offer... Thank you, Sensei!"
1013202-169 = "(I was briefly surprised by the length of the receipt...)"
1013202-170 = "(But seeing Tsukuyo's smile, I felt it didn't matter at all.)"