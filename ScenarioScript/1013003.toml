[translation]
1013003-1 = "The First Step"
1013003-4 = "Hello, Sensei... hm?"
1013003-9 = "W-what is this!?"
1013003-10 = "[ns] \"It's a party to celebrate Subaru's first day on duty!\""
1013003-11 = "Hey, you're overdoing it, Sensei. #nI'm not really good with things like this..."
1013003-12 = "Being treated so specially... it's kind of difficult, in a way..."
1013003-13 = "...Ah, though I'd still be hurt if you treated me coldly."
1013003-14 = "[s] \"It's complicated, isn't it...\""
1013003-15 = "Ahaha. Apparently, students around my age are the most complicated creatures in the world, you know?"
1013003-16 = "Well then, Sensei. This is my first time on duty, so I look forward to your guidance."
1013003-31 = "Phew..."
1013003-32 = "[s1] \"Want to take a break?\"\n[s2] \"Here, have some coffee.\""
1013003-35 = "Oh. Thank you, Sensei."
1013003-36 = "Coffee... hehe."
1013003-37 = "Did you know, Sensei? #nBack in Arius, we used to drink things 'like' coffee or tea quite often."
1013003-38 = "[s] \"Is that so?\""
1013003-39 = "Yes. Wild lettuce, dandelions, dried turnip roots, #nthistles, sow thistle leaves, leftover vegetable scraps..."
1013003-40 = "When you roasted and ground those up... #nit made something that looked like coffee."
1013003-41 = "We'd drink it during 'Water Time,' when the top students were allowed to have warm water."
1013003-42 = "Of course, if we got caught, we'd be scolded for being extravagant... so we did it in secret."
1013003-43 = "[s3] \"...Is there anything else you want to drink? Or maybe something to eat!\"\n[s4] \"I'll buy you anything! Just tell me whatever you want!\""
1013003-46 = "I told you already, you're overdoing it!"
1013003-48 = "(As she hurriedly brought over food and drinks...)"
1013003-49 = "(Subaru ate them silently, looking like she was enjoying them very much.)"
1013003-51 = "Um... Sensei?"
1013003-52 = "[s] \"Yes?\""
1013003-53 = "You said you'd listen to my concerns earlier, right?"
1013003-54 = "[s] \"Yes! Anything at all!!\""
1013003-55 = "That's exactly what I told you to stop doing!"
1013003-56 = "..."
1013003-57 = "The outside world is... full of things I don't know."
1013003-58 = "I suppose that's only natural."
1013003-59 = "But perhaps because of that..."
1013003-60 = "Lately, I feel like my heart is..."
1013003-61 = "Fluttering? Restless...? I feel so unsettled... #nLike everything is all mixed up inside..."
1013003-62 = "I see..."
1013003-63 = "..."
1013003-64 = "I suppose there are still things I can't forgive."
1013003-65 = "In Trinity, and in Arius..."
1013003-66 = "And of course, in myself as well."
1013003-70 = "It's a very strange feeling."
1013003-71 = "Even now, there's a part of me that wants Trinity to suffer."
1013003-72 = "But until the day Arius finally defeats Trinity—"
1013003-73 = "I also want them to remain aloof and untouched."
1013003-74 = "Not just the school of Trinity, but each and every student there, too."
1013003-75 = "My goal is for everyone in Arius, myself included, to live a better life than Trinity."
1013003-76 = "...But I don't want to achieve that by doing anything extreme."
1013003-77 = "...Huh? Is that what you call a 'rivalry' in a good sense...?"
1013003-78 = "..."
1013003-79 = "I'm actually feeling a bit annoyed right now..."
1013003-80 = "No, I think what you said is correct, Sensei. #nWhich is exactly why."
1013003-81 = "Haa..."
1013003-82 = "[s] \"Students your age are complicated, aren't they...\""
1013003-83 = "Are you regretting it now? Saying you'd listen to my concerns?"
1013003-84 = "...Or are you actually happy that I'm being honest? Because you're always smiling in front of the juniors?"
1013003-85 = "...!"
1013003-86 = "You're a bad person, Sensei..."
1013003-87 = "[s] \"That's right, Sensei is the bad one!\""
1013003-88 = "Really, you're terrible..."
1013003-89 = "[ns] \"That's right, because Sensei is the terrible one.\""
1013003-91 = "[ns] \"Also, having complicated feelings is perfectly normal.\""
1013003-92 = "...?"
1013003-93 = "Holding many different emotions at the same time—"
1013003-94 = "Is that... perfectly normal?"
1013003-95 = "...Then, what exactly is the right thing to do?"
1013003-96 = "[s5] \"Whatever Subaru thinks is good?\"\n[s6] \"Whatever Subaru thinks is right?\""
1013003-99 = "I should just think about the option I didn't choose later...?"
1013003-100 = "The important thing is to take responsibility for my own choices—"
1013003-101 = "And if I feel like I can't handle it, I should contact you anytime... is that it?"
1013003-102 = "Ahaha, what is that... #nIn the end, nothing has been solved at all."
1013003-103 = "[s] \"But that's just how life repeats itself.\""
1013003-104 = "...Is that so?"
1013003-105 = "[s] \"Yeah.\""
1013003-106 = "It's much more... messy than I thought."
1013003-107 = "[s7] \"That's true, but...\"\n[s8] \"It seems everyone is just living their lives to the fullest like that.\""
1013003-110 = "..."
1013003-111 = "I see."
1013003-112 = "[s9] \"Exactly.\"\n[s10] \"Also, don't let smooth talkers fool you!\""
1013003-115 = "Wha— Are you really the one saying that, Sensei!?"
1013003-116 = "Honestly, you're such a strange person."
1013003-120 = "Yeah..."
1013003-121 = "Really."
1013003-122 = "A strange person..."
1013003-123 = "...Hehe."
1013003-124 = "[s] \"Subaru.\""
1013003-125 = "?"
1013003-126 = "[s] \"You've been through a lot.\""
1013003-127 = "...Huh?"
1013003-128 = "...Oh."
1013003-130 = "H-hey, please look the other way!"
1013003-131 = "What? The tissues are on the table...?"
1013003-132 = "Honestly, Sensei... you always have to say one thing too many!"