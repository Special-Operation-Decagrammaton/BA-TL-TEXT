[translation]
80000141-1 = "The Perfect Plan (Tentative)"
80000141-2 = "[ns] \"Good morning, Kei-chan!\""
80000141-3 = "Sigh..."
80000141-4 = "[s1] \"A sigh!?\"\n[s2] \"That side of you is nice too, Kei-chan!\""
80000141-9 = "Good grief..."
80000141-10 = "..."
80000141-11 = "Why am I even..."
80000141-12 = "..."
80000141-13 = "...Anyway, I'll finish my business and head back immediately."
80000141-14 = "Here, take this."
80000141-20 = "[ns] \"W-what is this...!?\""
80000141-21 = "...I found it lying around earlier."
80000141-22 = "And since Schale happened to be nearby."
80000141-23 = "Just because it's Valentine's Day, you aren't expecting something handmade or high-end chocolate, are you?"
80000141-24 = "That's impossible. #nStore-bought chocolate I found is more than enough for you, Sensei."
80000141-25 = "(Even though I wanted to say 'I'm still happy about it!')"
80000141-26 = "(Even though I wanted to say 'I'm still happy about it!')"
80000141-27 = "(Looking at it closely...)"
80000141-29 = "[ns] \"...Hm?\""
80000141-30 = "D-did something happen? #nIt's just cheap chocolate, so hurry up and eat it."
80000141-31 = "[ns] \"This...\""
80000141-33 = "[ns3] (It doesn't look like store packaging?)\n[ns4] (The shape of the chocolate doesn't look like mass-produced goods...)\n[ns5] (It has a scent that feels different from store-bought items.)"
80000141-39 = "(Anyway, I put the chocolate in my mouth.)"
80000141-43 = "...W-what is it?"
80000141-44 = "[s] \"Thank you, Kei-chan.\""
80000141-45 = "W-what on earth are you talking about?"
80000141-46 = "[ns] \"You went out of your way to make this.\"\n[ns] \"The saltiness is really strong... but it's delicious in its own way!\""
80000141-49 = "...?"
80000141-50 = "...!?!?"
80000141-51 = "Hah!?!?!?!"
80000141-57 = "(Kei dashed forward, dove in, and buried her face in the sofa cushion.)"
80000141-58 = "(It's kind of cute, like an ostrich's movement.)"
80000141-68 = "Waaaah!!! #nUwaaaaaaaah!!!"
80000141-69 = "I-it's impossible, it's impossible, it shouldn't be possible! #nIf only I had at least tasted it first...!!!"
80000141-70 = "I-it was perfect up to a point! #nIt was the perfect plan!!!"
80000141-72 = "[ns] \"Uh... do you want to try tasting it now?\""
80000141-73 = "Just be quiet for a second!!!"
80000141-80 = "(Kei threw the cushion with all her might!)"
80000141-86 = "(Sensei dodged it desperately!)"
80000141-93 = "...Give it back."
80000141-94 = "[s] \"But it's handmade chocolate...\""
80000141-95 = "Just give it back! #nI'll give you a proper one next time!!"
80000141-96 = "W-why are you so obsessed with that? It definitely doesn't taste good..."
80000141-97 = "Because it's one of a kind in the world...?"
80000141-101 = "!!!"
80000141-102 = "~~~~~!!!"
80000141-109 = "(While desperately running away from Kei, I took another bite.)"
80000141-111 = "[ns] \"Don't misunderstand, Kei-chan. It's genuinely delicious.\""
80000141-112 = "Eh...?"
80000141-113 = "[s] \"...The salt is strong, but that's what makes it good.\""
80000141-114 = "Next time, I'll kill you, Sensei—"
80000141-115 = "[s] \"No way—\""
80000141-116 = "I'll die too!!!!!!"
80000141-129 = "Don't talk to me anymore, I hate you."
80000141-130 = "...?"
80000141-131 = "No, the use for it...?"
80000141-132 = "What do you mean by that..."
80000141-133 = "Eating it with something sweet creates an infinite loop...?"
80000141-134 = "It's two birds with one stone since it provides salt replenishment when it's hot outside...?"
80000141-135 = "..."
80000141-136 = "Are you trying to comfort me with that!?!?"
80000141-137 = "...Sigh."
80000141-141 = "...No, this is my mistake."
80000141-142 = "Regardless, if only I had tasted it first...!!"
80000141-143 = "[s] \"Thank you, Kei.\""
80000141-144 = "...For what? For it being salty?"
80000141-145 = "[s] \"Because it's true that I was happy.\""
80000141-150 = "Then, I forgive you..."
80000141-151 = "...Hehe."
80000141-153 = "(I took out the sweet snacks I had hidden and enjoyed them with Kei.)"
80000141-154 = "(The combination was better than expected, and we finished them in no time.)"
80000141-160 = "(The chocolate, of course...)"
80000141-166 = "(I was also happy to see all of Kei's various expressions.)"