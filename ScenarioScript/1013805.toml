[translation]
1013805-1 = "Here, have this!"
1013805-2 = "(Upon heading to Wild Hunt...)"
1013805-5 = "Oh, Sensei."
1013805-6 = "You really came."
1013805-7 = "How have you been lately?"
1013805-8 = "You haven't been having any sudden insomnia or unexplained chills, have you?"
1013805-9 = "[s] \"Nothing in particular. Why do you ask?\""
1013805-10 = "Just... just in case, that's all."
1013805-11 = "The upperclassmen were being so noisy about how that might happen if you meet a ghost..."
1013805-12 = "Ugh... seriously, why did it have to turn out like this?"
1013805-13 = "Well, whatever. Here, take this."
1013805-19 = "It's an amulet I made."
1013805-20 = "I thought about just buying one, but they told me I had to make it myself..."
1013805-21 = "I mean, I don't even believe in the occult, so I don't know if it'll actually work. #nWell, it's better than nothing, right?"
1013805-22 = "Keep it with you."
1013805-23 = "[s] \"The craftsmanship is amazing! You can do embroidery too?\""
1013805-24 = "Obviously. I'm in the Clothing Design department, remember?"
1013805-25 = "[s] \"I'm so happy! I'll treasure it!\""
1013805-29 = "[ns] \"As a token of my thanks... would you like to go grab something delicious to eat?\""
1013805-30 = "Huh? Your treat, Sensei?"
1013805-31 = "Yay! ♪ #nI was just craving a snack, too."
1013805-32 = "[s] \"How about a chocolate banana crepe?\""
1013805-33 = "...H-how did you know?"
1013805-34 = "It's not like I eat them all the time or anything!"
1013805-35 = "I just happened to be in the mood for one, that's all!!??"
1013805-36 = "[s1] \"Alright, alright. Let's go then.\"\n[s2] \"I was just craving something sweet myself.\""
1013805-39 = "Do you like chocolate banana crepes too, Sensei?"
1013805-40 = "[s] \"I do!\""
1013805-45 = "You're not just teasing me, are you?"
1013805-46 = "Well, whatever... let's go, hurry."
1013805-51 = "(Just as we were about to enter a nearby shop...)"
1013805-57 = "(Stepped on some gum...)"
1013805-58 = "Ugh... that's a huge piece of gum."
1013805-60 = "(Hurriedly scrapes the gum off)"
1013805-61 = "[ns] \"Alright... let's head inside.\""
1013805-65 = "W-what now!?"
1013805-66 = "[ns5] (The glass on the door suddenly shattered)\n[ns6] \"I-I only pushed it gently...!?\""
1013805-69 = "Oh my...? This is a 'pull' door, you know."
1013805-70 = "Would you mind paying for the damages?"
1013805-71 = "[s] \"I-I am so sorry!\""
1013805-73 = "(After paying for the damages, we tried to order a chocolate banana crepe)"
1013805-74 = "(But it sold out right before our turn...)"
1013805-75 = "(...We left the cafe feeling dejected)"
1013805-80 = "(And on the way home, I slipped on a banana peel)"
1013805-82 = "Isn't today just one bad thing after another? I wonder what's going on."
1013805-87 = "Sensei, let me see that amulet from earlier. Something's wrong."
1013805-92 = "Ahhh!!"
1013805-93 = "[ns] \"What's wrong?\""
1013805-94 = "I-I forgot to put the contents inside...! #nMaybe it's because I made so many at once..."
1013805-95 = "I knew something felt off! #nThis is the worst... no wonder..."
1013805-96 = "[s] \"So you do believe in the amulet?\""
1013805-97 = "N-no! It's not like that!"
1013805-98 = "I just thought I might have given you something incomplete."
1013805-99 = "I'll go get a proper one, so just wait here!"
1013805-104 = "(A while later...)"
1013805-109 = "Here, take this...! This one is fine! Keep it!"
1013805-115 = "(There was definitely something inside, but I couldn't tell what it was)"
1013805-116 = "I'm telling you, don't look inside, okay?"
1013805-117 = "Amulets lose their effect the moment you open them."
1013805-118 = "D-do you understand? You absolutely cannot open it!"
1013805-119 = "[s] \"Yeah, I understand.\""
1013805-124 = "(On a whim, Rena and I tried entering another sweets shop...)"
1013805-125 = "(And they were selling chocolate banana crepes there)"
1013805-126 = "(It seems to be a new item)"
1013805-128 = "Well then, time to dig in!"
1013805-134 = "(Perhaps this is a sign of small happiness to come)"