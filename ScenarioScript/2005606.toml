[translation]
2005606-1 = "The Beloved Troublemaker"
2005606-2 = "(Immediately after receiving the call, Koyuki bursts into Schale looking quite flustered.)"
2005606-5 = "Sensei!! Please, help me!!"
2005606-6 = "Phew... I can finally catch my breath... It was so intense back there!"
2005606-7 = "Ugh, just listen to this."
2005606-8 = "They were trying to tie me up... Seriously! Ugh!"
2005606-9 = "They were literally going to strap me to the bed!? I mean, literally!"
2005606-10 = "[s1] \"Strap you to the bed...?\"\n[s2] \"What on earth did you do...?\""
2005606-13 = "I didn't do anything! I'm not lying, I swear!"
2005606-14 = "I can't believe nobody is on my side. Why is it always me...!?"
2005606-15 = "To be treated so horribly—!"
2005606-20 = "...Achoo!!"
2005606-22 = "[ns3] \"Achoo...?\"\n[ns4] \"...Did you catch a cold?\""
2005606-25 = "Huh? Oh? I guess so?"
2005606-26 = "That's not the point, is it? They were trying to quarantine me like I'm some kind of patient...!?"
2005606-27 = "...? Huh?"
2005606-28 = "...Sensei, why are you looking at me like that?"
2005606-29 = "I might have a cold, sure. But it's really not a big deal."
2005606-30 = "I know my own body best! There's no reason I can't go out!"
2005606-34 = "...Huh?"
2005606-35 = "The Seminar seniors took my uniform away."
2005606-36 = "They didn't even give me any work today."
2005606-37 = "They basically made it so I couldn't do anything and tried to lock me in my room! It's a prison cell, that's what it is!"
2005606-38 = "[s5] \"...I see, so that's what's going on.\"\n[s6] \"Sigh, I understand everything now.\""
2005606-41 = "...? What's with that reaction? You're making me nervous."
2005606-42 = "Wait... hold on..."
2005606-43 = "D-don't tell me you're planning to hand me over to the Seminar...!?"
2005606-47 = "Oh, I guess you wouldn't do that. Hehehe!! That's a relief! I worried for nothing!"
2005606-48 = "...Huh? What is it?"
2005606-49 = "I can hang out in the Schale break room?"
2005606-50 = "I can play games and eat snacks... really?"
2005606-54 = "Wait... are you serious?"
2005606-55 = "[s7] \"I'll handle things if anyone comes looking.\"\n[s8] \"Isn't hiding here the safest option?\""
2005606-61 = "Hehehe!! If you say so, Sensei... then I'll take you up on that!"
2005606-62 = "Then, I won't hold back..."
2005606-63 = "...I'll be playing over there for a while!! Yay!"
2005606-69 = "(...Afterward, I contacted the Seminar and explained Koyuki's situation.)"
2005606-70 = "(A little while later, thinking it was time, I headed to the break room.)"
2005606-76 = "He... hehe... hehehe..."
2005606-77 = "Farewell, everyone at the Seminar... With this lottery prize money, I'll finally... hehe... hehehe..."
2005606-81 = "...Achoo!!"
2005606-82 = "Fumya... zzz... zzz!!"
2005606-83 = "Hehe... hehehe..."
2005606-86 = "[ns9] Turn on the heater and cover her with a blanket.\n[ns10] Place a cooling gel sheet on her forehead."
2005606-93 = "(I continued to look after the sleeping Koyuki while keeping an eye on her until her cold passed.)"
2005606-94 = "(...In the morning, a message of thanks arrived from the Seminar.)"