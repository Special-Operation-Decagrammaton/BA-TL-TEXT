2005303-77 = "[s] \"No problem, I had fun too.\""
2005303-78 = "R-really...?"
2005303-79 = "Heh heh... hmph!"
2005303-80 = "O-oh, that's right...!"
2005303-81 = "This is for you, Sensei!"
