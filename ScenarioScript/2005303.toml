[translation]
2005303-1 = "A Ninja Girl is Embarrassed!"
2005303-2 = "Hyakkiyako Shopping District"
2005303-3 = "Yes, here is the dress you asked me to fix."
2005303-4 = "Whoa...!"
2005303-5 = "...It's amazing, it's beautiful!"
2005303-6 = "I can't even tell where the tear was!"
2005303-7 = "So this is the skill of a professional...!"
2005303-8 = "[s] \"I'm glad, Michiru.\""
2005303-9 = "Heh heh heh... but it's not over yet."
2005303-10 = "Wait a moment, Sensei!"
2005303-15 = "(5 minutes later...)"
2005303-16 = "Sensei!"
2005303-18 = "Alright, let's go!"
2005303-19 = "[ns] \"Why!?\""
2005303-20 = "Heh, well, you know..."
2005303-21 = "Clothes are meant to be 'worn'."
2005303-22 = "In other words, to know if it's truly repaired, you have to wear it!"
2005303-23 = "[s] \"That's... surprisingly convincing!?\""
2005303-24 = "However... just wearing it isn't enough!"
2005303-25 = "You have to walk, run, and carry heavy things!"
2005303-26 = "Only after trying out various movements..."
2005303-27 = "Will we know if it's perfectly fixed!"
2005303-28 = "[s] \"I see your point, but...\""
2005303-29 = "Right?"
2005303-30 = "So, I've mapped out the perfect course for that!"
2005303-31 = "If we go over there, there's a shop that sells all kinds of goods."
2005303-32 = "And over that way, there's the shop we went to together before."
2005303-33 = "If we walk through the street while shopping...!"
2005303-34 = "Walking, running, carrying heavy things!#nIt covers every movement!"
2005303-35 = "Plus, they said they got new goods... I mean, ninja tools in stock!"
2005303-36 = "Man, this is going to make even more people realize the charm of ninjas!"
2005303-37 = "[s] \"So that was the plan all along!?\""
2005303-38 = "I knew you'd come with me, Sensei!"
2005303-39 = "[s] \"I haven't even said anything yet!?\""
2005303-40 = "It's fine, it's fine! Now, let's go!"
2005303-46 = "Hyakkiyako Goods Shopping District"
2005303-47 = "(In the end, I was led by the hand to the shopping district by Michiru)"
2005303-48 = "Come on, come on, get focused!"
2005303-49 = "Even for the same goods, the prices can vary from shop to shop..."
2005303-50 = "You have to stay sharp and judge carefully!"
2005303-51 = "Well, ninja goods... I mean, ninja tools, are usually about the same price, though."
2005303-52 = "Since there are so few shops that carry them, there's not much to compare..."
2005303-53 = "...Hm?"
2005303-54 = "Oh! A Matryoshka Shuriken!"
2005303-55 = "A special ninja tool with a smaller shuriken inside the main one!"
2005303-56 = "Even if you dodge the shuriken flying at you,#nanother one appears! An unavoidable weapon!"
2005303-57 = "It's been homaged everywhere since it appeared in Director 'Kai-ken Gururu's' work!"
2005303-58 = "Oh, and this one... a Ninja Flame Smoke Bomb!"
2005303-59 = "When it explodes, it releases flames instead of smoke,#nallowing you to attack while obscuring vision! A rare ninja tool!"
2005303-60 = "[s] \"Isn't that just a missile...?\""
2005303-61 = "Well, well, don't worry about the small details."
2005303-62 = "Whoa, is this... an Ancient Ninja Hologram Scroll!?"
2005303-63 = "They even have things like this here!?"
2005303-70 = "(And so, I spent some time looking around at ninja goods... I mean, ninja tools, with Michiru)"
2005303-72 = "Nyaa~, that was fun."
