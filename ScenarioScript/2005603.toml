[translation]
2005603-1 = "Just like home"
2005603-2 = "(The intercom rang sometime after noon.)"
2005603-6 = "[ns1] \"It's open, come on in!\"\n[ns2] I press the button to unlock the door."
2005603-10 = "Ta-da! Koyuki Kurosaki has arrived!!"
2005603-11 = "I'll be working as your capable right-hand—and left-hand—person today, so feel free to leave everything to me!"
2005603-12 = "Oh, but... please spare me from any work involving passwords! Ni-hahaha!"
2005603-13 = "[s3] \"That's fine, but... why are you dressed like that?\"\n[s4] \"Why are you in pajamas?\""
2005603-16 = "Huh? Ah... well."
2005603-17 = "...Does Schale even have a dress code?"
2005603-18 = "Oh, you don't? I knew it! Ni-hahaha! You really surprised me there!"
2005603-19 = "These are more comfortable than my uniform, you see."
2005603-20 = "Besides, work goes much faster when you're comfortable, right?"
2005603-21 = "I wear my uniform at Seminar because the upperclassmen are so fussy about it—"
2005603-22 = "But my duties here are mostly support and help, right? It's fine to wear comfy clothes, isn't it?"
2005603-23 = "I heard rumors that some students even come here in swimsuits or bunny girl outfits! Is there a problem with that?"
2005603-24 = "[s5] \"W-well, I suppose that's true, but...\"\n[s6] \"Now that you mention it, I really can't argue with that...\""
2005603-27 = "Ni-hahahaha!! See? That's what I'm talking about!"
2005603-28 = "Now then, before we get started on your work—"
2005603-32 = "Hnn, hup...!"
2005603-33 = "[ns7] \"...Koyuki?\"\n[ns8] \"Are you planning on laying out a picnic mat and sleeping?\""
2005603-36 = "...Is there a problem with that?"
2005603-37 = "Huh? I'm just preparing for work!"
2005603-38 = "I'll be lounging right here, so just let me know if you need anything! I'll get it all done properly!"
2005603-42 = "...Sensei?"
2005603-43 = "It's nothing? Ni-hahaha! You're so cold!"
2005603-44 = "Anyway, now that I've got my spot picked out—"
2005603-45 = "...Let's get today's work started!!"
2005603-47 = "(After that, I started on today's tasks alongside Koyuki, who was lounging on the floor.)"
2005603-48 = "(Even though Koyuki was lounging around in her pajamas...)"
2005603-52 = "(...Just as she promised, she finished everything in no time at all.)"
2005603-58 = "[ns9] \"That's the last of it.\"\n[ns10] \"That's amazing. You've done way more than I expected.\""
2005603-61 = "Ni-hahaha!! I told you, didn't I? You can leave anything to me! I always keep my word!"
2005603-62 = "...Hm? What's wrong?"
2005603-63 = "The situation at Seminar? Ah..."
2005603-67 = "No, please don't ask for something so unreasonable..."
2005603-68 = "[s11] \"Well, I had a feeling...\"\n[s12] \"What's the difference, I wonder?\""
2005603-71 = "Ah... the Seminar office is just so stifling."
2005603-72 = "I can't lounge on the floor, the uniforms are so stiff..."
2005603-73 = "I can't take a nap, I get scolded if I make even a little noise, and I can't even eat snacks properly..."
2005603-74 = "Honestly, how could anyone expect work efficiency to go up in an environment like that? Wait, you disagree?"
2005603-75 = "Well... the upperclassmen say we have to dress properly because we have visitors."
2005603-76 = "But I think if everyone just stopped dressing 'properly,' the problem would solve itself..."
2005603-77 = "...Well, I've suggested that before, but it never gets adopted! Ni-hahahaha!!!"
2005603-78 = "[s13] \"...I see.\"\n[s14] \"I feel like I understand you a little better now, Koyuki.\""
2005603-81 = "Ehh!? What's that supposed to mean? Don't say such weird things all of a sudden!"
2005603-82 = "...Ni-hah."
2005603-83 = "But still, I'm happy I could be of help to you, Sensei!"
2005603-84 = "Is that all the work for today? Then I'm closing up shop! *Clatter clatter*"
2005603-85 = "If there's nothing else you need, I'll be heading out now!"
2005603-86 = "I'm sure you've got a better image of me as a capable person now, right?"
2005603-87 = "[ns15] \"...Oh, Koyuki. Wait a second.\"\n[ns16] I call out to stop Koyuki from leaving."
2005603-90 = "...What is it?"
2005603-91 = "...Yes?"
2005603-92 = "Wait, I'm allowed to stay the night...?"
2005603-93 = "Hmm, but that changes things... wouldn't I be a bother?"
2005603-94 = "It is getting late, but... well, if I'm not a bother, then..."
2005603-95 = "[s17] \"It's a reward for your hard work. I'll let Seminar know myself.\"\n[s18] \"We've got game consoles here, so feel free to use them.\""
2005603-98 = "Eh..."
2005603-100 = "...!!!!!"
2005603-101 = "Games...!!!"
2005603-102 = "Ni-hahahahaha!!! Oh, you're impossible! You actually wanted to play with me, didn't you, Sensei?"
2005603-103 = "If you put it that way, I can't say no! I'm already in my pajamas, so I'm all set!"
2005603-104 = "Come on, let's go, Sensei! The game consoles and snacks in the break room are waiting for us!!"
2005603-105 = "[s19] \"You got excited fast!\"\n[s20] \"I'm the one who prepared all of that, you know.\""
2005603-108 = "Ni-hahahaha!! Don't worry about the little details!"
2005603-109 = "Let's go, Sensei! The night is still young!!"
2005603-110 = "It’s show time!!!"
2005603-112 = "(After that, I spent the night with Koyuki, playing games in the break room.)"
2005603-113 = "(Koyuki seemed ready to play all night long, but...)"
2005603-117 = "(Perhaps she was tired, because she fell asleep after playing for a little while.)"