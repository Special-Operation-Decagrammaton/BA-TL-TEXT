[translation]
1013303-1 = "Talking to Herself"
1013303-2 = "(I finished my work in the room, so I decided to head outside for a change of pace.)"
1013303-7 = "[ns1] \"It's quiet...\"\n[ns2] \"I wonder what Rio is doing?\""
1013303-10 = "Ah... not there."
1013303-11 = "[ns] \"...?\""
1013303-12 = "If Sensei hears me, it'll interrupt my work."
1013303-13 = "I need to be as quiet as possible..."
1013303-14 = "[ns] \"...??\""
1013303-15 = "(I'm curious, so I decide to head toward the voice.)"
1013303-22 = "[ns] \"Rio?\""
1013303-23 = "Hmm..."
1013303-24 = "[s] \"Rio...?\""
1013303-25 = "..."
1013303-26 = "(She seems focused and hasn't noticed me yet.)"
1013303-27 = "(I decided to watch for a little while.)"
1013303-28 = "Yes, right there."
1013303-29 = "No... that's too strong. Be more careful..."
1013303-30 = "...That's the right amount. Keep going like that."
1013303-31 = "Ah, wait. That part is delicate, so be gentle..."
1013303-32 = "That's it... keep it up."
1013303-33 = "Hmm..."
1013303-34 = "...Phew, that feels good."
1013303-35 = "Now, remember that sensation and try it one more time."
1013303-36 = "[ns] \"...?\""
1013303-37 = "(Rio continued talking to herself even after that.)"
1013303-38 = "(I should call out to her before anyone else comes back.)"
1013303-39 = "[ns] \"Um... Rio?\""
1013303-40 = "Let's try this next."
1013303-41 = "You should be used to it by now, so you can do it better, right?"
1013303-42 = "[s] \"Ri, Rio...?\""
1013303-43 = "...?"
1013303-47 = "...!!"
1013303-48 = "Se, Sensei!? How long have you been...?"
1013303-49 = "[s] \"Since you were seriously giving those instructions...?\""
1013303-50 = "No way..."
1013303-51 = "You were watching me."
1013303-52 = "...You should have told me sooner."
1013303-53 = "[s] \"I did call out to you... what were you doing?\""
1013303-54 = "That is, well..."
1013303-55 = "[s] \"If it's hard to say, I won't force you to tell me.\""
1013303-56 = "...No, there's no reason to hide it."
1013303-57 = "I was upgrading the transport ship."
1013303-58 = "Using these AMAS."
1013303-63 = "[ns] \"I see...!\""
1013303-64 = "I managed to get some really good parts from a recent operation."
1013303-65 = "So I thought I'd focus on the work while there were as few people around as possible."
1013303-66 = "Also, well..."
1013303-67 = "I wanted to surprise everyone by upgrading it in secret, but..."
1013303-68 = "[s3] \"So that's what it was!\"\n[s4] \"Rio, you're amazing!\""
1013303-71 = "Thank you..."
1013303-72 = "That aside... Sensei, why is your face so red?"
1013303-73 = "...Did it sound like I was saying strange things to myself?"
1013303-74 = "Is that so? I was just giving orders. #nLet's see—"
1013303-79 = "Carefully."
1013303-80 = "Slowly."
1013303-81 = "That's good."
1013303-82 = "Gently."
1013303-83 = "...I remember saying those things."
1013303-87 = "...I don't see any problem with that."
1013303-92 = "[ns] \"Y, yeah, that's right!!\""
1013303-93 = "You're still bothered by something, aren't you?"
1013303-94 = "If there's something on your mind, please tell me."
1013303-95 = "I should be able to answer most questions regarding this field."
1013303-96 = "Or... are you bothered that I upgraded the ship on my own?"
1013303-97 = "I believe I have at least a minimum sense of judgment."
1013303-98 = "Even I wouldn't go overboard."
1013303-99 = "[s] \"I know that!\""
1013303-100 = "It seems my assumption was wrong."
1013303-101 = "But as for other possibilities... I can't think of any."
1013303-102 = "Sensei, are you perhaps hiding some necessary information?"
1013303-103 = "If pieces are missing, I can't make a rational judgment."
1013303-104 = "[s] \"Ah, well... how about I go make some coffee for a break?\""
1013303-105 = "If you're going to be that blatant, even I can tell I'm being brushed off."
1013303-106 = "...Well, I suppose I wouldn't mind settling for your coffee."
1013303-107 = "But I'm going to add one more request."
1013303-108 = "I want you to stay here and support my work."
1013303-109 = "It's inconvenient when I wear my HMD because I can't see my surroundings."
1013303-110 = "Of course, if you have other business, feel free to prioritize that."
1013303-111 = "[s] \"It's fine, I'll help you out.\""
1013303-112 = "Then... I'm counting on you."
1013303-113 = "I can trust you to handle the support."
1013303-115 = "(After making coffee, I helped Rio with her work.)"
1013303-116 = "(I'm glad I managed to brush it off...)"