[translation]
10053090-1 = "Epilogue: The Blue Tsuchinoko"
10053090-2 = "(Day 3)"
10053090-3 = "Waaaaah!!! Let go!!! Let me go!!!"
10053090-5 = "There's still time!!! I can just barely make it in time!!!"
10053090-10 = "Don't be ridiculous! The mountains at night are genuinely dangerous!"
10053090-11 = "But if I miss today, the worst misfortune of my life will...!!!!"
10053090-12 = "I don't even care if it's not a Tsuchinoko anymore! At this point, I'll take a regular snake...!!"
10053090-13 = "Everyone, don't just watch! Help me stop her!!"
10053090-17 = "Hey, we're trying our best to stop her, but...!!"
10053090-21 = "Is she even human!? This strength... is she a tank or something...!?"
10053090-25 = "Ah, I slipped—owwwwww!! I scraped my knee!!"
10053090-30 = "Everyone, please calm down for a moment!"
10053090-31 = "Konoka, I have something important to tell you."
10053090-36 = "It's no use trying to stop her! She won't listen even if the Director tells her to!"
10053090-37 = "No, that's not my intention. I just want you to listen. I realized something just now."
10053090-38 = "According to my calculations, Konoka's \"worst third day\" was—!"
10053090-40 = "It already passed a long time ago...!!"
10053090-46 = "......"
10053090-47 = "......Huh?"
10053090-48 = "I felt something was off from the moment I first heard it. Fortune-telling usually refers to the fortune of \"that day.\""
10053090-49 = "If it speaks of a \"third day\" of fortune... then wouldn't the day you heard it be the first day?"
10053090-50 = "In other words, Konoka's \"worst third day\" was yesterday!"
10053090-51 = "My worst day... was already over...?"
10053090-52 = "......"
10053090-53 = "But, nothing really happened...?"
10053090-58 = "That's just how fortune-telling is, isn't it?"
10053090-59 = "You only remember the things that leave an impression. It's what they call \"Murphy's Law\"—"
10053090-73 = "...No."
10053090-74 = "Yes, there was!! There were tons of them, right!? The worst things ever!!"
10053090-75 = "Getting attacked by something like a robot!!"
10053090-76 = "Getting ambushed by some weird delinquent at night!!"
10053090-77 = "It was nothing but the worst things!!"
10053090-82 = "Are you talking about us, by any chance?"
10053090-83 = "You don't have to go as far as calling it the \"worst\"... Even if it was wrong of us to ambush you at night."
10053090-88 = "Oh, sorry..."
10053090-89 = "...Hm?"
10053090-90 = "Hiss! That's the worst behavior right there!!"
10053090-91 = "You almost tricked me into forgetting about it!!"
10053090-96 = "Well, calling it the \"worst\" over just a tank is a bit of an exaggeration..."
10053090-97 = "So, does that mean the worst day never came even after three days...?"
10053090-101 = "Wait, could it be...!?"
10053090-102 = "Does that mean we already met the Tsuchinoko!?"
10053090-103 = "No way, we haven't seen anything that looks like a snake since we got here—"
10053090-106 = "And anyway, what even is a Tsuchinoko? Does it have any features other than being a fat snake?"
10053090-110 = "Hmm... A sharp question. First of all, the description \"fat snake\" isn't accurate."
10053090-111 = "It's just called that because it's easy to understand, but in reality, it's said to have a silhouette closer to a diamond shape."
10053090-112 = "And most impressively, its jumping ability! It's said to be able to jump nearly a meter on the spot!"
10053090-115 = "Hiss!! Hiiiiiisssss!!!"
10053090-116 = "It's a Tsuchinoko!!!!"
10053090-122 = "Wait, hey, what's with the sudden hug!?"
10053090-123 = "Why are you suddenly clinging to me!?"
10053090-124 = "Well, you see..."
10053090-128 = "Maybe this adventure itself was the real Tsuchinoko..."
10053090-129 = "Even you're saying that, Konoka!?"
10053090-131 = "(...And thus, the adventure in search of the Tsuchinoko came to an end.)"
10053090-139 = "Man, it feels great when the room is clean!"
10053090-140 = "Why did you clean up? We're leaving, right?"
10053090-141 = "We rented it for a week, so it'd be a waste not to, right? We have to keep playing."
10053090-142 = "What!? That was the deal!? I was under the impression we were looking for the entrance to an alien secret base..."
10053090-147 = "Um, the cleaning is done, so I'll be going now..."
10053090-148 = "Give it up. They're definitely not going to let you go."
10053090-149 = "At this point, just steel yourself and play until you drop."
10053090-154 = "Kivotos Unconfirmed Mystery: The Great Tsuchinoko Exorcism Investigation"