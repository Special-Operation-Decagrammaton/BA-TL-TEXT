[translation]
70010010-1 = "End of the Manual Era (1)"
70010010-2 = "Millennium Expo Computer Engineering Pavilion"
70010010-3 = "The demonstration will now begin!"
70010010-4 = "Before we start, we'll have a few words from our special guests from the Red Winter Secretariat."
70010010-8 = "Hmph. Commendable work providing hospitality fit for my stature."
70010010-9 = "I am... the President of Red Winter Federal Academy, Head of the Environmental Beautification Department, General Secretary, Head of the Cleaning Department, Athletic Representative, Student Council President, Disciplinary Committee President, Head of the Lunch Department—"
70010010-10 = "And this month's Best Pudding Taster, and the Chair of the Red Winter Science Academy, the great Cherino!"
70010010-11 = "I have graced this Millennium EXPO with my presence to bring even further advancements to Red Winter Federal Academy's already cutting-edge science and technology. I expect great things."
70010010-12 = "...Thank you, President Cherino. Now, without further ado, let me introduce it!#nMillennium's masterpiece... the supercomputer 'SEN9000'!"
70010010-17 = "Hm? This is a supercomputer?#nIt doesn't even have a monitor or a keyboard."
70010010-18 = "That is because I use images and audio for information input and output!"
70010010-24 = "Nice to meet you!#nPresident of Red Winter Federal Academy, Head of the Environmental Beautification Department, General Secretary, Head of the Cleaning Department, Athletic Representative, Student Council President, Disciplinary Committee President, Head of the Lunch Department—"
70010010-25 = "And this month's Best Pudding Taster, and the Chair of the Red Winter Science Academy, the great Cherino! Welcome to Millennium Science School!"
70010010-26 = "W-What is the meaning of this!? It suddenly started talking to me!?"
70010010-27 = "And it memorized all of my titles!? After hearing them only once!?"
70010010-28 = "(It even copied the President's slip of the tongue...)"
70010010-29 = "(And I thought I was the only one who could do that!)"
70010010-31 = "Hehe, SEN9000 answered before I even had the chance."
70010010-32 = "This SEN9000 is equipped with a conversational model. Therefore, it can understand speech and respond to commands without text input. For example, like this—"
70010010-33 = "SEN9000, can you tell us your specialties?"
70010010-34 = "Yes! I excel at mathematical calculations and answering questions accurately!"
70010010-35 = "Let's start with math, then. Can you solve this problem?"
70010010-37 = "Is that... math? There are barely any numbers..."
70010010-38 = "Plus, it's handwritten. Will it be able to understand that?"
70010010-40 = "..."
70010010-41 = "Hmph, there's no way it can answer."
70010010-42 = "There's no way another school possesses technology that doesn't exist in our Red Winter Federal Academy—"
70010010-43 = "...I'm so sorry! How clumsy of me!#nI didn't realize I was on mute, so I was just talking to myself!"
70010010-44 = "Still, just because it's a demonstration doesn't mean you have to give me such an easy problem! The answer is 42!"
70010010-50 = "Correct!#nIt also has language model learning capabilities, so it's even started telling jokes recently."
70010010-51 = "Next, let's have it answer a question.#nSince you're here, President, why don't you ask it something?"
70010010-52 = "M-Me!?"
70010010-53 = "Let's see... How many bronze statues of me are there in Red Winter Federal Academy altogether?"
70010010-54 = "Hehehe. How's that? There's no way it can answer that!"
70010010-56 = "There are 199 in total, with one more scheduled to be unveiled early next month."
70010010-57 = "This information was sourced from official social media, the digital edition of 'Red Bear', and#npress release materials, so there may be a margin of error."
70010010-58 = "Statistically speaking, however, it is likely that more than 10 statues will be destroyed next week."
70010010-59 = "Was this helpful?"
70010010-60 = "It answered without hesitation...?"
70010010-61 = "And the information is... accurate..."
70010010-63 = "It has various other functions as well.#nNext up is—"
70010010-64 = "Ngh..."
70010010-72 = "And with that, this concludes our demonstration!"
70010010-74 = "That was amazing! It can do anything, can't it!?"
70010010-75 = "So this is Millennium's technological prowess... It's beyond my imagination..."
70010010-77 = "And to everyone from Red Winter Federal Academy!#nOnce again, thank you so much for coming today!"
70010010-78 = "U-Urgh..."
70010010-84 = "N-Nonsense!!"
70010010-90 = "That was quite an amusing little show!#nHowever! W-We have something just like that in the great Red Winter Federal Academy!"
70010010-91 = "And ours is much bigger and warmer, too!"
70010010-92 = "(President, those aren't really bragging points for a computer...)"
70010010-96 = "Wow!#nI didn't realize Red Winter was operating a supercomputer as well...!"
70010010-97 = "Pardon my ignorance... I hadn't seen it mentioned at any of the computer research conferences..."
70010010-98 = "T-That's because its performance is so advanced, we've kept it a closely guarded secret!"
70010010-99 = "But looking at today's presentation, it seems Millennium's technology has finally started to catch up to ours. I suppose there's no harm in showing it to you now!"
70010010-100 = "R-Really!?"
70010010-101 = "I'll have to invite you to Red Winter Federal Academy sometime.#nI'll show you the true extent of our technological prowess!"
70010010-103 = "Then I'll come over next Monday!"
70010010-104 = "...Eh?"
70010010-105 = "I actually have some business nearby then!"
70010010-106 = "Red Winter's cutting-edge technology, shrouded in mystery...!#nIt's truly an honor to be allowed to see it! I look forward to it!"
70010010-110 = "R-Right! Next Monday it is!"
70010010-111 = "Prepare to burn the greatness of Red Winter Federal Academy into your retinas!!"
70010010-114 = "What do we do...?"
70010010-115 = "Next Monday... We don't even have a supercomputer..."
70010010-116 = "How about we incite a coup by dissident elements to coincide with their visit?"
70010010-117 = "A good idea, but... the last coup was too successful, and getting reinstated was a hassle. I'd rather not deal with that again for a while."
70010010-118 = "Hmm... If we search hard enough, shouldn't someone have at least one lying around...?#nOr maybe we could just have one built—"
70010010-122 = "President Cherino, the production estimate we requested from Special Class 183 has arrived."
70010010-123 = "They've reported that the theoretical research and the computer's design are fully complete."
70010010-124 = "Really!? Well done, Tomoe!"
70010010-125 = "Have them start production immediately!#nUse the Secretariat's authority to mobilize all available materials and labor!"
70010010-126 = "Regarding the breakdown of the estimate...#nTaking Red Winter Federal Academy's electronic engineering capabilities into account—"
70010010-127 = "160 billion vacuum tubes."
70010010-128 = "27 power plants for electricity supply."
70010010-129 = "And we will need to construct 3 new cities to house the resident staff.#nFurthermore..."
70010010-131 = "...Huh?"
70010010-132 = "We will need to level 8 mountains to secure the land for the facility."
70010010-133 = "Uhh..."
70010010-134 = "If we utilize our entire workforce on rotating shifts, working 16 hours a day, 7 days a week—"
70010010-135 = "It is estimated to take approximately 6 centuries to complete."
70010010-136 = "..."
70010010-137 = "Shall we begin?"
70010010-139 = "Millennium is coming next week!? We'll never make it in time!!!"
70010010-143 = "A-Achoo!"
70010010-145 = "(I'm so nervous my throat is dry... I should get a cup of tea...)"
70010010-149 = "(Still... Tomoe looks like she's having a tough time as Chief of Staff... Thank goodness the Security Committee isn't involv—)"
70010010-153 = "(...!? The tea went down the wrong pipe...! I'm gonna choke...!)"
70010010-154 = "*Cough!* *Cough!*"
70010010-159 = "...Marina, what's so funny?"
70010010-160 = "Is my predicament really that amusing to you?"
70010010-162 = "N-No! *Cough!* It's nothing like that...!"
70010010-163 = "Then... are you looking down on me because my mustache fell off?"
70010010-164 = "T-That's not it, I ch-choked—"
70010010-165 = "Joking? You think this situation is a joke!?"
70010010-167 = "(O-Oh no! At this rate, I'm going to be purged...!!)"
70010010-168 = "J-Jo..."
70010010-172 = "J-Just about finished...!#nThat's right! The Security Committee has just about finished preparations for a supercomputer!"
70010010-173 = "What? Is this true?"
70010010-174 = "Of course! I, Marina, will take full responsibility for having it ready by the deadline!"
70010010-175 = "Marina."
70010010-176 = "Y-Yes, Ma'am!"
70010010-181 = "I am truly blessed to have such a loyal subject by my side."
70010010-182 = "Your devotion to Red Winter and to myself... is worthy of praise."
70010010-183 = "...Very well. I shall leave this matter to you.#nIf you succeed, I will award you the 'First-Class Mustache Labor Medal'—"
70010010-184 = "No! That's too small a reward!"
70010010-185 = "I shall bestow upon you the medal of 'Hero of the Red Winter Federation'!"
70010010-186 = "Yes! Leave it to me!"
70010010-192 = "What do I do...?"
70010010-193 = "By next week...?#nI haven't built a supercomputer..."
70010010-198 = "What do you mean, 'what do I do'?"
70010010-199 = "You're an oppressor, yet you're asking the working masses for help?"
70010010-200 = "Ahaha! You're completely backed into a corner!"
70010010-201 = "Can I use this as material for my manga?#nAh~ I'm laughing so hard it hurts!"
70010010-202 = "Before that, could you finish your current manuscript?#nBecause you're also backed into a corner for missing your deadline, Senpai."
70010010-203 = "*Whimper*..."
70010010-207 = "Mufufu. At this rate, you'll be a laughingstock, won't you?#nShould I get a preliminary interview from you?"
70010010-208 = "The Security Committee President purged over a cup of tea... Let's make that the cover of the next issue of 'Red Bear'."
70010010-209 = "Even for non-fiction, it's so foolish that it lacks any literary value."
70010010-210 = "I'll give it a 2 out of 10."
70010010-212 = "Why the score?"
70010010-213 = "Since my usual critiques didn't seem to resonate with everyone, I introduced a scoring system starting yesterday."
70010010-214 = "Oh, and Meruly's current manuscript gets a 0.#nIf it's not finished, it can't be called a proper work."
70010010-215 = "Umm... There's someone much more worth critiquing right in front of us, so can we talk about her instead?"
70010010-217 = "...Laugh all you want.#nBut please, isn't there any way you can lend me a hand...?"
70010010-218 = "I refuse. I have no labor to offer an oppressor."
70010010-219 = "Why should I—no, why should we help you?"
70010010-220 = "W-Well, there's a reason for that..."
70010010-221 = "The truth is... when the President asked me who I was building it with—"
70010010-222 = "I just blurted out your names..."
70010010-223 = "I told her we were all pooling our strength together..."
70010010-230 = "W-What did you just say?!?!"
70010010-231 = "1 point, you get 1 point!! Have you lost your mind!?"
70010010-232 = "Why did you drag us into this!?"
70010010-233 = "Eek... W-We're all going to be purged!"
70010010-235 = "Not content with mere oppression, you now force the masses to bear the consequences of your own blunders!?"
70010010-236 = "Is this a tactic to blur the lines of responsibility by involving more people?#nDid we do something to make you hold a grudge against us?"
70010010-238 = "N-No! I panicked and it just slipped out.#nI didn't mean any harm... I swear."
70010010-239 = "I see you all around... so I just assumed on my own... that we were friends..."
70010010-241 = "Friends...?"
70010010-242 = "Eh?"
70010010-244 = "F-Forget it... I'm sorry, I really shouldn't have brought your names up..."
70010010-245 = "...I'll confess to the President.#nI'll take responsibility so you guys don't take the fall."
70010010-246 = "I should have been more careful... especially if we were friends...#nI'm truly sorry."
70010010-250 = "That's... 9 points."
70010010-251 = "Hey!! Why is that rated so high!?#nYou always tear my manga to shreds!"
70010010-252 = "Compared to the raw emotion of a real human drama,#nyou still have a long way to go, Meruly."
70010010-253 = "Wanting to rely on us because she thought we were friends... That actually resonated with me."
70010010-255 = "Friends... To think the head of the Security Committee would say such a thing..."
70010010-256 = "This is... a massive, scoop-level story. Mufufufu."
70010010-258 = "So we really weren't friends after all... I guess it was just my imagination..."
70010010-260 = "N-No no, that's not what we mean!"
70010010-261 = "It's just that even if we wanted to help, we wouldn't know what to do, right? Everyone?"
70010010-262 = "That's right...#nEven mobilizing Red Winter's entire workforce would take 600 years, wouldn't it?#nWhat good would the five of us helping do..."
70010010-263 = "Actually... it would be four of us.#nMeru-senpai, you shouldn't be messing around right now, right?"
70010010-264 = "I told you, I'm almost finished!"
70010010-266 = "Ikekura Marina. Red Winter Secretariat member, and Security Committee President..."
70010010-267 = "To think a running dog of the oppressor considered us 'friends'..."
70010010-273 = "We welcome you as our comrade!"
70010010-274 = "C-Comrade!?"
70010010-276 = "Minori!?"
70010010-277 = "Oh my... This is an unexpected development."
70010010-278 = "I was hoping to hold out a little longer to strike a bargain with the Security Committee... but I see we're taking this route..."
70010010-279 = "President, even if you're aiming for a business opportunity, I'd appreciate it if you considered the time and place."
70010010-280 = "My apologies. Mufufu."
70010010-282 = "...Marina, you have cowered before the tyranny of the oppressor and awakened to the class consciousness of the masses."
70010010-283 = "Join the front lines of our struggle! A tomorrow without worries must be seized by our own hands!"
70010010-284 = "I appreciate the sentiment, but no matter how you look at it, there's no way..."
70010010-285 = "A construction project of that scale... even the entire Public Works Department couldn't pull it off..."
70010010-286 = "Honestly, preparing for a coup feels more realistic..."
70010010-287 = "What exactly is it that President Cherino wants?#nI get that it's some kind of complex machine."
70010010-288 = "It's a computer she saw during her inspection of the Millennium EXPO."
70010010-289 = "It answered any question it was asked."
70010010-291 = "A machine that answers questions?"
70010010-292 = "Oh, that's simple enough."
70010010-297 = "...Simple!?"
70010010-299 = "[log]1 Day Before the Millennium Seminar Visit[/log]"
70010010-301 = "President Marina, the day is finally upon us."
70010010-302 = "You're not going to give me some spineless report about how you couldn't get it ready... are you?"
70010010-303 = "Absolutely not!"
70010010-304 = "Our preparations for the demonstration are already perfectly complete!"
70010010-305 = "Comrades!#nBehold the supercomputer born from the culmination of Red Winter's technology!"
70010010-311 = "This is the cutting-edge supercomputer created under the guidance of President Cherino..."
70010010-312 = "The 'RFC9001'!"
70010010-314 = "RFC...?"
70010010-315 = "It stands for 'Red Winter Federal Computer', and the '9001' means it's one step ahead of Millennium's '9000'!"
70010010-316 = "Marina...! I knew I could count on you!"
70010010-323 = "Well done!!"
70010010-324 = "(Praise from President Cherino...! How long has it been since I last heard that!)"
70010010-325 = "A-Ahem! Due to security considerations, information input is handled via paper format.#nPlease insert a piece of paper with your question written on it into this slot."
70010010-327 = "So this thing can answer anything just like Millennium's, right?"
70010010-328 = "Let's see...#n'Who is the Supreme Leader of Red Winter Federal Academy?'"
70010010-334 = "What is it? Can it not even answer a simple question like this?"
70010010-336 = "I-It's programmed to use polite language, so it takes a little bit of time!"
70010010-337 = "If you could just wait a moment..."
70010010-342 = "It's out!"
70010010-343 = "'President of Red Winter Federal Academy, Head of the Environmental Beautification Department, General Secretary, Head of the Cleaning Department, Athletic Representative, Disciplinary Committee President, Head of the Lunch Department—'"
70010010-344 = "'And this month's Best Pudding Taster, and the Chair of the Red Winter Science Academy, the great Cherino.'"
70010010-345 = "Ooh! It perfectly grasps all of my titles!"
70010010-347 = "This is only the beginning!"
70010010-348 = "It is an ultra-high-performance supercomputer that learns just like a human, after all!"
70010010-349 = "('Just like a human'... Obviously. After all—)"
70010010-351 = "Inside the box"
70010010-352 = "This is right, isn't it?"
70010010-354 = "My, you certainly memorized that long string of titles well."
70010010-355 = "In the Publishing Department, typing it out every time was such a hassle that we made a printed template for her titles."
70010010-356 = "Like stock footage?"
70010010-358 = "If you know the enemy and know yourself, you need not fear the result of a hundred battles.#nAccurately grasping the oppressor's titles is the foundation of revolution!"
70010010-359 = "S-Shh...! Please don't be so loud!#nThey'll find out we're inside the box!?"
70010010-360 = "Don't worry! This is a special soundproof box made by Special Class 183.#nIt's designed so sound won't leak."
70010010-361 = "We just need to check outside using the external microphone and the peephole."
70010010-362 = "This is completely reckless!#nIf we get caught... we might end up living in this box until graduation..."
70010010-364 = "It's actually quite cozy in here... I'm getting kind of sleepy... Mufu..."
70010010-365 = "...Zzz..."
70010010-366 = "That's just oxygen deprivation!"
70010010-367 = "Did we all even need to get in here in the first place?"
70010010-369 = "Because there's a limit to what one person can answer alone."
70010010-370 = "Besides, we can't just turn a blind eye when a comrade is in need, right?"
70010010-371 = "I think it's more accurate to say we couldn't just stand by and watch a tragedy unfold..."
70010010-372 = "If I knew the plan was so flawed it wouldn't even score a 2,#nI wouldn't have cooperated from the start!"
70010010-374 = "I see. So Takane took pity on her."
70010010-375 = "Did you say something, you deadline-breaking author who's only here to play around under the guise of 'gathering material'?"
70010010-376 = "Ugh...! The deadline in front of me is important, but gathering material for the future is also crucial—"
70010010-378 = "Here comes the next question!"
70010010-380 = "(I wonder if everyone inside is okay...)"
70010010-381 = "(If we get caught... even I might get stuffed in that box...!)"
70010010-383 = "Let's do a hard one this time! I've prepared a math problem!"
70010010-384 = "It's a problem recommended by the Academy. Mediocre specs shouldn't be able to solve it!"
70010010-386 = "(An Academy-level problem!? O-Oh no!)"
70010010-388 = "I even got an answer key with explanations. Alright, let's put it to the test!"
70010010-393 = "P-President! U-Um, of course I'm confident in it, but...!"
70010010-394 = "Hm? Is there a problem?"
70010010-395 = "Um, the truth is...!"
70010010-396 = "(This was reckless after all... I should confess before we get found out...!)"
70010010-397 = "I am terribly sorry! Please forgive—"
70010010-402 = "Oh! The answer is out!"
70010010-404 = "—me... Wait, huh?"
70010010-406 = "Let's see here..."
70010010-407 = "I don't really understand the contents, but it's identical to the model answer."
70010010-408 = "Marina! This is wonderful!"
70010010-409 = "Now then... weren't you about to say something?"
70010010-411 = "(...Correct? And so fast!?)"
70010010-412 = "N-No! Thank you for preparing the problem!"
70010010-413 = "Indeed. Verification is also an important duty of the President. This much is to be expected! Hahaha!"
70010010-414 = "A-Ahaha! Hahaha!"
70010010-416 = "T-That last problem! You solved it, Minori!?"
70010010-417 = "I feel like there were more symbols than numbers in it!?"
70010010-418 = "You started solving it the moment the paper was coming in, didn't you?"
70010010-420 = "I don't mean to be humble, but it was just a normal problem, you know?"
70010010-422 = "And to get it right too... A perfect 10 out of 10 performance!"
70010010-423 = "Mufufu, high praise indeed."
70010010-425 = "President Minori, you're actually good at studying... That's amazing..."
70010010-426 = "The chains of oppression must be severed with a will of steel and an intellect of fire, after all!"
70010010-427 = "As expected of Red Winter's number one person of interest. Her words carry a different weight. Mufufufu."
70010010-429 = "Another question is coming!"
70010010-443 = "(We've managed to fool her so far, but...)"
70010010-444 = "(Why do I... have a bad feeling about this...)"