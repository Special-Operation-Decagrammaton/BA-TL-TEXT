2005305-81 = "C, could you possibly be from SCHALE……?"
2005305-82 = "I-I-I-I apologize!#nPlease, have a safe trip home!"
2005305-86 = "[ns] \"Let's go, Michiru.\""
2005305-87 = "O, okay!"
2005305-89 = "(And so, I left the venue with Michiru.)"
2005305-91 = "Nearby park"
2005305-92 = "Ugh, how embarrassing……"
2005305-93 = "I almost got taken in by a scam like that……"
2005305-94 = "Wait, Sensei, could it be……"
2005305-95 = "Did you know from the start?"
2005305-96 = "[s] \"To an extent, yes.\""
2005305-97 = "Ughhhhh…… that’s mean, Sensei……!"
