[translation]
2005305-1 = "The Ninja Girl Wants to Know the Secret!"
2005305-2 = "Briefing Venue"
2005305-3 = "(I was worried about Michiru...)"
2005305-4 = "(I decided to join her.)"
2005305-5 = "Ah, Sensei!#nOver here, over here!"
2005305-6 = "……Hm?"
