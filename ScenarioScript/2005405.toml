[translation]
2005405-1 = "Under the Same Starry Sky"
2005405-2 = "[ns] \"We managed to make it through another day, didn't we...\""
2005405-5 = "Yes. Have you already had your dinner?"
2005405-6 = "[s] \"Just a little while ago. I think I'm starting to miss a normal meal...\""
2005405-7 = "I suppose it's only natural to get tired of eating frozen rations on a rotation..."
2005405-8 = "They aren't exactly bad, but they aren't particularly delicious either. I suppose that's the best way to put it."
2005405-9 = "Regardless, since you've already eaten, here."
2005405-10 = "It's motion sickness medicine."
2005405-11 = "[s1] \"Thank you. I get motion sick easily, so this helps.\"\n[s2] \"I'm pretty resistant to motion sickness, so I'll be fine.\""
2005405-12 = "Fufu. Being prepared for anything—that is my duty as a Life Staff."
2005405-13 = "You can rely on me more, you know?"
2005405-14 = "Even so, there is always a 'just in case'."
2005405-15 = "It's a rare opportunity, after all. It would be a shame if you were to feel unwell, wouldn't it?"
2005405-21 = "...Well then."
2005405-22 = "Shall we begin the performance test?"
2005405-23 = "[ns] \"Anytime!\""
2005405-26 = "[ns] \"Waaaaah!\""
2005405-28 = "Sensei, how is it?"
2005405-29 = "[ns] \"This bike is so fast!\""
2005405-30 = "It's a wheelchair!"
2005405-31 = "[ns] \"This wheelchair is way faster than a bike!!\""
2005405-32 = "Here we go!#nHold onto my waist tighter!"
2005405-33 = "If you fall off and get hurt, I'll be in trouble too!"
2005405-34 = "[ns] \"Got it!!!\""
2005405-41 = "Phew... haa...#nFufu, that felt refreshing."
2005405-42 = "How was the ride in the wheelchair?"
2005405-43 = "There's very little rattling, and sudden acceleration and braking are a breeze."
2005405-44 = "If I disengage all the limiters, it only takes 0.956 seconds to reach 100 km/h."
2005405-45 = "...Though, since I have you on board, I won't be driving that recklessly."
2005405-46 = "[s] \"Please, drive safely!\""
2005405-47 = "Of course. I save the more challenging driving for my late-night tests."
2005405-48 = "...Yes? You say I should go easy on the night outings?"
2005405-49 = "..."
2005405-50 = "This is, well... it's for that."
2005405-51 = "It doubles as a performance test for the wheelchair, but... let's just call it reconnaissance."
2005405-52 = "...No, I understand what you're trying to say.#nThat those are roles for Toki or Eimi, and that drones could cover it, right?"
2005405-53 = "..."
2005405-54 = "If you leave everything to the field team, don't you think your sense of reality starts to drift?"
2005405-55 = "The discrepancy between the field team and the analysis team—that is the breeding ground for poor judgment!"
2005405-56 = "[s] \"I see...\""
2005405-57 = "...Or so I say."
2005405-58 = "There are things you can only see here, in this place, at this time."
2005405-59 = "It is likely a byproduct that even the administrators here aren't aware of."
2005405-60 = "...Something entirely natural. The way the world exists, perhaps."
2005405-61 = "Everything having a clear intent and result... you cannot measure this world with that mindset."
2005405-62 = "That is exactly why astrology, numerology, and symbolism are so interesting."
2005405-63 = "They subtly, yet secretly, convey 'fragments of the world' to us—#nperhaps."
2005405-64 = "Though, I suppose the knowledge I've studied won't apply in this place."
2005405-65 = "[s] \"Why is that?\""
2005405-66 = "The 'laws of the heavens' are fundamentally different."
2005405-67 = "The positions of the stars, their movements, and the mathematical formulas that intertwine them..."
2005405-68 = "For us, this is a place that could be called a brand-new 'sky and earth'."
2005405-69 = "Of course, building a new astrological theory from scratch would be fine too."
2005405-70 = "There is nothing more enjoyable than creating a theory from a blank slate."
2005405-71 = "It's just a shame... that it seems we won't be given that much time."
2005405-75 = "[wa:500]― [log=히마리 결전]It's strange, isn't it?[/log]"
2005405-77 = "― [log=히마리 결전]Even though we can look up at the night sky here, just like in Millennium,[wa:2080] it's different.[/log]"
2005405-80 = "[wa:2020]― [log=히마리 결전]The twinkling stars[wa:1890] are different from the ones we know.[/log]"
2005405-82 = "― [log=히마리 결전]It's hard to put into words...[wa:3400] an indescribable feeling.[/log]"
2005405-85 = "[ns] \"But to me, Himari, you look even more mysterious.\""
2005405-86 = "[wa:440]― [log=히마리 결전]Yes...!?[/log]"
2005405-88 = "― [log=히마리 결전]Ah,[wa:1480] thank you.[wa:2500] I'll...[wa:2330] take that as a compliment.[/log]"
2005405-91 = "[wa:1060]― [log=히마리 결전]...Even if we are under the same night sky.[/log]"
2005405-93 = "― [log=히마리 결전]It doesn't necessarily mean we can understand each other.[/log]"
2005405-96 = "[wa:520]― [log=히마리 결전]But at the very least, since we are under the 'same' night sky,[wa:2200][/log]"
2005405-98 = "― [log=히마리 결전]I think it could at least be a starting point[wa:2990] for understanding one another.[/log]"
2005405-101 = "[wa:1370]― [log=히마리 결전]That is,[wa:2000] what I think.[/log]"
2005405-103 = "― [log=히마리 결전]What do you think,[wa:2010] Sensei?[/log]"
2005405-109 = "How was it?#nToday's... wheelchair experience."
2005405-110 = "[s3] \"It was truly impressive.\"\n[s4] \"I'd love to ride again.\""
2005405-113 = "Ah, oh..."
2005405-114 = "To think that you, Sensei, would invite me..."
2005405-115 = "...Ahem."
2005405-116 = "It's getting late."
2005405-117 = "Shall we head back before the others start to worry?"
2005405-120 = "(The ride home was the definition of safe driving.)"