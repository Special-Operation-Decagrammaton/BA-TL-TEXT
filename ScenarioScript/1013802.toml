[translation]
1013802-1 = "Take it off, quickly!"
1013802-2 = "(I bought the materials Rena asked for and headed to the Wild Hunt Academy.)"
1013802-3 = "(...However.)"
1013802-5 = "Huh!? W-what are you doing!?"
1013802-6 = "You're putting ketchup on pasta...!?"
1013802-7 = "This is delicious, want some?"
1013802-8 = "Impossible... That is a blasphemy against the Wild Hunt!!"
1013802-9 = "Wait, hold on...? What is that rice?"
1013802-10 = "Oh, this goes really well with pasta sauce~"
1013802-11 = "Gyaaaaah!?!? Unbelievable!! Duel! It's a duel!"
1013802-12 = "Ahahahaha! Fine! Let's go outside!"
1013802-14 = "[ns] \"Um... what are you doing?\""
1013802-20 = "(I got caught up in a fight between some passing students.)"
1013802-26 = "What is the meaning of fighting in front of the teacher!?"
1013802-27 = "But this person... said they eat rice with pasta sauce on it!?"
1013802-28 = "And you, didn't you add water to your espresso?"
1013802-29 = "What...!? Hey, take them both away!!"
1013802-35 = "[ns] \"I see, it's a sensitive issue...\""
1013802-36 = "Phew... the peace of the Wild Hunt has been preserved."
1013802-37 = "Teacher, are you okay?"
1013802-38 = "[s] \"Y-yeah. I'm fine.\""
1013802-39 = "That's good to hear."
1013802-40 = "I apologize for the unsightly scene. I will make sure to educate them thoroughly!"
1013802-41 = "You two... I'm going to drill the rules of the Wild Hunt into you!"
1013802-46 = "(Although the fight had settled down...)"
1013802-47 = "(The place remained in a mess.)"
1013802-48 = "[ns] \"Maybe I should put the overturned table back...\""
1013802-50 = "(As I crouched down to tidy up the table...)"
1013802-54 = "[ns] \"...!?\""
1013802-55 = "(I suddenly felt a draft on my backside!)"
1013802-56 = "(Don't tell me... did my pants rip in a place like this!?)"
1013802-57 = "[ns] \"W-what do I do!? If I stay like this, I'll look like a pervert...!\""
1013802-58 = "(My mind went completely blank...)"
1013802-59 = "(Think! Find a way out of this crisis!!)"
1013802-60 = "...?"
1013802-61 = "Teacher? What are you doing in a place like this?"
1013802-64 = "[ns] \"...!!!\""
1013802-65 = "You said you were coming to the academy, but you never showed up! I was looking for you!"
1013802-66 = "You didn't even answer your phone..."
1013802-67 = "...Huh? What's wrong? You look pale. #nAnd your posture... it's kind of weird, too."
1013802-68 = "..."
1013802-69 = "Ah! You're hiding something, aren't you?"
1013802-70 = "What is it? What's behind you? Show me!"
1013802-71 = "[s] \"N-no, you can't see this...!!\""
1013802-72 = "What do you mean I can't!?"
1013802-73 = "If you're trying to pull a prank on me, I won't let you get away with—"
1013802-77 = "..."
1013802-78 = "...!?"
1013802-79 = "What... how did this happen!!"
1013802-80 = "If it ripped, you should have just said so!!"
1013802-81 = "[s] \"I-I tried to say it, but...!\""
1013802-82 = "Oh, geez!"
1013802-83 = "Just wait here! I'll be right back...!"
1013802-88 = "(I wrapped the blanket Rena brought around my waist and moved to another spot.)"
1013802-90 = "Phew... this should be fine."
1013802-91 = "[s] \"Thank you so much, Rena.\""
1013802-92 = "Stop moving like that."
1013802-93 = "Besides, I haven't done anything yet."
1013802-94 = "It's too early to thank me."
1013802-95 = "...*sigh*"
1013802-99 = "Here, take them off."
1013802-100 = "[s] \"...Huh?\""
1013802-101 = "Are you going to make me say it twice!?"
1013802-102 = "Take them off, quickly! #nI'll mend them for you!"
1013802-103 = "[s] \"Oh, right!!\""
1013802-106 = "(I hurriedly took off my pants in secret and handed them to Rena.)"
1013802-107 = "(I watched her mend them while wrapped in the blanket.)"
1013802-109 = "So... you did this while trying to lift a table?"
1013802-110 = "And why do you even need to do that? Isn't that the Dormitory Warden's job?"
1013802-111 = "Honestly, you're way too much of a pushover."
1013802-112 = "[s] \"Does that mean you like me!?\""
1013802-113 = "W-whaaat!? What are you talking about!?"
1013802-117 = "...Ah."
1013802-118 = "H-hey! You made me mess up, geez!!"
1013802-119 = "Always giving me more work to do... you're just like the seniors."
1013802-120 = "[s] \"So, I'm an important person to you too...?\""
1013802-121 = "...Do you want me to sew your pockets shut?"
1013802-122 = "If you don't want that, then stay still."
1013802-123 = "It's dangerous when I'm using a needle and thread... honestly."
1013802-124 = "I'm going to focus now, so wait quietly!"
1013802-126 = "(I decided to wait quietly as Rena said.)"
1013802-127 = "(...A while later)"
1013802-129 = "There, it's done. Try them on."
1013802-136 = "Did you put them on?"
1013802-137 = "[s] \"Yes, I did.\""
1013802-138 = "Are you sure? Can I trust you?"
1013802-139 = "[s] \"Of course!\""
1013802-140 = "O-okay. I'll trust you then."
1013802-141 = "I'm opening my eyes now, okay?"
1013802-142 = "..."
1013802-143 = "How is it? Is it easy to move in?"
1013802-144 = "[s] \"It feels much better! Look, look!\""
1013802-150 = "[ns] \"Oh...\""
1013802-153 = "Ugh, you idiot!!"
1013802-154 = "If you move around that much, of course it's going to rip again!!"
1013802-155 = "Take them off!! Do you want me to sew your pockets shut!?"
1013802-157 = "(...After that, I quietly handed my pants back to Rena and had her mend them.)"