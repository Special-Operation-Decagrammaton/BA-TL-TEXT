[translation]
1601905-1 = "Upgrade"
1601905-2 = "As you know, I have received a new weapon."
1601905-3 = "I am, so to speak, in an 'upgraded' state."
1601905-4 = "[s] \"I see.\""
1601905-5 = "The new weapon in question is this pair of energy pistols."
1601905-6 = "As the name suggests, they are energy weapons."
1601905-7 = "In other words, as long as energy can be supplied, they can be used indefinitely, provided the durability holds up."
1601905-8 = "It is essentially infinite ammunition."
1601905-9 = "Furthermore, they are dual pistols."
1601905-10 = "Sensei, do you not feel something here?"
1601905-11 = "[s1] \"Infinite ammo and... dual pistols...?\"\n[s2] \"What are you talking about...?\""
1601905-14 = "A certain streamer once said that this is one of the best combinations."
1601905-15 = "Which means I believe this is an upgrade befitting the perfect Toki Asuma. Yay."
1601905-16 = "[s] \"So... what was it you wanted to talk about...?\""
1601905-17 = "It is nothing of great importance."
1601905-18 = "I just had a sudden thought."
1601905-19 = "As you know, Sensei, I have various armaments I have used until now."
1601905-20 = "And now, I have become capable of using energy weapon systems."
1601905-21 = "In other words, if I could upgrade as many things as possible... for example, the Arm Gear I used during infiltration missions."
1601905-22 = "It would be cool—"
1601905-23 = "It would be interesting—"
1601905-28 = "...No. I thought it would be useful for strengthening our combat power."
1601905-29 = "[s] \"Did you just let two honest thoughts slip out!?\""
1601905-30 = "You misheard me."
1601905-31 = "[s] \"Are you sure about that?\""
1601905-32 = "Yes."
1601905-33 = "...What is the meaning of that sigh? #nThey say that if you sigh, your happiness will escape."
1601905-34 = "However, since you have me, the lucky rabbit maid and agent scout, #nyou have nothing to worry about."
1601905-35 = "[s] \"...Back to the topic, how exactly do you want to upgrade them?\""
1601905-36 = "My apologies. I got a bit sidetracked."
1601905-37 = "...In short, this is what I thought."
1601905-38 = "If I apply the energy weapon system to the Arm Gear—"
1601905-39 = "Couldn't I launch the Arm Gear like a rocket?"
1601905-40 = "[s] \"That sounds cool!\""
1601905-41 = "As expected, you understand, Sensei."
1601905-42 = "What do you think? Isn't it the best idea?"
1601905-43 = "Come now, praise me quickly. And give me some headpats too."
1601905-44 = "You want to see me launch the Arm Gear, don't you?"
1601905-45 = "Even if you don't think so, Sensei, I want to see it. So, hurry."
1601905-46 = "[s] \"Can I ask one thing before that?\""
1601905-47 = "What is it?"
1601905-48 = "[s] \"Why go through the trouble of asking for my permission?\""
1601905-52 = "..."
1601905-53 = "............"
1601905-54 = ".............."
1601905-55 = "[s] \"Toki, look me in the eyes.\""
1601905-56 = "Yes."
1601905-57 = "[s] \"Answer me honestly.\""
1601905-58 = "..."
1601905-59 = "[s] \"Looking away won't work.\""
1601905-63 = "...I understand. I will answer."
1601905-64 = "Rio-sama and Himari-bucho denied the request for safety reasons."
1601905-65 = "They said there is a high possibility of getting burned by the heat when launching it."
1601905-66 = "[s] \"That is definitely a no-go, then.\""
1601905-67 = "Sensei."
1601905-68 = "For a greater purpose, don't you think it's fine to ignore trivial matters?"
1601905-69 = "You say it's not a trivial matter?"
1601905-70 = "..."
1601905-71 = "Even if you think so, Sensei, to me, it is trivial. #nTherefore, please grant me permission."
1601905-72 = "[s] \"Denied.\""
1601905-73 = "Sensei..."
1601905-74 = "[s] \"Even if you look at me like that, no means no.\""
1601905-75 = "Then, at the very least, how about an Arm Gear that can fire a high-output beam...?"
1601905-76 = "It could do a 3-round burst, and if I attach auxiliary parts, I could increase the charge capacity—"
1601905-77 = "[s] \"Rejected.\""
1601905-78 = "Sensei..."
1601905-80 = "(Afterward, I ended up having to console Toki, who had become a bit sulky.)"
1601905-81 = "(After patting her head for a while, Toki finally stopped being stubborn...)"