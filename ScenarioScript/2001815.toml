[translation]
2001815-1 = "Claymore, Claymore, Claymore!"
2001815-2 = "Schale - Office"
2001815-3 = "(One afternoon)"
2001815-4 = "(While clearing out a mountain of paperwork with Moe—)"
2001815-9 = "There's no end in sight..."
2001815-10 = "[s] \"Yeah...\""
2001815-14 = "Hey, Sensei. How am I supposed to fill this out?"
2001815-15 = "[s] \"Let's see, that would be...\""
2001815-20 = "Ugh... Sensei, do you do this much every single day?"
2001815-21 = "I mean, I love destruction, but isn't this a bit much?"
2001815-22 = "[s1] \"Sorry for the heavy workload.\"\n[s2] \"Maybe we should switch to a different task for a change of pace—\""
2001815-25 = "No, I'm not complaining or anything..."
2001815-26 = "I'm the one who said I'd help. #nI'm used to simple tasks, but still."
2001815-27 = "Still, doing paperwork for this long makes my fingertips feel all tingly..."
2001815-28 = "[s3] \"Should we take a break?\"\n[s4] \"I'll go make some coffee, so why don't you do some stretches in the meantime?\""
2001815-31 = "Roger that."
2001815-35 = "Oh, right... I think I brought that thing with me."
2001815-36 = "Hehehe... found it."
2001815-41 = "Ready, set—"
2001815-43 = "[ns] \"Stop!\""
2001815-45 = "Whoa...!?"
2001815-46 = "W-what!? Sensei... you scared me."
2001815-47 = "[s5] \"Sorry for startling you...\"\n[s6] \"Is that...\""
2001815-53 = "[ns] \"...a bomb detonator?\""
2001815-54 = "...A detonator?"
2001815-55 = "Ah... it looks like one, but it's something else."
2001815-56 = "It's not like I go around blowing things up everywhere—"
2001815-60 = "—Well, sometimes I do. #nBut this is different!"
2001815-61 = "If you don't believe me, here. Try holding it."
2001815-62 = "You'll know for sure once you touch it yourself!"
2001815-63 = "[s7] \"Could it be...\"\n[s8] \"Are you trying to make me press the button...?\""
2001815-66 = "I like the way you think. That's a very destructive idea..."
2001815-67 = "But like I said, this is different."
2001815-68 = "Look closely. There's no detonator cap, right?"
2001815-69 = "[s9] \"You're right... a detonator should have one.\"\n[s10] \"Then what is this?\""
2001815-72 = "It's a hand gripper. Never used one?"
2001815-73 = "See, you just squeeze it like this... to train your grip strength."
2001815-77 = "They say the moderate stimulation helps relieve stress."
2001815-78 = "[s11] \"I'm glad it wasn't a detonator...\"\n[s12] \"Why are you using one shaped like that?\""
2001815-81 = "Ah... I made this by modifying a broken detonator."
2001815-82 = "You know, sometimes you just get that sudden urge, right? #nThe kind where you know you absolutely shouldn't do it."
2001815-85 = "[ns] (Well, you really shouldn't do that...)"
2001815-86 = "I used to carry around broken switches for times like that..."
2001815-87 = "But I figured, why not kill two birds with one stone and train my grip at the same time?"
2001815-88 = "So, I took out the detonator cap and put in a spring. #nAnd voilà, the perfect hand gripper! ♪"
2001815-89 = "Even as an operator, you can't neglect your training. #nPlus, you need a strong grip to carry supplies, you know~"
2001815-90 = "Also, the way my hands feel all tingly after using it... it's kind of addictive... #nhah, hah... it's almost... destructive..."
2001815-91 = "[s13] \"That's a great idea.\"\n[s14] \"Grip strength is pretty important, after all.\""
2001815-94 = "Right? #nAnd I think you're stronger than you look, Sensei."
2001815-95 = "Want to try it out?"
2001815-96 = "[s] \"Alright then...\""
2001815-102 = "S-Sensei? Why are you holding my hand—"
2001815-103 = "[s] \"Huh? Didn't you mean for me to check your grip strength?\""
2001815-104 = "...No, I mean, you're not wrong, but..."
2001815-105 = "I meant for you to try squeezing the gripper..."
2001815-106 = "Well, I guess I can tell how strong the gripper is by your grip, too..."
2001815-110 = "Hehehe... you've got some decent arm strength, Sensei."
2001815-111 = "Want to try arm wrestling?"
2001815-112 = "Since we're at it, the winner gets the right to make the loser do whatever they want."
2001815-114 = "(After that, I arm-wrestled Moe.)"
2001815-115 = "(Despite giving it my all, I lost three times in a row...)"