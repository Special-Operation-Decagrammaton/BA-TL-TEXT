[translation]
2005206-1 = "The Psychology of Management"
2005206-2 = "Sensei, would you do anything for the sake of sales?"
2005206-3 = "[s1] \"That's a scary thing to ask...\"\n[s2] \"Did something happen?\""
2005206-6 = "Actually, things have been a little... tight lately."
2005206-7 = "Well, worries in the publishing industry aren't exactly a new phenomenon."
2005206-8 = "Are you aware of this, Sensei?"
2005206-9 = "The saying that \"a manager can always claim they're in a crisis.\""
2005206-10 = "If sales go up, they can insist it's a crisis because the future is uncertain—"
2005206-11 = "And if sales drop, well, that's just a crisis."
2005206-12 = "After hitting record-high sales, a relative decline is inevitable,"
2005206-13 = "so that drop in sales ratio becomes the perfect justification to call it a major crisis."
2005206-14 = "Honestly... you really can't trust the manager breed, hehe."
2005206-15 = "[s] \"Then I guess I can't trust you either, Yakumo.\""
2005206-16 = "Huh."
2005206-17 = "......I, is that... how it works...?"
2005206-18 = "I, I was just joking! Just a joke. Hehe, he..."
2005206-19 = "A, anyway."
2005206-20 = "Offline books are treated as souvenirs now, and"
2005206-21 = "online books are... in a state of unpredictable chaos."
2005206-22 = "Hmm... I wonder if there's some brilliant idea lying around that could turn things around."
2005206-23 = "Even if there were, it would probably just be a stopgap measure."
2005206-24 = "But if you stack enough stopgap measures, they can eventually become a solution."
2005206-25 = "[s] \"First, we need to get everyone to read books.\""
2005206-26 = "That is precisely the fundamental policy of my Publishing Department."
2005206-27 = "Ah, I wish it would snow heavily..."
2005206-28 = "Why, you ask? If people can't go out because of heavy snow, I could manipulate public opinion to suggest that staying indoors and consuming content is the best course of action..."
2005206-29 = "Oops, excuse me... I meant that I could provide a \"wholesome recommendation.\""
2005206-30 = "[s] \"You're not even trying to hide it anymore, are you...\""
2005206-31 = "...Please say that I am properly complying with corporate ethics."
2005206-32 = "And here is the problem."
2005206-33 = "Red Winter is always covered in snow, you see..."
2005206-34 = "Snowfall is an everyday occurrence here, so saying there's a \"heavy snowstorm\" doesn't carry much weight..."
2005206-35 = "[s] \"So, you want to emphasize the heavy snow?\""
2005206-36 = "In conclusion, yes."
2005206-37 = "Wait? You have a good idea...?"
2005206-41 = "......Um, Sensei?"
2005206-42 = "I'm having trouble keeping up, could you explain that one more time...?"
2005206-43 = "[s3] \"A photo of Yakumo making a snow angel—\"\n[s4] \"Let's use that for the next cover!\""
2005206-46 = "Why..."
2005206-47 = "[s] \"You can't make a snow angel unless there's a lot of snow.\""
2005206-48 = "But why do I have to be the one to do it...?"
2005206-49 = "I'm not good at being in front of people."
2005206-50 = "I'm a self-proclaimed homebody, after all..."
2005206-51 = "[s5] \"Exactly!\"\n[s6] \"If people see someone like Yakumo buried in the snow,\"\n[s7] \"they'll definitely think it must have snowed a ton.\""
2005206-57 = "Oh... if the Publishing Department head who never goes outside is buried in snow—"
2005206-58 = "Everyone will think it's an extraordinary situation...?"
2005206-59 = "And from your perspective, Sensei, you just want to take the picture because it looks interesting...?"
2005206-60 = "...Isn't that just you wanting to take the picture, Sensei?"
2005206-61 = "[s] \"Didn't you say you'd do anything for the sake of sales?\""
2005206-62 = "Ugh... this is karma..."
2005206-63 = "It can't be helped... loose lips sink ships..."
2005206-71 = "[wa:470]― [log=야쿠모]Oh...[wa:1590] it's so fluffy.[/log]"
2005206-74 = "― [log=야쿠모]It's surprisingly[wa:840] nice...[wa:1460] I suppose.[/log]"
2005206-77 = "[wa:330]― [log=야쿠모]...Or so[wa:560] I thought, but[wa:2550] it's cold[wa:780] after all.[/log]"
2005206-80 = "― [log=야쿠모]Achoo![/log]"
2005206-83 = "[ns] \"Look this way, please!\""
2005206-84 = "[wa:1910]― [log=야쿠모]Did you get it?[/log]"
2005206-86 = "― [log=야쿠모]Now[wa:400] it's[wa:450] your turn, Sensei.[/log]"
2005206-89 = "― [log=야쿠모]Huh?[/log]"
2005206-91 = "― [log=야쿠모]...You don't[wa:530] intend to make[wa:720] only me do this, do you?[/log]"
2005206-94 = "[wa:650]― [log=야쿠모]Goodness, [wa:1570]that would be far too[/log]"
2005206-96 = "― [log=야쿠모]simple-minded,[wa:390] don't you think?[wa:1730] Sensei?[/log]"
2005206-99 = "[wa:980]― [log=야쿠모]Red Winter's[wa:850] General Winter,[/log]"
2005206-101 = "― [log=야쿠모]is equal[wa:680] to everyone, you know?[wa:1920] Hehe.[/log]"