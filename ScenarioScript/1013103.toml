[translation]
1013103-1 = "Ice Hockey"
1013103-2 = "Welcome, Sensei!"
1013103-3 = "[s] \"Pardon the intrusion!\""
1013103-4 = "Now then, shall we head to the screening room immediately?"
1013103-5 = "Hm? You thought we were watching it here?#nNo, this is strictly a workspace."
1013103-6 = "Besides, we don't have the equipment to play videos here."
1013103-7 = "Come! Right this way!"
1013103-12 = "[ns] \"Wait...? Isn't this some incredible equipment?\""
1013103-13 = "Since you are visiting, Sensei, it is only natural that I prepare this much."
1013103-14 = "[s1] \"I appreciate the sentiment, but...\"\n[s2] \"Does the Publishing Department really have facilities like this?\""
1013103-17 = "Ah, well, you see..."
1013103-18 = "That is... while the Publishing Department is a publishing department in name only..."
1013103-19 = "It is entirely because our President is... a bit too fond of money, so to speak."
1013103-20 = "She has been quite proactive in all of Red Winter's cultural projects...#nNo, she has actually consolidated most of them."
1013103-21 = "So... yes..."
1013103-22 = "[s] \"...Doesn't the Administrative Office say anything about that?\""
1013103-23 = "R-Red Winter has its own ways, Red Winter has its own methods.#nAnd the Publishing Department has its own procedures!"
1013103-24 = "Besides, we have never personally obtained any unjust profits!"
1013103-25 = "M-more importantly, Sensei!#nIt's hockey, ice hockey!"
1013103-26 = "As I mentioned the other day, the semi-finals are starting soon!"
1013103-27 = "Due to the nature of our academy, winter sports are quite popular in Red Winter..."
1013103-28 = "And ice hockey has a very passionate fanbase!"
1013103-32 = "Thank you very much for waiting!#nWe will now begin the Ice Hockey League semi-finals!"
1013103-33 = "It's starting, Sensei!"
1013103-34 = "You may already know this, but an ice hockey team consists of 6 players. Surprisingly few, right?"
1013103-35 = "The game consists of three 20-minute periods, for a total of 60 minutes.#nEach 20-minute segment is called a \"period.\""
1013103-36 = "The rules are quite simple. You just hit the puck with your stick and put it into the goal."
1013103-37 = "Oh, and by the way, in ice hockey, it is customary to call them a \"goaltender\" rather than a goalkeeper."
1013103-38 = "A fierce body check! That was brilliant! Such aggressive defense!"
1013103-39 = "[s] \"Wait, they just... knocked the other person down with a body check!?\""
1013103-40 = "Yes, that level of contact is within the acceptable range for Red Winter ice hockey."
1013103-41 = "More importantly, you over there! Get up quickly! Delay of game is a penalty!"
1013103-42 = "[s3] \"So violent body checks are safe...\"\n[s4] \"And being knocked down is a foul...\""
1013103-45 = "Exactly! That is the essence of Red Winter ice hockey!"
1013103-46 = "[s] \"Ah, they just hit someone with their stick.\""
1013103-47 = "That is unacceptable! That's a 5-minute major penalty!"
1013103-48 = "W-what?! Referee, what are you doing!? Only 2 minutes?!#nHas the referee been bribed or something!?"
1013103-49 = "[s5] \"Is that retaliation for the body check earlier?\"\n[s6] \"They just did a 3-hit body check combo and the player went flying...\"\n[s7] \"The glass in the stands cracked... is this also Red Winter hockey!?\""
1013103-53 = "Ah... that was a bit excessive. If the glass cracks, the game is suspended until it's replaced."
1013103-54 = "Besides, with such consecutive and intentional violent body checks, it should definitely be a minimum 10-minute misconduct penalty—"
1013103-55 = "The signal to resume the game! Today's referee is surprisingly generous!"
1013103-56 = "Referee!? Do you not wish to see tomorrow's sunrise anymore!?!?"
1013103-57 = "[s] \"Oh. A fight started.\""
1013103-58 = "Naturally! Sometimes you just need to reset things like this!"
1013103-59 = "In the first place, it would be strange if a brawl didn't break out during an ice hockey game."
1013103-60 = "When the home team is losing by a large margin, they sometimes even intentionally incite a brawl as part of the fan service."
1013103-61 = "It's to provide a spectacle for the fans who paid for their tickets when the game becomes hopeless."
1013103-62 = "Besides, ice hockey gear is heavily armored, and—"
1013103-63 = "It's an unwritten rule to put down your sticks and fight with your bare hands,#nso it rarely gets too out of hand—"
1013103-69 = "[ns8] \"It looks like the spectators are storming the rink...\"\n[ns9] \"They're burning the team flag outside...\""
1013103-72 = "...Oh."
1013103-73 = "...The situation has escalated a bit."
1013103-74 = "Is this also a common occurrence, you ask?"
1013103-75 = "..."
1013103-76 = "Well... it doesn't happen very often."
1013103-77 = "But it's not exactly a rare sight either... is it...?"
1013103-81 = "...Therefore, we denounce the Administrative Office!"
1013103-82 = "Denounce them! Denounce them!"
1013103-83 = "It's still cold today! The 3-day work week never sticks! The pudding ration is always just one, and it's watered down!"
1013103-84 = "And losing the ice hockey game like this! It's all the Administrative Office's fault!"
1013103-85 = "That's right! That's right!"
1013103-86 = "Comrades! Let's head to the Administrative Office!"
1013103-87 = "Let's go! Let's go!"
1013103-90 = "[ns10] \"Is this... by any chance...\"\n[ns11] \"Red Winter's... morning greeting!?\""
1013103-93 = "W-where on earth did you hear such an expression!?"
1013103-94 = "...I hate to say this, but as a student of Red Winter... it's a bit painful to hear."
1013103-95 = "Ah, ah, mic test, mic test."
1013103-96 = "Hello everyone. Students of Red Winter, we are announcing that a coup d'état has occurred at the main ice hockey stadium."
1013103-97 = "We, the Administrative Office, promise to deal with this situation with all our might, and as of this moment, we are declaring a local state of emergency to ensure order."
1013103-98 = "We ask that all students remain calm and focus on their studies and labor."
1013103-99 = "I repeat. Red Winter is safe. Red Winter is safe."
1013103-100 = "Hey, how long do you think we can hide this time?"
1013103-101 = "I give it 2 days."
1013103-102 = "I say 3 days."
1013103-103 = "Wanna bet?"
1013103-104 = "Sure."
1013103-105 = "You idiots, the mic is still on!!!"
1013103-106 = "BEEEEEEEEEP"
1013103-111 = "..."
1013103-112 = "[s] \"...\""
1013103-113 = "Um, Sensei?"
1013103-114 = "It seems a bit dangerous out there today, so..."
1013103-115 = "Until things calm down, would you like to watch a collection of great ice hockey matches with me...?"
1013103-117 = "(And so, I watched a collection of great ice hockey matches with Takane...)"