[translation]
2005306-1 = "A ninja girl who's on top of the trends!"
2005306-3 = "[ns] \"Is that you, Michiru?\""
2005306-8 = "Domo, Sensei-dono."
2005306-12 = "[ns] \"!?\""
2005306-13 = "What's with that reaction!?"
2005306-14 = "It's me, Michiru, Sensei-dono!?"
2005306-15 = "[s1] \"To think you'd knock so politely before coming in...\"\n[s2] \"Are you really the Michiru I know!?\""
2005306-18 = "Nyaa!? What do you take me for!?"
2005306-19 = "...Actually, never mind. I'm feeling a bit anxious now."
2005306-20 = "Anyway! I'm a whole new person today!"
2005306-21 = "I've even prepared what they call a 'briefing'!"
2005306-22 = "[s] \"A briefing...!?\""
2005306-23 = "That's right!"
2005306-24 = "'The Michiru Ninja Chronicles: Growth Secrets and Project Presentation Briefing'!"
2005306-25 = "Hehehe, you're curious, aren't you?"
2005306-26 = "[s] \"Is this what you mentioned on MomoTalk?\""
2005306-27 = "Correct!"
2005306-28 = "I came up with these secrets with 100% purity, without relying on any weird methods...!"
2005306-29 = "Now then, let the briefing begin!"
2005306-30 = "—First, the conclusion!"
2005306-31 = "[s] \"Starting with the conclusion!?\""
2005306-32 = "It is—"
2005306-33 = "When making videos, it's best to reflect the latest trends!"
2005306-34 = "Even if it means the ninja-related content decreases just a liiittle bit..."
2005306-35 = "[s3] \"But it's a ninja channel...?\"\n[s4] \"Are you sure about that?\""
2005306-38 = "Taking one step back to take ten steps forward... that's what it's all about!"
2005306-39 = "Because, look, what do you think is the number one reason people want to watch a video?"
2005306-40 = "...It's all about the view count!"
2005306-41 = "[s5] \"You need views to get views...\"\n[s6] \"Is it like the chicken or the egg...?\""
2005306-44 = "But in reality, people just aren't interested in videos with low view counts...!"
2005306-45 = "I'm not planning on using any weird tools, but I'll do whatever it takes to boost those views!"
2005306-46 = "The viewers should enjoy it more that way! Probably."
2005306-47 = "That's why I'm uploading a video reflecting the latest trends today!"
2005306-48 = "[s] \"For example, what kind of content?\""
2005306-49 = "Heh heh heh, good question, Sensei-dono!"
2005306-50 = "The keyword I've chosen this time is... 'Fashion'!"
2005306-51 = "[s] \"Fashion...!\""
2005306-52 = "Yep, the era is all about 'fashion'."
2005306-53 = "I analyzed the 'trending videos'..."
2005306-54 = "The top of the rankings were all fashion-related content!"
2005306-55 = "Things like '7 T-shirts you won't get tired of wearing,' 'Find your grenade based on your personal color,' or 'Outerwear that goes perfectly with that gun'..."
2005306-56 = "I jumped on that trend and planned something right away!"
2005306-57 = "[s] \"Oh, what kind of content?\""
2005306-58 = "It's...!"
2005306-59 = "...Ta-da! A collaboration between fashion and ninjutsu!"
2005306-60 = "I'll come up with ninjutsu related to fashion and upload a video every week!"
2005306-61 = "I'll draw the viewers in with this content..."
2005306-62 = "And in between, I'll upload some authentic ninja content..."
2005306-63 = "Before they know it, everyone will be captivated by ninjas!"
2005306-64 = "Just like a boiled frog!"
2005306-65 = "[s] \"I'm not sure about that analogy!?\""
2005306-66 = "Anyway, that concludes the briefing...!"
2005306-67 = "I'll let the results speak for themselves!"
2005306-68 = "So, Sensei-dono, look forward to it!"
2005306-69 = "Once I become a super famous influencer, I'll scout you to be my manager!"
2005306-70 = "And that's it for today! Adios = SAYONARA!"
2005306-76 = "(Even though she used a smoke bomb, it's obvious where she went...)"
2005306-78 = "(A few days later)"
2005306-80 = "(While I was barely managing to organize the mountain of paperwork...)"
2005306-81 = "Sensei-dono..."
2005306-85 = "Help meee..."
2005306-86 = "[s7] \"...Michiru! Did you come to pick me up after becoming a star?\"\n[s8] \"Please, take me away from this paperwork hell...!\""
2005306-89 = "Eh!? No, I came here because I wanted you to help me...!"
2005306-90 = "[s] \"...Eh?\""
2005306-91 = "I uploaded that video combining fashion and ninjutsu the other day, but..."
2005306-92 = "The reaction has been strangely bad..."
2005306-93 = "There are so many dislikes compared to my previous videos...!"
2005306-94 = "[s] \"Have you checked the footage or the comments?\""
2005306-95 = "..."
2005306-96 = "Well, I'm scared to..."
2005306-97 = "So, I was wondering if you could watch it with me, Sensei-dono..."
2005306-98 = "[s] \"Understood, let's take a look.\""
2005306-99 = "Thank you, Sensei-dono..."
2005306-101 = "(And so, we decided to watch Michiru's video)"
2005306-106 = "Hyakkiyako, Old School Building 38, a certain classroom"
2005306-107 = "The Michiru Ninja Chronicles!"
2005306-108 = "Domo. I am Michiru."
2005306-109 = "Now then, the ninjutsu I'll be showcasing today is... 'The Art of Quick-Changing'!"
2005306-110 = "If you master it, it's a practical ninjutsu that lets you change into complex outfits in an instant!"
2005306-111 = "Seeing is believing..."
2005306-112 = "First, I'll show you a demonstration!"
2005306-113 = "But, just in case..."
2005306-114 = "Haryah!"
2005306-119 = "[ns] (Is she covering the lens...?)"
2005306-121 = "And with that, ta-da!"
2005306-122 = "The change is complete in an instant!"
2005306-123 = "Now, for the reveal—"
2005306-124 = "(Because the lens was covered...)"
2005306-125 = "(...nothing was recorded until the end)"
2005306-126 = "Schale Office"
2005306-127 = "..."
2005306-128 = "[ns] \"...\""
2005306-129 = "S-s-such a rookie mistake...!!"
2005306-130 = "Nyaaaaah!!"
2005306-136 = "(Perhaps too shocked, she disappeared without even using a smoke bomb)"