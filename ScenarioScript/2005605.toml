[translation]
2005605-1 = "The Cafe Fighter"
2005605-3 = "(...Early morning)"
2005605-4 = "(Today, I took the day off from work and headed to a nearby arcade.)"
2005605-9 = "I've been waiting for you, Sensei! There's no one here right now!"
2005605-10 = "I've already saved our seats... Come on, sit down quickly!!"
2005605-14 = "[ns1] \"Wait, why are you dressed like that...?\"\n[ns2] \"Pajamas at the arcade? What kind of combination is that?\""
2005605-17 = "...Huh?"
2005605-18 = "Oh, this? I just woke up, so..."
2005605-19 = "There was no time to change! A line is going to form any second now!"
2005605-20 = "Even this morning, people who had been waiting all night were turned away! You have to be here the moment the doors open!"
2005605-21 = "So please, just sit down! Why do you always worry about the little things at times like this, Sensei?!"
2005605-22 = "...Huh?"
2005605-23 = "Saving seats is just as bad as waiting all night...?"
2005605-28 = "I made sure to get here right at opening! Isn't that way better than not being able to play at all?!"
2005605-29 = "[ns] Scold her properly for the bad behavior."
2005605-30 = "U-ugh. O-okay, I understand... I won't do it again..."
2005605-31 = "B-but there's no one here right now... Please just let it slide for today...!"
2005605-32 = "[s] Tell her... just for today."
2005605-33 = "Ni-haha!! You're right! You're right!"
2005605-34 = "Then let's begin! Did you read the strategy guide I sent?"
2005605-35 = "Oh, you already memorized it? Amazing! With our tag team—"
2005605-36 = "Let's aim to conquer the 12th floor for the first time! Come on, let's do our best!!"
2005605-37 = "Here we—"
2005605-38 = "...go!!"
2005605-40 = "(With that, Koyuki and I got fired up and challenged the new game, 'The Cafe Fighter'.)"
2005605-41 = "(We spent nearly two hours pumping every coin we had into it, but—)"
2005605-46 = "(We couldn't even get past the 5th floor more than once, let alone the 12th—that state of affairs continued...)"
2005605-49 = "[wa:720]― [log=코유키 파자마]Ahhh!? [wa:690]Why did you use that move [wa:930]just now!![/log]"
2005605-51 = "― [log=코유키 파자마]I told you to [wa:680]wait for me [wa:660]before doing that![/log]"
2005605-54 = "[ns3] \"You're wrong, Koyuki. The order was wrong to begin with.\"\n[ns4] \"I'll explain it one more time. It's—\""
2005605-57 = "[wa:2020]― [log=코유키 파자마]Are you trying to [wa:950]ruin our perfect strategy!?[/log]"
2005605-59 = "― [log=코유키 파자마]I woke up early [wa:1120]and saved our seats [wa:960]for your sake!![/log]"
2005605-62 = "[wa:610]― [log=코유키 파자마]...Huh? [wa:1350]That and [wa:510]this [wa:670]are separate issues?[/log]"
2005605-64 = "― [log=코유키 파자마]If we're going to talk about that, [wa:1290]you're the one [wa:1100]who's been putting in [wa:430]more coins...?[/log]"
2005605-67 = "[wa:690]― [log=코유키 파자마]Hmm... [wa:1380]I suppose [wa:570]that's [wa:600]true, but...[/log]"
2005605-69 = "― [log=코유키 파자마]Muu... [wa:1310]Let's call a truce! [wa:1140]A temporary truce![/log]"
2005605-72 = "[ns5] \"Exactly. The important thing is to clear it.\"\n[ns6] \"We have the same goal, after all!\""
2005605-75 = "[wa:720]― [log=코유키 파자마]You're right! [wa:1230]Next time, [wa:460]I'll definitely [wa:530]do it right![/log]"
2005605-77 = "― [log=코유키 파자마]...Ni-haha![/log]"
2005605-80 = "[wa:1000]― [log=코유키 파자마]...Ni-haha.[/log]"
2005605-83 = "(After that, we took a short break, got our spirits back up, and inserted our final coins.)"
2005605-84 = "(Although we managed to sync up perfectly and beat our personal best...)"
2005605-88 = "(We still couldn't overcome the insurmountable wall of the 7th floor.)"
2005605-91 = "Ugh... ughhh...!"
2005605-92 = "Is this even fair...? Ugh... *sigh*..."
2005605-93 = "Trash game... no, I shouldn't even call it a game..."
2005605-97 = "Ugh... good work today, Sensei. We only made it to the 7th floor, but it was fun."
2005605-98 = "Let's get our revenge next time—"
2005605-102 = "...Hm?"
2005605-103 = "Why are you suddenly taking out your wallet...?"
2005605-104 = "Don't tell me—"
2005605-105 = "T-that card... could it be...!!"
2005605-106 = "[ns7] \"...Let's win.\"\n[ns8] \"The console version is out, so we're buying that.\""
2005605-109 = "............"
2005605-110 = "......!!!"
2005605-111 = "Y-you're buying the console version!? I-is that even an option!?"
2005605-112 = "But I heard that was super expensive... Oh, I see. This is what they call the power of an adult, isn't it!?"
2005605-116 = "I'll follow you for the rest of my life, Sensei!! We'll clear it for sure today!!"
2005605-117 = "If that's the plan, let's goooo!!!"
2005605-119 = "(We headed straight to the game shop and bought the deluxe edition of 'The Cafe Fighter'.)"
2005605-120 = "(After that, I spent about 11 hours straight challenging it with Koyuki in the Schale break room—)"
2005605-124 = "(...Finally, we grasped victory.)"