[translation]
1013406-1 = "The Time When Magic Begins"
1013406-2 = "—Se."
1013406-3 = "(...?) "
1013406-4 = "(I hear Aris's voice from somewhere.)"
1013406-8 = "Se... sei."
1013406-9 = "(But Aris is nowhere to be seen.)"
1013406-13 = "Sensei! Over here!"
1013406-14 = "[ns1] Turn toward the direction of the voice.\n[ns2] Look out the window."
1013406-19 = "[wa:900]— [log=아리스 결전]Hehe.[wa:1520] Sensei,[wa:1350] were you surprised?[/log]"
1013406-21 = "— [log=아리스 결전]I wanted to see this night sky[wa:1900] with you, Sensei...[wa:1880] so I called you.[/log]"
1013406-24 = "[wa:2230]— [log=아리스 결전]It's so...[wa:1630] beautiful.[/log]"
1013406-27 = "— [log=아리스 결전]In Aris's world,[/log]"
1013406-29 = "— [log=아리스 결전]and in worlds I haven't been to yet...[/log]"
1013406-32 = "— [log=아리스 결전]I'm sure there are[wa:1140] so many beautiful things[/log]"
1013406-34 = "— [log=아리스 결전]like this one.[/log]"
1013406-37 = "[wa:2900]— [log=아리스 결전]But...[wa:1430] it's strange.[/log]"
1013406-40 = "— [log=아리스 결전]The world is[wa:1790] so beautiful, yet...[/log]"
1013406-42 = "— [log=아리스 결전]why do people fight?[/log]"
1013406-45 = "[wa:1740]— [log=아리스 결전]Just like that starry sky,[/log]"
1013406-47 = "— [log=아리스 결전]this world[/log]"
1013406-50 = "— [log=아리스 결전]is overflowing with things so beautiful[/log]"
1013406-52 = "— [log=아리스 결전]that we could share them all[wa:1840] and still be fine...[/log]"
1013406-55 = "[wa:2640]— [log=아리스 결전]...I guess[wa:1880] I still don't understand, Aris.[/log]"
1013406-60 = "Hehe. Aris has returned."
1013406-61 = "...Achoo!"
1013406-62 = "[s3] \"Are you okay? You might catch a cold!\"\n[s4] \"Did you catch a cold!?\""
1013406-65 = "I'm fine! Aris has never caught a cold before!"
1013406-66 = "Ah, Sensei's hand..."
1013406-71 = "It's warm and soothing... Hehe."
1013406-73 = "(While I was warming her up, Aris fell asleep.)"
1013406-74 = "(I carried Aris to her room so I wouldn't wake her.)"