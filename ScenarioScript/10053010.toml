[translation]
10053010-1 = "Episode 1: Searching for the Tsuchinoko"
10053010-2 = "I've been... taken care of for a long time!!!\r\n\r\n\r\n"
10053010-7 = "...What is the meaning of this?\r\n"
10053010-8 = "I'm going on a trip starting today."
10053010-9 = "If you don't hear from me after a week, just assume I've disappeared—"
10053010-10 = "...Wait, who is the person next to you? #nNice to meet you~"
10053010-11 = "If you hadn't come in so noisily, I would have finished the introductions by now.\r\n"
10053010-12 = "This is Sensei from Schale, [USERNAME]."
10053010-13 = "And this sloppy one here is Konoka Shima, the Vice Director of our Public Safety Bureau."
10053010-16 = "Sensei! Oh, so this is the one! #nMan, I've heard a lot about you from Ane-go!"
10053010-17 = "Wait, Sensei... why are you in handcuffs?"
10053010-18 = "[s1] \"Look... I don't want you to misunderstand...\"\n[s2] \"It was just a bit of a misunderstanding.\""
10053010-25 = "We received a report that student graduation albums were being traded on the black market... #nI'd like to hear the details about this \"misunderstanding.\"\r\n"
10053010-26 = "Though, knowing you, Sensei, it might have been necessary for your work..."
10053010-27 = "......\r\n"
10053010-28 = "I'll decide how to proceed after I've heard your explanation.\r\n"
10053010-29 = "[s3] \"Don't worry, I have nothing to hide!\"\r\n[s4] \"Iori will understand!\""
10053010-32 = "Sigh... I haven't heard the details yet, so I can't say for sure. #nPlease be careful with what you say.\r\n"
10053010-33 = "Now then, Konoka."
10053010-34 = "What is this about a trip?\r\n"
10053010-35 = "Ah, that.\r\n\r\n"
10053010-36 = "Please don't laugh when you hear this—\r\n\r\n"
10053010-40 = "I have to catch a Tsuchinoko within a week!!\r\n\r\n"
10053010-45 = "A Tsuchinoko...?\r\n\r\n"
10053010-46 = "You mean... the urban legend?\r\n\r\n"
10053010-47 = "That's right! That very Tsuchinoko!\r\n\r\n\r\n\r\n\r\n"
10053010-48 = "The legendary cryptid... was it?\r\n"
10053010-49 = "Yes, yes! There have been sightings, but it's never been caught... It's basically the final boss of the cryptid world!\r\n\r\n\r\n\r\n\r\n"
10053010-50 = "Plus, there's a huge bounty on it... a total of 100 million yen! #nIt's no exaggeration to call it a walking... or rather, crawling gold bar!\r\n\r\n\r\n"
10053010-51 = "...I see.\r\n\r\n"
10053010-52 = "This is a bit of a personal question, but...\r\n"
10053010-53 = "Are you perhaps having some financial trouble?\r\n"
10053010-54 = "Eh? No way. #nDo I look like the type to do things just for money?\r\n\r\n\r\n\r\n"
10053010-55 = "...Well, I suppose not.\r\n"
10053010-56 = "Sigh... in that case... #nIs it related to a jinx again...?\r\n\r\n\r\n"
10053010-57 = "I know I'll be neglecting my duties, but...\r\n\r\n\r\n"
10053010-58 = "Ah, don't worry about that. #nI wasn't planning on stopping you from the start.\r\n"
10053010-59 = "If anything, you work too hard. Rest is important.\r\n"
10053010-60 = "However—\r\n\r\n"
10053010-61 = "However...?\r\n\r\n\r\n"
10053010-62 = "If you're going, you're going with Sensei.\r\n"
10053010-63 = "Huh?\r\n\r\n\r\n\r\n"
10053010-64 = "[s] \"...Me?\""
10053010-65 = "Sensei, could I have a moment?\r\n"
10053010-69 = "If you agree to accompany her on this trip, I will overlook this current incident.\r\n\r\n"
10053010-70 = "[s5] \"I-is this a plea bargain!?\"\r\n[s6] \"I'm innocent! Let me call Iori!\"\r\n"
10053010-73 = "No. This is a personal request from me.\r\n\r\n"
10053010-74 = "Despite how she acts, Konoka isn't a troublemaker. Well, her methods can be a bit problematic.\r\n\r\n"
10053010-75 = "She's surprisingly serious and talented enough to be a Vice Director as a second-year. #nUnlike me, she's sociable and has the deep trust of her subordinates.\r\n\r\n"
10053010-76 = "However, when it comes to certain topics, her eyes change... she tends to become overly sensitive. #nThat is—\r\n\r\n"
10053010-79 = "The topic of \"superstitions.\""
10053010-84 = "Wow, I never thought Sensei would come along.\r\n"
10053010-85 = "She said it was just a precaution, but Ane-go is really overprotective, isn't she?"
10053010-86 = "I'm so loved~"
10053010-87 = "Don't you think? Ahaha!\r\n"
10053010-88 = "[s7] \"Y-yeah, I guess!\"\r\n[s8] (Though I'm really just a chaperone...)"
10053010-91 = "Oh, right."
10053010-92 = "I'm not traveling alone this time. #nWell, I'm not alone since Sensei is here.\r\n"
10053010-93 = "\"Gurumin\" and \"Director Mo\" are coming with me."
10053010-94 = "[s9] \"Gurumin and Director Mo...?\"\r\n[s10] \"Those are some very unique names...\""
10053010-97 = "They're not names, they're IDs. IDs.\r\n"
10053010-98 = "[s11] \"So, they're people you met online?\"\r\n[s12] \"What if they're dangerous people...?\""
10053010-101 = "Huh?\r\n"
10053010-102 = "......"
10053010-103 = "Pfft, ahaha! Ahahahaha!!!\r\n\r\n"
10053010-104 = "Whew, sorry, I laughed too hard.\r\n"
10053010-105 = "Sensei, who do you think I am?"
10053010-106 = "Catching dangerous people like that is my job.\r\n"
10053010-107 = "Well, though, it's not like we're complete strangers this time."
10053010-108 = "We met on social media, but we've had a few offline meetups."
10053010-109 = "Are you not interested in this kind of thing, Sensei?"
10053010-110 = "There's a social media site for people who like urban legends and mysterious experiences."
10053010-111 = "I started it to monitor incidents, but there are surprisingly a lot of hidden gems...\r\n"
10053010-116 = "Oh, looks like we've arrived. #nAnyway, we'll continue this later."
10053010-125 = "Sigh..."
10053010-126 = "I heard about it, but... this is really the middle of nowhere, isn't it?\r\n"
10053010-131 = "Oh, they're here.\r\n\r\n\r\n\r\n\r\n"
10053010-132 = "Oh my... didn't one more person join us?\r\n\r\n\r\n\r\n\r\n"
10053010-133 = "Huh, you're right.\r\n\r\n\r\n\r\n\r\n"
10053010-137 = "Hmm...?\r\n"
10053010-142 = "Eh!? Why is Sensei here!?\r\n\r\n\r\n"