[translation]
1013005-1 = "Life Experience"
1013005-5 = "..."
1013005-6 = "[s] \"...\""
1013005-7 = "H-hello, Sensei."
1013005-8 = "W-well, you see... this is..."
1013005-13 = "I-it's a part-time job..."
1013005-14 = "N-no, that's not it! It's not what you're thinking, Sensei...!#nAfter we all talked it over—"
1013005-15 = "We decided to use this opportunity to experience 'customer service' and learn how to handle various situations—"
1013005-16 = "And to learn our own limits through experience while engaging in economic activity..."
1013005-17 = "[ns] \"Actually, that does sound like it fits your goal.\""
1013005-19 = "R-right, isn't it...?"
1013005-20 = "But, being suddenly sent outside...#nIt seems I wasn't even qualified to serve customers."
1013005-21 = "They told me to just stand here holding this sign...#nBecause it's picturesque? I don't really understand."
1013005-27 = "[ns1] \"...That might actually be true.\"\n[ns2] \"I think you should have more confidence in yourself, Subaru.\""
1013005-30 = "...You say the same thing as the manager."
1013005-31 = "I don't really know what that's supposed to mean, though..."
1013005-32 = "...Subaru, you look cool when you're working hard, no matter what anyone says."
1013005-33 = "..."
1013005-34 = "W-well then! For our sake, please!#nI'd appreciate it if you could contribute to our sales...!"
1013005-35 = "[s3] \"Hmm. You've got a good knack for this, Subaru-san.\"\n[s4] \"In that case, I'll leave it to you.\""
1013005-38 = "Thank you very much! Right this way!"
1013005-40 = "[ns] \"Oh... this is more authentic than I thought.\""
1013005-41 = "What do you think, Sensei? Seeing everyone like this is a fresh experience, isn't it?"
1013005-42 = "They were worried at first, but once they saw the uniforms, they became quite positive about it..."
1013005-43 = "Saying things like, 'It's cute' or 'I want to try wearing it.'"
1013005-44 = "..."
1013005-45 = "Even though I'm their senior, I didn't even notice how my juniors were feeling... I feel pathetic."
1013005-46 = "[s5] \"That's not true, you just didn't know.\"\n[s6] \"Now that you've realized it, it'll be fine.\""
1013005-49 = "...I suppose you're right."
1013005-50 = "Welcome back, [USERNAME]-Sensei!"
1013005-51 = "Welcome home, Master!"
1013005-53 = "[ns] \"Subaru, come with me.\""
1013005-54 = "M-me too!? But, if I don't hold this sign..."
1013005-55 = "I have to guide as many customers as I can and contribute to our sales..."
1013005-57 = "(I, who had been waiting for those words, wore a satisfied smile...)"
1013005-58 = "(And called out to the manager.)"
1013005-60 = "Is something the matter?"
1013005-61 = "I see. So this is one of your students..."
1013005-62 = "You came to see how they're doing with their social studies.#nAnd you'd like to have a chat."
1013005-63 = "In exchange, you'll provide drinks and... cake for every customer currently here?"
1013005-64 = "And you'll cover the entire bill, Sensei...?"
1013005-65 = "If that's the case, you're more than welcome!#nSubaru-san, please go and have a relaxing time with Sensei!"
1013005-67 = "...Are you sure?"
1013005-68 = "[s] \"Hmph... that's what it means to be an adult.\""
1013005-69 = "...I'm learning a lot. Truly."
1013005-71 = "(And so, I shared some idle talk with Subaru.)"
1013005-72 = "(About daily life, school, and what it's like facing her juniors...)"
1013005-73 = "(Each topic was truly trivial. But that's exactly why it was important.)"
1013005-75 = "Sensei."
1013005-76 = "[ns] \"Hmm?\""
1013005-77 = "Everyone from Arius is working hard, aren't they?"
1013005-78 = "[ns7] \"They sure are.\"\n[ns8] \"And of course, so are you, Subaru.\""
1013005-81 = "..."
1013005-82 = "Saying things like that won't get you anything, you know..."
1013005-83 = "Huh? You just said what you honestly thought...?"
1013005-84 = "......"
1013005-85 = "I've heard some nasty rumors about you, Sensei."
1013005-86 = "They say that if something were to happen to you one day... it would be entirely your own fault!"
1013005-87 = "Why am I bringing this up now, you ask?"
1013005-88 = "I won't tell you. You're a smart person, Sensei, so try thinking about it yourself."
1013005-90 = "What kind of shop is this!#nI heard we'd get free cake, but this is a total mess!"
1013005-91 = "I-is something the matter, sir?"
1013005-92 = "Your posture is all wrong! And you didn't even greet me!#nWhy don't you look around more!"
1013005-93 = "Well, I'm never coming back anyway!"
1013005-94 = "I-I am terribly sorry! Please, do come again..."
1013005-95 = "Hmph! I don't care anymore!#nAnd what's with all these frills on your clothes? Are they just for show?"
1013005-96 = "Eek!?"
1013005-97 = "S-sir!? You shouldn't touch the staff...!"
1013005-98 = "...!"
1013005-104 = "Gah! W-what the hell are you doing!"
1013005-106 = "My apologies.#nIt appeared as though you were losing your balance—"
1013005-107 = "So I thought I would support you... are you not feeling well?"
1013005-108 = "(My senior's CQB (Close Quarters Battle) up this close!? Lucky!!)"
1013005-109 = "S-support? What part of this is support...! Ow, ow, ow!#nH-hey, you're gonna break my arm! L-let go...! Gah...!"
1013005-110 = "Fufu, just a moment.#nCan you stand on your own?"
1013005-111 = "...You want to keep using this arm like you always have, right?"
1013005-112 = "...Hii!?"
1013005-113 = "Do you understand what I'm trying to say... and what kind of position you're in right now?#nDo you?"
1013005-114 = "I-I get it, I get it, okay...! S-so just...!"
1013005-115 = "Get lost."
1013005-119 = "T-this shop, I'm never coming back here again!!"
1013005-125 = "..."
1013005-126 = "Subaru-san, thank you! No... thank you very much!#nThanks to you, everyone is safe!"
1013005-127 = "No, I only did what I had to do."
1013005-128 = "Subaru-san, was it? May I have a photo...?"
1013005-129 = "If there's an extra charge, I'll pay whatever it takes...!"
1013005-130 = "N-no, there's no such thing... and Manager!? Sensei!?"
1013005-131 = "Why are you both smiling and giving me a thumbs up!!?"