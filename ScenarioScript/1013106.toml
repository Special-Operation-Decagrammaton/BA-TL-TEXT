[translation]
1013106-1 = "A Princess Standing in the Night Sky"
1013106-3 = "[ns] \"Still, an aurora, huh...\""
1013106-4 = "Yes. You can see them from time to time in Red Winter."
1013106-5 = "There are even apps that forecast auroras, you know?"
1013106-6 = "[s] \"Did you like taking photos?\""
1013106-7 = "I suppose... I do."
1013106-8 = "Though when I say photography, I prefer landscapes over people."
1013106-9 = "Besides... I believe criticism and photography share a certain commonality."
1013106-10 = "[s] \"I've never thought of it that way.\""
1013106-11 = "...Ahem. Shall I explain, then?"
1013106-12 = "Criticism is the mental image born when one encounters some form of cultural creation—"
1013106-13 = "It is like taking that image, constructing it with one's own theory, and 'developing' it into text."
1013106-14 = "In other words, it is the act of 'fixing' the impression felt in that moment through one's own interpretation."
1013106-15 = "And that interpretation—that is to say, the 'criticism'—is read and received by others, and in doing so—"
1013106-16 = "It acquires a certain degree of 'objectivity'."
1013106-17 = "I believe that is where it shares a commonality with photography."
1013106-18 = "[s] \"So, in a sense, photography also possesses objectivity?\""
1013106-19 = "Yes, but at the same time—"
1013106-20 = "Depending on the skill and sensibility of the photographer, the impression can change entirely, can't it?"
1013106-21 = "Criticism starts from subjectivity and aims for objectivity."
1013106-22 = "Photography starts from objectivity, yet subjectivity seeps through."
1013106-23 = "This structure, which seems contradictory yet resonates in some way... isn't it interesting?"
1013106-24 = "That is how I feel about it."
1013106-25 = "The relationship between creation and criticism is surely the same."
1013106-26 = "[s] \"Creation... huh...\""
1013106-27 = "Eh? Are you asking if I've ever thought about trying my hand at creation...?"
1013106-28 = "Th-that is..."
1013106-29 = "That is..."
1013106-30 = "Ah...!"
1013106-34 = "Sensei! It's an aurora!"
1013106-41 = "...Nature is truly magnificent, isn't it."
1013106-42 = "When I look at an aurora, I feel like humans are such tiny existences—"
1013106-43 = "And I sometimes wonder if criticism even has any meaning at all..."
1013106-44 = "But even so, creation is one of the most beautiful achievements that people can produce."
1013106-45 = "...Are you familiar with this saying? #n\"Even if the person themselves is not beautiful, what they create can be beautiful.\""
1013106-46 = "...One doesn't feel the urge to create something they don't find beautiful, after all."
1013106-47 = "So, in a sense, criticism might be—"
1013106-48 = "My own way of expressing respect for the beauty that people have created."
1013106-49 = "[s1] \"In that case.\"\n[s2] \"Can I take a photo of Takane next?\""
1013106-52 = "Wh-what?! You, Sensei...!? #nThat is, well... I am very honored, but... why so suddenly...!?"
1013106-53 = "Eh!? You want to decide on a concept before taking it...?"
1013106-54 = "Y-you want me to 'create' that myself...!? #nThat is asking far too much of me!"
1013106-55 = "[s3] \"But think about it!\"\n[s4] \"Auroras and creations are both beautiful, so maybe they'll be even more beautiful together!\""
1013106-58 = "If you add 'beautiful' to 'beautiful', it becomes even more beautiful...!?"
1013106-59 = "Isn't that the same logic as saying takoyaki would be delicious with chocolate mint sauce!?"
1013106-63 = "Above all... creation is... not the domain of a critic."
1013106-64 = "It is true that I have seen many creative works—"
1013106-65 = "But that does not mean I should assume I can do it myself; that would be nothing but a disregard for creation."
1013106-66 = "...Such things only end up hurting someone. #nI have seen plenty of people like that."
1013106-67 = "Eh? A secret creation just for here? #nAnd you would be the only audience member...?"
1013106-68 = "Even if it's just a dream, try acting out the person you want to be...?"
1013106-69 = "[s] \"Yeah. For now, I'll be the 'Takane Critic'.\""
1013106-70 = "...!"
1013106-71 = "W-well then..."
1013106-72 = "At the very least, please... decide on the keywords, Sensei..."
1013106-73 = "[s5] \"Then, let's go with the setting of a fallen, exiled princess!\"\n[s6] \"You see the aurora while fleeing, and you're so moved that you cry!\""
1013106-76 = "...I truly don't understand why everyone I meet ends up going in that direction at least once."
1013106-77 = "Understood. Since these are the keywords you decided on, Sensei."
1013106-78 = "Ahem, *cough*!"
1013106-79 = "I had three older sisters. I was born as the youngest daughter of a noble family..."
1013106-80 = "I was raised being doted on by everyone. However... from a young age, my health was not very robust."
1013106-81 = "Perhaps it was a reaction to not being able to play outside... I ended up constantly playing pranks on those around me."
1013106-82 = "My sisters called me a 'Little Mischief-maker'. #nI was especially close with my third sister, Maria-neesama—"
1013106-83 = "On days when I felt well, we would sleep on the same pillow, and we would take cold baths together in the morning."
1013106-84 = "I didn't actually want to take cold baths, but #nmy sister said it would make me healthy, so..."
1013106-85 = "But even those peaceful days came to an end. #nOur family fell, and my sisters went their separate ways..."
1013106-87 = "Believing in the day we might meet again, we scattered to the winds..."
1013106-94 = "[wa:320]― [log=타카네]Sensei, [wa:1290]please look...[/log]"
1013106-96 = "― [log=타카네]It's an aurora.[/log]"
1013106-99 = "― [log=타카네]In stories,[/log]"
1013106-101 = "― [log=타카네]it is said that the guardians of the sky—[/log]"
1013106-104 = "― [log=타카네]are enjoying a banquet,[/log]"
1013106-106 = "― [log=타카네]and that is what it looks like [wa:750]to them.[/log]"
1013106-109 = "[wa:320]― [log=타카네]Though I can no longer meet [wa:1000]the people I thought I would always be with.[/log]"
1013106-111 = "― [log=타카네]The world is... [wa:1940]never to be seen again.[/log]"
1013106-114 = "[wa:2130]― [log=타카네]The world will remain as it always has,[/log]"
1013106-116 = "― [log=타카네]endlessly cold, [wa:2100]and distant.[/log]"
1013106-119 = "― [log=타카네]Even so, the reason I look up [wa:930]at the aurora[/log]"
1013106-121 = "― [log=타카네]and hold onto hope is—[/log]"
1013106-124 = "[wa:770]― [log=타카네]because my 'partner', [wa:1600]who stays with me [wa:980]until the very end[/log]"
1013106-126 = "― [log=타카네]in this place, [wa:480]is here with me.[/log]"
1013106-129 = "[ns] \"I see. So I'm Takane's 'partner' right now.\""
1013106-131 = "[wa:280]― [log=타카네]Hehe. [wa:1530]Yes,[/log]"
1013106-133 = "― [log=타카네]that is the setting [wa:720]for now, [wa:1550]\"Sensei\".[/log]"
1013106-136 = "― [log=타카네]I'm counting on you [wa:1240]for the photo, [wa:520]okay?[/log]"
1013106-139 = "..."
1013106-140 = "[s] \"Wh-why are you pouting so much, Princess...?\""
1013106-141 = "I am no princess! That story is over! #nI am just Miyoshi Takane—and I always will be."
1013106-142 = "Honestly... if that were a work written by someone else, the moment I turned the first page—"
1013106-143 = "I would have wanted to leave a critique saying, \"You've achieved the feat of making me abandon the book in just one line.\""
1013106-144 = "[s] \"But you wrote it yourself, didn't you?\""
1013106-145 = "That's because you told me to, Sensei!!!"
1013106-146 = "Ugh... #nIt's... it's fine now... please, show me the photo."
1013106-147 = "[s] \"What do you think?\""
1013106-148 = "..."
1013106-149 = "...It is... very beautifully taken..."
1013106-150 = "Thank you, Sensei."
1013106-151 = "Um, I have one request..."
1013106-152 = "This photo... and what happened here..."
1013106-153 = "Could you please... not tell anyone about it?"
1013106-154 = "[s] \"Is it that embarrassing?\""
1013106-155 = "That is... of course, a little bit, but..."
1013106-160 = "I just want to keep it all... a secret between you and me, Sensei."