2005402-77 = "..."
2005402-78 = "Are you saying... you would reject a student's earnest feelings...?#nIn order to provide Sensei with a comfortable life—"
2005402-79 = "I even hacked the system Rio was monopolizing... or rather, I secured the resources through electronic negotiation..."
2005402-80 = "No... it's fine, really."
2005402-81 = "After all, this is something I'm doing on my own accord..."
