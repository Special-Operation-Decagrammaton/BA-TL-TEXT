2005402-30 = "[ns1] \"！？！？\"\n[ns2] \"Ow, ow, ow!!\""
2005402-35 = "Hehe. A little pain is just right.#nLet's slowly wake up your body."
2005402-39 = "Don't forget to wash your face. I've prepared the facial cleanser I personally use."
2005402-40 = "It's a low-irritation type that's gentle on delicate morning skin, so you don't have to worry about any skin trouble."
