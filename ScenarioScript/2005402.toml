2005402-70 = "I've been waiting. You've arrived safely, I see."
2005402-71 = "Hehe. Even in this vast world, I'm probably the only super-genius, sickly, beautiful girl hacker and Life Staff as kind as me, right?"
2005402-72 = "[s] \"Yeah... I'll just take that as a nice sentiment...\""
2005402-73 = "There's no need to be so reserved..."
2005402-74 = "They do say that \"honesty is the best policy,\" don't they?"
