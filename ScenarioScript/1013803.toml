[translation]
1013803-1 = "I won't admit it!"
1013803-2 = "(Following Rena's instructions, I headed to the meeting place.)"
1013803-5 = "Ah, over here, over here!"
1013803-6 = "[s1] \"At a bus stop at this hour?\"\n[s2] \"Where are you going?\""
1013803-9 = "Um..."
1013803-10 = "Right now..."
1013803-11 = "I'm going to the ruins where ghosts are rumored to appear."
1013803-12 = "[s] \"Wait, ghosts!?\""
1013803-13 = "W-well, I don't have a choice!"
1013803-14 = "I already told the seniors that I'd 'prove there's no such thing as ghosts'!"
1013803-15 = "[s] \"It sounds like everyone else would want to come along, though.\""
1013803-16 = "I told them not to come."
1013803-17 = "They'd probably just play pranks or something..."
1013803-18 = "And I'm the only one with an outing permit."
1013803-19 = "But, going alone is... well, it's a little, you know..."
1013803-20 = "[s] \"So that's where I come in.\""
1013803-21 = "Well, it's not like I actually think they'll [ruby=appear]show up[/ruby]...!"
1013803-22 = "Anyway, now we're even!"
1013803-23 = "[s] \"Understood! I'll protect you, Rena!\""
1013803-24 = "Sigh... how did it end up like this..."
1013803-25 = "Oh, the bus is here."
1013803-30 = "(And so, we arrived at a deserted place...)"
1013803-31 = "The ruins are just ahead."
1013803-32 = "It's been a notorious spot for a long time. #nThere were rumors of strange noises ever since the building was constructed."
1013803-33 = "And apparently, you can still hear those noises now..."
1013803-34 = "Kids who went there for a dare ended up fainting or feeling sick, #nso it seems like nobody goes near it anymore."
1013803-35 = "[s] \"You're pretty well-informed, aren't you?\""
1013803-36 = "W-well, obviously I'd look into what kind of place it is!"
1013803-37 = "Come on, let's go! I'm going to prove that ghosts don't exist!"
1013803-42 = "(And as we proceeded into the ruins...)"
1013803-43 = "[ns] \"It's got quite an atmosphere...\""
1013803-44 = "They say this place has seven mysteries."
1013803-45 = "The first: the sound of tapping on windows echoing through the hallway at midnight."
1013803-46 = "The second: the non-existent 13th staircase."
1013803-47 = "The third: a figure wandering the halls."
1013803-48 = "The fourth: a blood-stained cherry blossom tree visible from the window."
1013803-49 = "The fifth: the sound of a bell heard from a broken speaker."
1013803-50 = "The sixth: crying sounds leaking from the underground machine room."
1013803-51 = "And the seventh—"
1013803-52 = "—nobody knows what that one is yet."
1013803-53 = "They say that disaster befalls anyone who notices it..."
1013803-54 = "[s] \"Those all sound like stories I've heard before.\""
1013803-55 = "R-right? They're common stories, aren't they?"
1013803-56 = "Anyway. I plan to send photos to the seniors once I've checked them all."
1013803-57 = "Nothing will happen, for sure. #nI'll prove there are no ghosts—"
1013803-61 = "...!?"
1013803-62 = "W-what...?"
1013803-66 = "Eek...!!"
1013803-70 = "[ns] \"The sound of tapping on windows echoing through the hallway at midnight...!\""
1013803-71 = "T-there's no way anyone else is here besides us!"
1013803-72 = "[s] \"Shall we go check?\""
1013803-73 = "...!!"
1013803-74 = "[s3] \"Don't worry.\"\n[s4] \"I won't let go of your hand.\""
1013803-77 = "W-who's worried about that...!!"
1013803-82 = "A-anyway, let's go!"
1013803-91 = "Caw! Cawww...!"
1013803-95 = "What, it's just a crow..."
1013803-96 = "Why would it peck at the window? There's no food there."
1013803-97 = "[s] \"Could it have been a real ghost instead of a crow...?\""
1013803-98 = "Hiss!! No way!"
1013803-99 = "First, I'm taking a picture! I have to leave proof that the hallway noise was just a crow."
1013803-106 = "Look. It came out well, right? Nothing strange is in the photo."
1013803-107 = "I'm going to keep investigating the seven mysteries!"
1013803-109 = "(Contrary to her enthusiastic voice, Rena never let go of my hand.)"
1013803-111 = "[ns] (I should be careful not to let go either.)"
1013803-113 = "(And so, I began the investigation of the ruins with Rena.)"
1013803-115 = "The hallway where a figure is said to appear"
1013803-122 = "The place where the blood-stained cherry blossom tree is visible"
1013803-127 = "The underground machine room where crying is said to be heard"
1013803-137 = "(We checked all the places called the seven mysteries and took photos.)"
1013803-138 = "(In the end, no ghosts appeared.)"
1013803-140 = "Phew, just as I thought. #nThere's no way ghosts exist."
1013803-141 = "It's all just animals or the building aging."
1013803-142 = "Alright! I've got the proof, so let's head back. #nI have to show the seniors."
1013803-143 = "[s5] \"I was able to prove there are no ghosts, but...\"\n[s6] \"Should we keep holding hands?\""
1013803-146 = "T-that is..."
1013803-147 = "I-it's not like I'm holding your hand because I'm scared!"
1013803-148 = "I-it's dark... and it'd be dangerous if I tripped!"
1013803-149 = "[s] \"Yeah, yeah, it's dangerous.\""
1013803-151 = "(I walked Rena back to Wild Hunt.)"
1013803-157 = "(And though I thought the ruin exploration had come to an end...)"