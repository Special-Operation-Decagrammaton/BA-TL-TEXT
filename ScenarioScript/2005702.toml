2005702-155 = "[s5] \"But, isn't that--\"\n[s6] \"Don't you think some people might feel like that's being forced on them?\""
2005702-158 = "..."
2005702-159 = "That what matters is my own feelings."
2005702-160 = "How I feel... I see."
2005702-161 = "[s7] \"Yeah. I think that's fine.\"\n[s8] \"That's just what I think, though.\""
