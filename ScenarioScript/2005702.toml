2005702-147 = "[s] \"Hmm... I don't think so.\""
2005702-148 = "Eh...?"
2005702-149 = "You really think I don't need to change...?"
2005702-150 = "[s3] \"Yeah. If you're fine with it, Akane, then I think it's fine.\"\n[s4] \"There are people like that in the world, after all.\""
