2005702-131 = "I see. I am always like this."
2005702-132 = "Even in C&C... it is the same."
2005702-133 = "The President is very considerate of those around her, and for better or worse, she is well-liked by others."
2005702-134 = "Asuna-senpai is... well, she is the type who becomes friends with anyone immediately."
2005702-135 = "Karin is... fufu. She seems to spend time with the other girls who are bad at math—a rarity in Millennium—like comrades."
