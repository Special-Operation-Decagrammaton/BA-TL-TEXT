[translation]
1013008-1 = "The Giving Girl"
1013008-3 = "Hello, Subaru-senpai! Oh, hello to you too, Sensei!"
1013008-4 = "Hello. It's good to see you looking so energetic today."
1013008-8 = "Huh? Senpai, could that possibly be...!"
1013008-10 = "The legendary, delicious Barbecue Cheese flavored Umaibo!?"
1013008-11 = "Eh, eh?"
1013008-12 = "W-well, yes it is..."
1013008-16 = "..."
1013008-17 = "Would you like some?"
1013008-22 = "I-is that okay...!?"
1013008-23 = "Fufu, go ahead."
1013008-24 = "...Thank you very much!"
1013008-28 = "..."
1013008-29 = "(I was planning on eating that later, but...)"
1013008-30 = "[s] \"Are you okay, Subaru?\""
1013008-31 = "Ah, yes! Of course!"
1013008-32 = "D-did I look like I was worried?"
1013008-33 = "...You're overthinking it!"
1013008-36 = "Eh? Custard Pudding flavored juice!?"
1013008-37 = "The juice version of that legendary, phantom custard pudding...!?"
1013008-38 = "...Y-yes, that's right."
1013008-39 = "..."
1013008-40 = "Um... Senpai."
1013008-41 = "J-just one sip... um, is that not allowed?"
1013008-42 = "..."
1013008-43 = "It's fine. You can have the whole thing."
1013008-44 = "Are you sure!?"
1013008-45 = "Of course. #nBut, if you don't mind, I'd be happy if you shared it with the others too."
1013008-46 = "Thank you! Senpai!"
1013008-51 = "(That was actually quite hard to get...)"
1013008-52 = "[s] \"...Are you okay?\""
1013008-53 = "Huh!?"
1013008-54 = "..."
1013008-55 = "O-of course!"
1013008-58 = "Wow, thank you!"
1013008-59 = "I'm glad."
1013008-61 = "Thank you, I'll treasure it, Senpai! #nYou're the best!"
1013008-62 = "Y-yes..."
1013008-64 = "(The same pattern continued afterward...)"
1013008-65 = "(By the time Subaru finished her patrol, she had almost nothing left.)"
1013008-67 = "..."
1013008-68 = "[s] \"...\""
1013008-69 = "..."
1013008-70 = "[s] \"...\""
1013008-71 = "W-why are you staring at me like that...?"
1013008-72 = "[s] \"You don't have to hide it in front of me...\""
1013008-73 = "I-it's really not like that!"
1013008-77 = "...But then again."
1013008-78 = "What happened earlier was, well, a bit of a shame..."
1013008-79 = "[s1] \"This won't do, Subaru-san.\" \n[s2] \"Come with me for a moment...\""
1013008-82 = "...Eh?"
1013008-84 = "S-Sensei? Why are you here..."
1013008-85 = "First, eat...?"
1013008-86 = "..."
1013008-87 = "No. I pretty much know what you're thinking, Sensei! #nI definitely won't—"
1013008-89 = "Sorry to keep you waiting. Please, enjoy."
1013008-94 = "[ns] \"...Are you really sure?\""
1013008-95 = "I-it's fine! I'm okay!"
1013008-96 = "I was just asking!"
1013008-97 = "But, somehow, these are all things I like... aren't they?"
1013008-98 = "[s3] \"Well, yeah!\" \n[s4] \"I saw you at the first duty commemorative party the other day!\""
1013008-101 = "!!!"
1013008-102 = "A-ah, thank you for your help back then... but! This time, I'll just accept the sentiment!"
1013008-104 = "(Thinking she's quite stubborn, I looked around.)"
1013008-108 = "(Some of the food... had disappeared!)"
1013008-110 = "(After that, every time I looked away...)"
1013008-114 = "(The food steadily disappeared each time!)"
1013008-116 = "[ns] \"That's strange~\""
1013008-117 = "W-what is it? Did something happen?"
1013008-118 = "[s] \"I feel like the food is disappearing.\""
1013008-119 = "D-didn't you eat it, Sensei...?"
1013008-120 = "W-what's with that look...?"
1013008-121 = "...Oh, enough! I-I get it!"
1013008-122 = "..."
1013008-123 = "Yes, I ate it!"
1013008-124 = "...Sensei, you don't like students who eat this much, do you?"
1013008-125 = "[s] \"...!\""
1013008-129 = "[ns5] \"That's not true! You have to eat a lot to grow big!\" \n[ns6] \"I'm happy just watching you eat!\""
1013008-132 = "I-is that so...?"
1013008-133 = "..."
1013008-134 = "Thank you very much..."
1013008-135 = "Eh...? Subaru still has some clumsy parts...?"
1013008-136 = "Not being honest...?"
1013008-137 = "...Sensei. You aren't saying things like that to other girls, are you?"
1013008-141 = "Hey, why are you looking away? Please look at me properly."
1013008-143 = "(Managing to dodge Subaru's questioning, I took her out to various places!)"
1013008-151 = "[ns] \"How was it?\""
1013008-152 = "When you ask how it was... hmm."
1013008-153 = "It's not so much that I don't know..."
1013008-154 = "It's more like I lack the experience and am not used to it."
1013008-155 = "I've had 'off-campus activities' before, but..."
1013008-159 = "In a 'place in the sun' like this..."
1013008-160 = "I've never spent such a peaceful time before, so..."
1013008-161 = "...!?"
1013008-162 = "What is this sound, Sensei!?"
1013008-163 = "THE DEATH OF HUMANITY IS ECOLOGY—!!"
1013008-165 = "(I took Subaru, whose eyes were sparkling, into a CD shop.)"
1013008-167 = "Hea-vy me-tal...? So this is what heavy metal is!"
1013008-168 = "Um, how should I put it..."
1013008-169 = "It's intense!"
1013008-170 = "[ns] \"R-right!\""
1013008-171 = "This sense of speed and momentum... it's just like a shaped charge!"
1013008-172 = "Above all, I like the lyrics that say 'Destroy this world'!!"
1013008-173 = "[ns] \"Please don't actually do it!\""
1013008-175 = "Phew... that was amazing, Sensei."
1013008-176 = "Even now, my ears and chest feel like they're still thumping..."
1013008-177 = "Eh? I have the potential to be a metalhead...?"
1013008-178 = "Hmm, I don't really know... but I felt naturally drawn to it."
1013008-179 = "...Especially the lyrics."
1013008-180 = "[s] \"...Do you really want the world to end?\""
1013008-181 = "..."
1013008-182 = "I wonder. I don't really know myself."
1013008-183 = "I feel like I might, and then I feel like I might not."
1013008-184 = "But you said it too, Sensei. That emotions aren't simple... so."
1013008-185 = "..."
1013008-186 = "Isn't it enough if you, Sensei, #nconvince me that 'this world is a good place'?"
1013008-187 = "[ns] \"Ugh... you got me there...\""
1013008-188 = "Because you're an 'adult', aren't you, Sensei?"
1013008-189 = "[s] \"That's not an invincible phrase, you know...?\""
1013008-190 = "Eh? But you've said it yourself until now, haven't you?"
1013008-191 = "[s] \"I certainly can't deny that...\""
1013008-193 = "(And so, talking with Subaru, we headed home.)"