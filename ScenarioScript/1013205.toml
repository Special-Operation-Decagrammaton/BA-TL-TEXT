[translation]
1013205-1 = "This time, it's my turn...!"
1013205-2 = "Restaurant"
1013205-3 = "(We met at a high-end restaurant in the department store at 1:00 PM.)"
1013205-4 = "H-hello, Sensei!"
1013205-5 = "You're... hungry, right?"
1013205-6 = "Y-you have to be...!"
1013205-7 = "[s] \"Do I have to be?\""
1013205-8 = "I've been relying on you for so long, after all..."
1013205-9 = "So, I thought I'd treat you this time..."
1013205-10 = "That's why I asked you to come here today...!"
1013205-11 = "[s] \"This place looks expensive, though...\""
1013205-12 = "Hehe..."
1013205-13 = "Leave it to me... I just got my part-time job paycheck!"
1013205-14 = "Besides, it's a buffet-style lunch... so it's quite affordable!"
1013205-15 = "If I write a review, I get a discount... and if I combine it with a coupon...!"
1013205-19 = "......I-I'm sorry. #nI wish I could treat you as coolly as you do, Sensei..."
1013205-20 = "[s] \"No, I use coupons all the time too!\""
1013205-21 = "R-really...?"
1013205-22 = "T-then...!"
1013205-23 = "First, let's get some drinks..."
1013205-29 = "Ah... excuse me..."
1013205-34 = "H-hello..."
1013205-41 = "Yes, yes... um, I'm sorry."
1013205-42 = "A representative model...?"
1013205-43 = "N-no... but, this time..."
1013205-44 = "Yes, excuse me..."
1013205-48 = "[ns] \"Who was that on the phone?\""
1013205-49 = "Oh, that was the manager from before."
1013205-50 = "They offered me a job as a fitting model..."
1013205-51 = "...I turned it down."
1013205-52 = "Anyway... we were about to go get drinks, weren't we?"
1013205-53 = "Let's go, Sensei."
1013205-55 = "(After enjoying a meal with Tsukuyo...)"
1013205-56 = "(We decided to take a walk through the department store.)"
1013205-58 = "Department Store Basement Shopping Mall"
1013205-60 = "Sensei, was it to your liking...?"
1013205-61 = "[s1] \"It was amazing!\"\n[s2] \"Every dish was delicious!\""
1013205-64 = "Hehe... I'm glad you liked it...!"
1013205-65 = "How about... dessert next?"
1013205-66 = "A homemade ice cream shop opened the other day."
1013205-67 = "They say it's a famous shop that pursues the ultimate taste with plenty of milk fat...!"
1013205-68 = "[s] \"I see... that sounds interesting!\""
1013205-69 = "Actually, it's rumored to be very delicious—"
1013205-71 = "......I hate this."
1013205-75 = "......?"
1013205-78 = "With a height like this, I can't wear cute clothes at all..."
1013205-79 = "At this size, there aren't any shoes that fit either..."
1013205-80 = "Y-you'll find some if you look!"
1013205-81 = "But..."
1013205-82 = "With this body, they wouldn't look good on me anyway."
1013205-83 = "Every mannequin... is so much shorter than me."
1013205-84 = "B-but..."
1013205-88 = "Um, Sensei..."
1013205-89 = "...Is it okay if I make a phone call?"
1013205-90 = "[s] \"Of course.\""
1013205-91 = "Thank you very much..."
1013205-96 = "......Yes, this is Tsukuyo."
1013205-97 = "Regarding the fitting model offer, is it still available...? #nYes... thank you very much!"
1013205-101 = "[ns] \"Tsukuyo...?\""
1013205-102 = "...I decided to accept the offer from earlier."
1013205-103 = "Even if I'm just someone who's too big..."
1013205-104 = "...I thought maybe I could give someone courage."
1013205-105 = "I want people to enjoy fashion without worrying about their body size..."
1013205-106 = "I'm sorry... I don't know if I'll have that much of an impact, but..."
1013205-107 = "[s3] \"That's not true!\"\n[s4] \"Tsukuyo is the best model in Kivotos!\""
1013205-110 = "Waaaaah...!"
1013205-111 = "And so, um... I'm sorry."
1013205-112 = "Let's have the ice cream another time...!"
1013205-116 = "(A few days later)"
1013205-118 = "Department Store Basement Shopping Mall"
1013205-121 = "(M-my photo is on the clothing store's advertisement...!)"
1013205-122 = "(Uuu... I was prepared for this, but it's still so embarrassing...!)"
1013205-123 = "(I wonder what the people looking at this...)"
1013205-128 = "Oh, the poster changed."
1013205-134 = "Hmm?"
1013205-135 = "The model this time is quite tall."
1013205-136 = "...You're right."
1013205-137 = "I guess there are plenty of clothes that look good even if you're tall."
1013205-141 = "...Yeah, maybe so."
1013205-145 = "...Hehe."