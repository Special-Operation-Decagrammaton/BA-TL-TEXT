62050-303 = "What did you mean, \"Everything's too empty\"...?"
62050-304 = "You were one of us... You lived this with us..."
62050-305 = "How could you go find salvation without us... just you...!"
62050-310 = "..."
62050-311 = "..."
62050-312 = "..."
62050-313 = "When I look around, I start to think..."
62050-314 = "\"Is this really okay? #nIs it really okay to live like this?\""
