62050-247 = "(That's it? We're done after just one day? That's so...)"
62050-252 = "M-Maybe... not all of this... is because of Trinity and Sensei...?"
62050-257 = "What?"
62050-258 = "What?! Who said that?!"
62050-259 = "Isn't she...?"
