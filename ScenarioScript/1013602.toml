[translation]
1013602-1 = "Efficiency and Inefficiency"
1013602-4 = "Morning. You're a sleepyhead, Sensei."
1013602-5 = "[s] \"Morning. You're energetic this early...\""
1013602-6 = "Well, the situation is different from usual, so I have to do what I can."
1013602-7 = "That said, all I can really do is a reconnaissance in force... Oh, come to think of it—"
1013602-8 = "I picked up a signal that caught my attention earlier. #nThat's where we're heading now."
1013602-9 = "[s] \"Can I come with you?\""
1013602-10 = "Hmm, I suppose so, but... #nIf something were to happen..."
1013602-14 = "...Well, never mind. I'll protect you. #nNo matter what happens."
1013602-17 = "(I went outside with Eimi)"
1013602-20 = "I'll handle the scouting from here. #nIt should take about two hours."
1013602-21 = "I plan to move slowly at about 4 kilometers per hour."
1013602-22 = "Oh, but it's fine if you're slower than that. #nThough it would be a bit of a problem if you're too slow."
1013602-23 = "Look, if the distance gets too wide, I can't protect you, right? #nTry not to stray too far."
1013602-25 = "(And so, I began the reconnaissance with Eimi)"
1013602-29 = "(Eimi's pace was fast, and it was hard to keep up...)"
1013602-32 = "That's impressive. Sensei, you're keeping up just fine."
1013602-33 = "[s] \"I'm happy you'd say that, even if it's just flattery... though, I wonder... can you really call this 'keeping up'...?\""
1013602-34 = "It's not flattery. #nSomeone else would have been exhausted by now."
1013602-35 = "Huh? Yeah, pacing is important. You're right, Sensei."
1013602-36 = "I think so too, but..."
1013602-37 = "...Well, it's a matter of habit, too. It's difficult."
1013602-38 = "!? "
1013602-39 = "Sensei, hide!"
1013602-43 = "(Suddenly, Eimi pushes me into a crack in the broken earth)"
1013602-44 = "Sorry for the sudden move."
1013602-45 = "I want you to stay there until I say it's safe."
1013602-46 = "The numbers are... about a squad, I think. #nIn that case...!"
1013602-53 = "It's safe now, Sensei."
1013602-54 = "...Though I don't think that was all of them."
1013602-56 = "(Even after that, Eimi...)"
1013602-60 = "Coordinates confirmed. Distance... 427m. #nI'll strike first...!"
1013602-63 = "(Facing the enemy forces moving at blinding speed...)"
1013602-66 = "Should I wait a little longer—"
1013602-67 = "No, it's better to deal with them and move on."
1013602-68 = "It would be inefficient if the situation escalated...!"
1013602-73 = "It doesn't look like our location has been compromised... #nJudging by the enemy's equipment, that's probably a transport unit."
1013602-74 = "In that case—Search and Destroy!"
1013602-77 = "(Eimi proceeded with the reconnaissance in force surprisingly well...)"
1013602-80 = "Alright. No more danger signals."
1013602-81 = "Good work, Sensei. Let's head back now."
1013602-82 = "[s] \"Do you always do things like this...? That's amazing...\""
1013602-83 = "It's nothing special. I'm always like this."
1013602-84 = "Because there's someone who works people to the bone..."
1013602-85 = "Well, I tell that to her face, too."
1013602-86 = "[s] \"L-let's try to get along...\""
1013602-87 = "We actually get along fine, you know?"
1013602-88 = "..."
1013602-89 = "...Come to think of it, I was always alone, so maybe this is my first time working in a group."
1013602-90 = "I used to think that efficiency dropped when the number of people increased."
1013602-91 = "...Some people were even scared to work with me."
1013602-92 = "...My way of thinking wasn't really understood by others."
1013602-93 = "[s] \"How about now?\""
1013602-94 = "Now..."
1013602-95 = "I wonder why. I'm surprisingly okay with it."
1013602-96 = "Maybe it's because everyone is so eccentric? We just click, I guess..."
1013602-97 = "It's very comfortable."
1013602-98 = "[s] \"It's good for students to get along if they can. With the others, too.\""
1013602-99 = "With the others, huh..."
1013602-100 = "..."
1013602-101 = "The old me would have thought that was inefficient."
1013602-102 = "But it's strange."
1013602-103 = "Now, I actually want to cooperate."
1013602-104 = "[s] \"I'm glad you feel that way.\""
1013602-105 = "Yeah."
1013602-106 = "Maybe your words had something to do with it, too. #nHehe."
1013602-108 = "(After that, I returned to the others while chatting with Eimi)"