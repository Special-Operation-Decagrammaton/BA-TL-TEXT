[translation]
2005202-1 = "Infrastructure"
2005202-2 = "It's cold again today, isn't it?"
2005202-3 = "Well, that's nothing new, though."
2005202-4 = "[s] \"Was there really... any need to come all the way out to the middle of nowhere?\""
2005202-5 = "Oh, there certainly is."
2005202-6 = "It may be a small step for the Publishing Department,"
2005202-7 = "but it will be a giant leap for Red Winter!"
2005202-8 = "...or so this project might be."
2005202-9 = "[s] \"And what exactly is that...?\""
2005202-10 = "In short... it's a communication line installation project!"
2005202-14 = "You have that look on your face that says, 'Why is the Publishing Department doing this?'"
2005202-15 = "Hehehe. It's true that communication line construction is a public utility."
2005202-16 = "Normally, the Red Winter Administration Office should be in charge of this."
2005202-17 = "Well, with that office, they wouldn't be able to start construction even in 100 years~"
2005202-18 = "[s] \"Then the Publishing Department is...\""
2005202-19 = "As you guessed."
2005202-20 = "We've taken it upon ourselves to handle it on behalf of the Administration Office."
2005202-21 = "[s1] \"I see...\"\n[s2] \"So it was a request from the Administration Office...\""
2005202-24 = "Yes, so I won't be installing all the communication lines by myself starting now."
2005202-25 = "I only need the result of the equipment being installed."
2005202-26 = "Alright, everyone! Over here!"
2005202-34 = "The talk about getting pudding as a reward, that's true, right?"
2005202-35 = "I heard if we finish ahead of schedule, we get 'Special Mols' as a bonus. Is that true?"
2005202-37 = "Of course. Trust is the most important thing in an employment relationship."
2005202-38 = "As the head of the Publishing Department, I, Aramaki Yakumo, never do sloppy work when money is involved!"
2005202-42 = "...What's wrong, Sensei? You look surprised."
2005202-43 = "[s3] \"No... I just thought that if it were Yakumo, who hires subcontractors for her subcontractors--\"\n[s4] \"you would minimize the rewards\"\n[s5] \"to maximize the Publishing Department's profits...\""
2005202-47 = "Oh my... how offensive. I'm not a demon, you know?"
2005202-48 = "Though, if someone were to steal my payment, I do have the confidence to be more vicious than a demon."
2005202-49 = "...Honestly, that's such amateur thinking, Sensei. Hehehe."
2005202-50 = "[s6] \"D-did you just call me an amateur...\"\n[s7] \"Then let me hear the professional's perspective!\""
2005202-53 = "Hehehe, simply put..."
2005202-54 = "True business can only be done when infrastructure is established at a low cost!"
2005202-55 = "Do you understand, Sensei? If the cost of building infrastructure goes up, that cost is naturally passed on to the users in some way."
2005202-56 = "And besides, the one placing the order is that stingy Administration Office."
2005202-57 = "To begin with, we were only given a budget that wouldn't even cover the construction."
2005202-58 = "But to add the missing budget on top and fleece the users—"
2005202-59 = "that only shows short-term profit... it would only lead to long-term losses!"
2005202-60 = "In this hyper-connected society where everyone is linked!#nCommunication lines are now a lifeline!"
2005202-61 = "If you privatize that lifeline, everyone will eventually end up on the path to ruin!"
2005202-62 = "That is why the Publishing Department is not afraid of short-term losses—#nby building the communication infrastructure as cheaply as possible!"
2005202-63 = "Negotiating the operating rights with the Administration Office makes for a more logical long-term business."
2005202-64 = "Not ownership, mind you? Operating rights, operating rights.#nI said it twice because it's important."
2005202-65 = "[s] \"So, in the end, what are you going to do...?\""
2005202-66 = "Well, well, just watch."
2005202-67 = "Hehehehe."
2005202-70 = "Finally... the dorms have a wired connection!"
2005202-71 = "Now I don't have to use that pocket Wi-Fi that's expensive, slow, and constantly cutting out!"
2005202-76 = "By the way, everyone—"
2005202-77 = "With a cheap, fast, and stable internet connection that doesn't cut out... what do you plan to do?"
2005202-79 = "Huh? Now that you mention it..."
2005202-80 = "I hadn't thought about that..."
2005202-81 = "Well, well, in times like these, why not start with something fun?"
2005202-82 = "On the platform developed by our Publishing Department, you can read 100 chapters of web novels for free."
2005202-83 = "100 chapters!?"
2005202-84 = "And it's free!?"
2005202-85 = "Yes. After a certain amount of time passes, other works will be released for free~"
2005202-86 = "Of course, if you pay, you can read the latest chapters faster and more reliably than anyone else..."
2005202-87 = "Pay...?"
2005202-88 = "Even though I can read 100 chapters for free? Why would I bother paying?"
2005202-92 = "(Hehehe... everyone thinks that at first...)"
2005202-93 = "[s](Yakumo... what a terrifying child...!)"
2005202-96 = "Ah! I read them all!"
2005202-97 = "Next! I want to read the next chapter quickly!"
2005202-98 = "Oh my, please calm down. As I said earlier, if you pay..."
2005202-100 = "I already paid! I read everything I could..."
2005202-101 = "When is the next update? I'm subscribing! Let me read it quickly!"
2005202-102 = "!?"
2005202-103 = "This is surprising... what a tremendous speed of content consumption."
2005202-104 = "Then... while waiting for the latest chapter, how about the comic adaptation of this novel?"
2005202-105 = "I think it has a different charm than the text, don't you?"
2005202-106 = "I'll read it!"
2005202-107 = "Wait, the free part of the manga is only 10 chapters...?"
2005202-108 = "Ah, please understand. Drawing is a very labor-intensive task..."
2005202-109 = "If you can't wait for the update, you can also 'support' the author directly with an additional payment!"
2005202-110 = "In this world... money is what makes people move, after all. Hehehehe."
2005202-111 = "(Besides, our Publishing Department also runs the crowdfunding platform, so we get a commission—it's a win-win.)"
2005202-112 = "That's fine, but... why is there a payment limit?"
2005202-113 = "Yeah! We want to pay without limits!"
2005202-114 = "I appreciate the sentiment, but... the goal of our Publishing Department is to make our readers' time fun and enriching."
2005202-115 = "It would be counterproductive if our platform caused problems in your daily lives."
2005202-116 = "(...If we bankrupt our consumers, long-term business won't work, after all~)"
2005202-117 = "As related content, I think you'll like this too. It's a video we prepared..."
2005202-122 = "Oh dear... this is a problem..."
2005202-123 = "Huh? What? What's wrong?"
2005202-124 = "...Can't you watch high-quality videos with the current internet speed?"
2005202-125 = "Unfortunately, it seems so~#nWell, the Administration Office doesn't give us much of a budget. But—"
2005202-126 = "How was it, trying it out? More web novels, more web manga..."
2005202-127 = "To enjoy high-quality videos and content, you need a faster and more stable internet environment..."
2005202-128 = "...You need it, don't you?"
2005202-134 = "That's right!!"
2005202-135 = "The Administration Office is at it again... Alright! Let's go protest!"
2005202-136 = "Should we call everyone in the dorms?"
2005202-137 = "Let's tell the other dorms too!"
2005202-138 = "Hehehe. While you're at it, could you do a little bit of advertising for our platform?"
2005202-139 = "Content is something that's more fun when shared with everyone."
2005202-140 = "Yeah, leave it to us!"
2005202-141 = "Oh, there's a message board like social media here too! I'll write a review!"
2005202-142 = "Hehehe. I am grateful."
2005202-143 = "To ensure we can continue providing quality content to everyone, we at the Red Winter Publishing Department would appreciate your continued support~"
2005202-144 = "(A third of the lineup is content we bought cheaply from outside Red Winter, though...)"
2005202-145 = "(But it's treated as new content in Red Winter, so it's fine. Hehehehe.)"
2005202-147 = "(And so, the students appealed to the Administration Office for the installation of high-speed lines—)"
2005202-148 = "(The Publishing Department's business grew rapidly...!)"
2005202-154 = "As a result, it seems the Administration Office's finances took a bit of a hit..."
2005202-155 = "But it was caused by the Administration Office's negligence in the first place, so the Publishing Department isn't at fault, right?"
2005202-156 = "Hehehehe!"
2005202-157 = "[s] \"I just thought of something...\""
2005202-158 = "Yes?"
2005202-159 = "[s] \"Yakumo, you're a terrifying child...\""
2005202-160 = "What are you talking about? There is no student as harmless as me~? Hehehe."