[translation]
10053100-1 = "Afterstory 1: Barbecue & Chili"
10053100-3 = "Mmm, that meat smells so good!"
10053100-4 = "Hey, bring your plate over! I'll serve you some!"
10053100-9 = "..."
10053100-10 = "What's the matter? Just bring your plate over."
10053100-11 = "No, I mean... I'm grateful, but..."
10053100-12 = "I was just wondering if it's really okay for us to join in and have a feast like this."
10053100-13 = "What's with that weird hesitation?"
10053100-14 = "It's pointless if we don't eat together. To live is to eat, right?"
10053100-15 = "No, that's not what I meant..."
10053100-16 = "Come on, close your mouth. Stop yapping and just eat."
10053100-17 = "If I close my mouth, how am I supposed to eat...?"
10053100-18 = "...Fair point?"
10053100-21 = "..."
10053100-22 = "Hmm? Is there something on my face?"
10053100-23 = "...If you're that nice to people, you're going to get betrayed spectacularly one day, you know?"
10053100-24 = "Hmm?"
10053100-25 = "W-what was that for! You're too close! Too close!!"
10053100-26 = "So, you're that worried about your big sister, huh?"
10053100-27 = "Hiss! I didn't say anything like that!?"
10053100-28 = "I'm not saying I'm... not worried, but!"
10053100-29 = "It's nice to know you're worried about me, though."
10053100-33 = "Alright, I'll give you two pieces of life advice as a special treat."
10053100-34 = "One: No matter the situation, if you just try, things usually work out somehow."
10053100-35 = "And two: There's nothing that can't be solved with brute force! Hahaha!"
10053100-41 = "Someone who can destroy a bus with their bare hands... I guess there's no point in worrying about her..."
10053100-43 = "Ahhh, so this is what happiness tastes like..."
10053100-44 = "I wonder how long it's been since I last had meat..."
10053100-49 = "..."
10053100-50 = "Ah!"
10053100-51 = "Oh dear, oh dear. I almost lost my dignity in front of my club members."
10053100-52 = "President, what's wrong? You've stopped eating."
10053100-53 = "Eh? Oh, no... well, I've had so much meat that... I've grown tired of it, you could say... Hahaha."
10053100-54 = "As expected of the President! Even while on the run, you're living large!"
10053100-55 = "W-well, of course!"
10053100-56 = "More importantly... Tsubasa, you've been sitting next to me this whole time... is that alright?"
10053100-57 = "Ah, sorry... It's been a while, so I was just happy..."
10053100-58 = "Was I... in the way...?"
10053100-59 = "N-no, not at all! How could you think that...! I was just asking!"
10053100-60 = "Then... just a little longer..."
10053100-61 = "Hehehe."
10053100-62 = "It's hard to eat..."
10053100-65 = "Hey, con artist."
10053100-66 = "I told you to stop calling me that!"
10053100-67 = "For a con artist, you're surprisingly well-liked by your subordinates. I've never seen the Director get attached to anyone like that before."
10053100-68 = "I'm not a con artist...!"
10053100-70 = "You know, Konoka."
10053100-71 = "This is some serious advice: you shouldn't put too much faith in the media."
10053100-73 = "...Eh?"
10053100-75 = "The major media outlets in Kivotos are all under the control of the General Student Council. Plus, the cozy relationship between the GSC and Seminar is common knowledge in this world."
10053100-76 = "The President was just framed."
10053100-77 = "The President's talent is simply too extraordinary. Seminar's 'Big Sister' personally pulled strings to get rid of her."
10053100-79 = "Ah... is that the backstory?"
10053100-80 = "It's not a backstory, it's the truth! She was kicked out by Big Sister herself!"
10053100-81 = "Sure, sure~"
10053100-82 = "You definitely don't believe me, do you!?"
10053100-86 = "Anyway, changing the subject."
10053100-87 = "Isn't it a bit overprotective to climb up to the second floor in the middle of the night just to watch someone sleep?"
10053100-88 = "I mean, I get that you're worried about the Director, but still."
10053100-89 = "...What are you talking about?"
10053100-90 = "What do you mean? You were the one outside the window, right? You're in the photo."
10053100-91 = "I have no recollection of that..."
10053100-92 = "...?"
10053100-96 = "The bridge was broken that day... I was standing in front of the mountain cabin wondering what to do. Then you suddenly opened the window and screamed, so I was startled and ran away."
10053100-97 = "Ah, well, I'd like to ask you the same thing—"
10053100-98 = "Who was the one clinging to the window back then...? They don't seem to be here now."
10053100-103 = "...?"
10053100-104 = "Eh."
10053100-106 = "Ehhhhhhh!?!?"