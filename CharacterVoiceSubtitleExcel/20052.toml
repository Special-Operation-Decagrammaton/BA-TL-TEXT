[translation]
20052-CVGroup_CommonSkill-1 = "Please sign here."
20052-CVGroup_ExSkill_1-1 = "Thank you for your purchase. Hehehe♪"
20052-CVGroup_ExSkill_2-1 = "Step right up, come and see!"
20052-CVGroup_ExSkill_3-1 = "Thank you for your continued patronage."
20052-CVGroup_ExSkill_Level_1-1 = "Yes, by all means!\nHehehe..."
20052-CVGroup_ExSkill_Level_2-1 = "This is going to be profitable..."
20052-CVGroup_ExSkill_Level_3-1 = "Sales are looking up... Hehehe."
20052-CVGroup_Formation_In_1-1 = "Shall we go and expand our sales channels?"
20052-CVGroup_Formation_In_2-1 = "This... I have a feeling we're going to make a fortune...!"
20052-CVGroup_Formation_Select-1 = "Oh? Did you call for me?\nA contract? Business expansion? Which is it?"
20052-CVGroup_Growup_1-1 = "Today better than yesterday, tomorrow better than today...\nDaily growth will lead us to a brighter profit... Oh, excuse me.\nIt will lead us to a brighter future."
20052-CVGroup_Growup_2-1 = "For the sake of the Publishing Club's survival, I, as the club president, must become stronger...\nIs there perhaps a lucrative contract lying around somewhere...?"
20052-CVGroup_Growup_3-1 = "Oh my, I feel like my mind is working faster than usual.\nSensei, if you're looking for a capable contract agent...\nYes, yes, I'm right here, hehehe."
20052-CVGroup_Growup_4-1 = "To show my daily appreciation, I've written down my feelings on this paper~\nOh, I'd like you to stamp your seal of receipt here~\n...The text looks like a contract? Y-you're just imagining things!"
20052-CVGroup_Relationship_Up_1-1 = "Hmm... So, the 'affinity' between you and me has increased, has it?\n...My thoughts?\nNo... you're asking something difficult to answer."
20052-CVGroup_Relationship_Up_2-1 = "As the president of the Publishing Club, struggling to put things into words is... \nUm, so, well...\nI've never felt this way before..."
20052-CVGroup_Relationship_Up_3-1 = "Sigh...\nMaybe I should just say it outright and get it over with!\nSo, Sensei, could you... \nAh, ugh... it's nothing. Could you please give me a little more time...?"
20052-CVGroup_Relationship_Up_4-1 = "One may find loopholes in a contract, but falsehoods are out of the question... Sigh, I will be honest.\nI am truly glad to have become your student, Sensei.\nThanks to you, my writing has become surprisingly beautiful.\n...So, please continue to... edit and proofread my work, okay?"