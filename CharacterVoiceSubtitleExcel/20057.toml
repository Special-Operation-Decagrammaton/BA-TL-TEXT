[translation]
20057-CVGroup_CommonSkill-1 = "Now, let's begin the cleaning."
20057-CVGroup_ExSkill_1-1 = "Oh, hello there?"
20057-CVGroup_ExSkill_2-1 = "So you've come here."
20057-CVGroup_ExSkill_3-1 = "Please, stay down."
20057-CVGroup_ExSkill_Level_1-1 = "Now, let's finish this up."
20057-CVGroup_ExSkill_Level_2-1 = "That concludes today's work."
20057-CVGroup_ExSkill_Level_3-1 = "Let's clean this up nicely."
20057-CVGroup_Formation_In_1-1 = "Where are you headed?"
20057-CVGroup_Formation_In_2-1 = "Please, enjoy your time in Millennium."
20057-CVGroup_Formation_Select-1 = "It feels fresh to address you like this.\n...Sensei?"
20057-CVGroup_Growup_1-1 = "As a perfect maid, I must excel in both academics and martial arts.\nAnd as a student, the same applies."
20057-CVGroup_Growup_2-1 = "Thank you for always looking out for me.\nI will do my best to live up to your expectations, Master."
20057-CVGroup_Growup_3-1 = "Everything is built upon the daily routine.\nIf you were to share that daily life with me, Sensei...\nPerhaps a different future might be waiting for us."
20057-CVGroup_Growup_4-1 = "I've had some spare time, so I've been thinking of new ways to clean.\nRecently, I've been researching explosive cartridges for removal..."
20057-CVGroup_Relationship_Up_1-1 = "Sometimes, I find myself imagining things.\nWhat if we had met under different circumstances?\nFor example... if we were 'classmates'...\nHehe, but... I suppose you would still be 'Sensei' regardless."
20057-CVGroup_Relationship_Up_2-1 = "Wearing this uniform is only natural.\nBut, I am always happy to hear you say that it suits me."
20057-CVGroup_Relationship_Up_3-1 = "Thank you for everything, Sensei.\nAnd... and...\n*Sigh*, I thought I was prepared, but this is surprisingly difficult.\nNo, I mean... I... I am... fond of you..."
20057-CVGroup_Relationship_Up_4-1 = "There is a classroom that no one visits after school...\nIf I were to invite you, would you come?\n...Hehe. Just a joke. For now, at least."