[translation]
10130-CVGroup_UITitle_Idle1-1 = "Blue Archive, it is. Hehe."
10130-CVGroup_CharacterGet_Idle1-1 = "I am Kakehashi Subaru.\nIf you are in trouble, I shall lend you my strength.\nWell... it will be the 'Arius style,' though."
10130-CVGroup_Cafe_Idle1-1 = "A cafe... it looks like a rather expensive place."
10130-CVGroup_Cafe_Idle2-1 = "(Somehow... it reminds me of water time.)"
10130-CVGroup_Cafe_Idle3-1 = "What is... that over there?"
10130-CVGroup_Cafe_Idle4-1 = "(I didn't really get to come to places like this...)"
10130-CVGroup_Cafe_Idle5-1 = "A part-time job at the cafe...\nI wonder if they are hiring?"
10130-CVGroup_WeaponGet_Idle1-1 = "I still can't quite believe it...\nEvery time I wake up in the morning, I get anxious that it might have been a dream...\nThank you so much, Sensei. I will cherish it."