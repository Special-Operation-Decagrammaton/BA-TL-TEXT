[translation]
10138-CVGroup_UITitle_Idle1-1 = "Hmph... Blue Archive!"
10138-CVGroup_CharacterGet_Idle1-1 = "Wildhunt Art Academy, Ebi Rena.\nJust watch. I'll prove that all this occult stuff is nothing but a sham!"
10138-CVGroup_Cafe_Idle1-1 = "I wonder what kind of clothes would look good on that person?"
10138-CVGroup_Cafe_Idle2-1 = "Nothing weird is going to happen here, right...? Surely..."
10138-CVGroup_Cafe_Idle3-1 = "This layout... Sensei, you actually have decent taste."
10138-CVGroup_Cafe_Idle4-1 = "That design... is that occult-related? \nI wonder if Sensei has been influenced by it too."
10138-CVGroup_Cafe_Idle5-1 = "Ah, I think I heard a strange noise over there..."
10138-CVGroup_WeaponGet_Idle1-1 = "Don't underestimate me just because I'm small, or you'll regret it.\nI'll have you know, I'm actually quite good with a gun!\nI'm good enough to draw a picture with the bullet holes... I'm serious!"
10138-CVGroup_UIEventLobby_Enter1-1 = "Sensei, over here."
10138-CVGroup_UIEventLobby_Enter1-2 = "Let's go debunk some hoaxes together."
10138-CVGroup_UIEventLobby_Enter2-1 = "The charm my senior gave me... where did I put it..."
10138-CVGroup_UIEventLobby_Enter2-2 = "I-I'm just looking for it because it was a gift, that's all!"
10138-CVGroup_UIEventLobby_Enter3-1 = "Alright, I'm not giving up until the end!"
10138-CVGroup_UIEventLobby_Enter3-2 = "I'll prove it's all a lie!"
10138-CVGroup_UIEventLobby_Enter4-1 = "Hiss! Hoax! Nonsense! Bring it on!"
10138-CVGroup_UIEventLobby_Enter4-2 = "I'll settle this tonight!"
10138-CVGroup_UIEventLobby_Enter5-1 = "It was full of weird stuff, but..."
10138-CVGroup_UIEventLobby_Enter5-2 = "Well, it was fun, so I guess it's fine."
10138-CVGroup_UIEventLobby_Idle1-1 = "Hmph, it's all a sham anyway!"
10138-CVGroup_UIEventLobby_Idle1-2 = "...Probably, anyway."
10138-CVGroup_UIEventLobby_Idle2-1 = "I-I'm getting the chills..."
10138-CVGroup_UIEventLobby_Idle2-2 = "I-It's just the wind, right...? Right?"
10138-CVGroup_UIEventLobby_Idle3-1 = "Ugh, what's with this 'Tsuchinoko' nonsense."
10138-CVGroup_UIEventLobby_Idle3-2 = "It's just a lizard they mistook for something else, right?"
10138-CVGroup_UIEventLobby_Idle4-1 = "Eek!?"
10138-CVGroup_UIEventLobby_Idle4-2 = "...Oh, it's just you, Sensei. And hey, stop poking me!"
10138-CVGroup_UIEventShop_Enter1-1 = "Oh, a mountain of suspicious items..."
10138-CVGroup_UIEventShop_Enter1-2 = "There might be something useful here.\nWant to take a look, just in case?"
10138-CVGroup_UIEventShop_Enter2-1 = "Sensei, do you know what this is?"
10138-CVGroup_UIEventShop_Enter2-2 = "There's all sorts of stuff here..."
10138-CVGroup_UIEventShop_Enter3-1 = "Well, looking back on it... it might be a good memory. Hehe."
10138-CVGroup_UIEventShop_Idle1-1 = "T-this place is safe... right?"
10138-CVGroup_UIEventShop_Idle1-2 = "A ghost isn't going to just... pop out, right...?"
10138-CVGroup_UIEventShop_Idle2-1 = "D-don't just watch, help me out!"
10138-CVGroup_UIEventShop_Idle2-2 = "Sorting this out by myself is scary—I mean, it's a lot of work!"
10138-CVGroup_UIEventShop_Buy1-1 = "Oh, this might be useful for something."
10138-CVGroup_UIEventShop_Buy2-1 = "Wait, you found that in the junk pile?"
10138-CVGroup_UIEventShop_Buy3-1 = "I really hope this actually comes in handy..."
10138-CVGroup_UIEventShop_Buy4-1 = "Here you go. I'm the one who went and got it, so be grateful, okay?"
10138-CVGroup_UIEventMission_Enter1-1 = "Hmm... shall we check the clues we've gathered?"
10138-CVGroup_UIEventMission_Enter2-1 = "Let's organize the events together."
10138-CVGroup_UIEventMission_Buy1-1 = "Hmph, it wasn't such a big deal after all."
10138-CVGroup_UIEventMission_Buy2-1 = "Let's keep exposing them like this!"
10138-CVGroup_UIEventMission_Idle1-1 = "I-I'm more scared of the suspension bridge than any ghost..."
10138-CVGroup_UIEventMission_Idle2-1 = "Hiss! Stop playing around and focus on the investigation!"
10138-CVGroup_UIEventMission_Interaction1-1 = "T-that's it for today! Pushing ourselves isn't good."