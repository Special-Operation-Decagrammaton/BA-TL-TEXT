[translation]
10131-CVGroup_UITitle_Idle1-1 = "Blue Archive, if you please."
10131-CVGroup_CharacterGet_Idle1-1 = "Greetings, Sensei.\nI am Miyoshi Takane, from the Red Winter Federal Academy's Publishing Department.\nI look forward to working with you."
10131-CVGroup_Cafe_Idle1-1 = "Hmm... the atmosphere here is quite nice."
10131-CVGroup_Cafe_Idle2-1 = "I wonder if the Wi-Fi is working properly?\nI must upload my critique soon..."
10131-CVGroup_Cafe_Idle3-1 = "A time to share stories over tea... how wonderful.\nTruly."
10131-CVGroup_Cafe_Idle4-1 = "(This space... I wonder how I should write a critique for it...)"
10131-CVGroup_Cafe_Idle5-1 = "I wonder if it's alright to take photos...?"
10131-CVGroup_WeaponGet_Idle1-1 = "Are you familiar with the saying, 'The pen is mightier than the sword'?\nYes, that is correct.\nHeh... to those who have directed heartless words at my critiques—\nLet us have a... thoughtful 'dialogue'."
10131-CVGroup_UIEventLobby_Enter1-1 = "This is my first time visiting Trinity..."
10131-CVGroup_UIEventLobby_Enter1-2 = "I will make sure not to cause any trouble."
10131-CVGroup_UIEventLobby_Enter2-1 = "Trinity as a place—and the stories born within it."
10131-CVGroup_UIEventLobby_Enter2-2 = "Heh, I have grown quite fond of both."
10131-CVGroup_UIEventLobby_Enter3-1 = "Although... everything is going a bit too well."
10131-CVGroup_UIEventLobby_Enter3-2 = "It makes me feel a little uneasy, but..."
10131-CVGroup_UIEventLobby_Enter3-3 = "If this were a scene in a story,"
10131-CVGroup_UIEventLobby_Enter3-4 = "it is exactly the kind of moment where turmoil begins."
10131-CVGroup_UIEventLobby_Enter4-1 = "As I thought... I had a feeling this would happen."
10131-CVGroup_UIEventLobby_Enter4-2 = "Yes... someone like me must stay composed..."
10131-CVGroup_UIEventLobby_Enter5-1 = "I'm glad... I am truly glad."
10131-CVGroup_UIEventLobby_Enter5-2 = "I thank you from the bottom of my heart, Sensei."
10131-CVGroup_UIEventLobby_Enter5-3 = "And... I am sorry, Sensei."
10131-CVGroup_UIEventLobby_Idle1-1 = "Everyone has been so kind, it put me at ease."
10131-CVGroup_UIEventLobby_Idle1-2 = "...But after all, I am just a student."
10131-CVGroup_UIEventLobby_Idle2-1 = "Did you call for me, Sensei?"
10131-CVGroup_UIEventLobby_Idle2-2 = "Eh? A loud laugh?"
10131-CVGroup_UIEventLobby_Idle2-3 = "I would never do something so unrefined in a place like this!"
10131-CVGroup_UIEventLobby_Idle2-4 = "...If it were just the two of us, however, that would be a different story."
10131-CVGroup_UIEventLobby_Idle3-1 = "Please stop teasing me like that repeatedly."
10131-CVGroup_UIEventLobby_Idle3-2 = "Otherwise—"
10131-CVGroup_UIEventLobby_Idle3-3 = "I will record every single one of your actions, Sensei..."
10131-CVGroup_UIEventLobby_Idle3-4 = "And write a critique about it, you know?"
10131-CVGroup_UIEventLobby_Idle3-5 = "'Sensei was pestering Miyoshi Takane again today.'"
10131-CVGroup_UIEventLobby_Idle3-6 = "'I have decided to publish this fact to all of Kivotos.'"
10131-CVGroup_UIEventLobby_Idle3-7 = "Heh. You understand, don't you? I'm glad we're on the same page."
10131-CVGroup_UIEventLobby_Idle4-1 = "Deepening one's insight means broadening one's perspective of the world."
10131-CVGroup_UIEventLobby_Idle4-2 = "It is also a way to expand one's own world."
10131-CVGroup_UIEventLobby_Idle4-3 = "But... while thinking about that,"
10131-CVGroup_UIEventLobby_Idle4-4 = "I suddenly became curious."
10131-CVGroup_UIEventLobby_Idle4-5 = "What kind of world is it,"
10131-CVGroup_UIEventLobby_Idle4-6 = "that you see, Sensei...?"
10131-CVGroup_UIEventMission_Enter1-1 = "Even if I am in Trinity, I must not neglect my daily routine."
10131-CVGroup_UIEventMission_Enter1-2 = "...If I were to act as I pleased,"
10131-CVGroup_UIEventMission_Enter1-3 = "I would end up just like my department head."
10131-CVGroup_UIEventMission_Enter2-1 = "I have prepared a checklist."
10131-CVGroup_UIEventMission_Enter2-2 = "It is nothing special, but..."
10131-CVGroup_UIEventMission_Enter2-3 = "It is much the same as planning the structure of a critique."
10131-CVGroup_UIEventMission_Idle1-1 = "A story is nothing more than a collection of small chapters."
10131-CVGroup_UIEventMission_Idle1-2 = "During the writing process,"
10131-CVGroup_UIEventMission_Idle1-3 = "it is not always created in the order of the story."
10131-CVGroup_UIEventMission_Idle1-4 = "But, in the sense that it eventually takes shape,"
10131-CVGroup_UIEventMission_Idle1-5 = "and is expressed—"
10131-CVGroup_UIEventMission_Idle1-6 = "perhaps it is similar to steadily completing these tasks."
10131-CVGroup_UIEventMission_Idle2-1 = "Repetitive things are often taken lightly."
10131-CVGroup_UIEventMission_Idle2-2 = "Because they are boring, perhaps...?"
10131-CVGroup_UIEventMission_Idle2-3 = "If you neglect the small steps,"
10131-CVGroup_UIEventMission_Idle2-4 = "you will eventually be tripped up."
10131-CVGroup_UIEventMission_Idle2-5 = "That's a gentle scolding, isn't it...?"
10131-CVGroup_UIEventMission_Idle2-6 = "Y-yes... I am aware that I sound preachy."
10131-CVGroup_UIEventMission_Idle2-7 = "Critics are, after all, just nitpickers who poke at the corners of a box."
10131-CVGroup_UIEventMission_Buy1-1 = "5 out of 5 stars!\nSplendid!"
10131-CVGroup_UIEventMission_Buy2-1 = "For those who have faithfully completed their tasks,"
10131-CVGroup_UIEventMission_Buy2-2 = "a reward is only appropriate."
10131-CVGroup_UIEventMission_Buy2-3 = "Here, please take this. It's from my own pocket money. Heh."
10131-CVGroup_UIEventMission_Interaction1-1 = "That concludes today's work, then."
10131-CVGroup_UIEventMission_Interaction1-2 = "I look forward to tomorrow as well."