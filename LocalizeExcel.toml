1481260199 = "Even after the Seven Prisoners escaped, daily life at the Valkyrie Correctional Bureau remains unchanged. Surrounded by problem children, what kind of day does Correctional Director Misuzu spend?"
3396691709 = "The Melancholy of Kanbara Misuzu"
3863919003 = "Even after the Seven Prisoners escaped, daily life at the Valkyrie Correctional Bureau remains unchanged. Surrounded by problem children, what kind of day does Correctional Director Misuzu spend?"
589244848 = "The Melancholy of Kanbara Misuzu (1)"
2929286962 = "The Melancholy of Kanbara Misuzu (2)"
3812863199 = "Good Luck Charm"
3890514637 = "When Sensei visits a site after being called by Asuna, a fierce battle is unfolding. Though Asuna suppresses the situation effortlessly, she realizes she has lost her cherished ribbon. Showing the blue ribbon she fortunately found, Asuna explains it is a symbol of good luck for her. With a smile, she vows to take better care of it so she never loses it again."
1771630708 = "Claymore, Claymore, Claymore!"
279334293 = "Moe and Sensei talk about their recent lack of exercise. With a determined smile, Moe pulls out... a launcher?"
1489758999 = "A Warm Melody"
3457523314 = "Sensei takes Kazusa to an audio room because she says there's an LP she wants to hear. What Kazusa pulls out is a one-of-a-kind LP made as a keepsake. While they chat over the music of Sugar Rush, the song changes and Sensei's singing voice begins to play. It was from when the two of them went to karaoke together. For Kazusa, it is a precious memory she wants to keep."
11208201 = "A Sign of Hard Work?"
2323993205 = "Kirara, having lost her ring notebook, was frantically rummaging through a scrap paper warehouse. Apparently, something she had set aside while cleaning her room was mistakenly collected. The notebook Sensei finds is beautifully decorated and filled with Kirara's precious memories. When Sensei points out a portrait on a page that caught his eye, Kirara grabs the notebook and runs away."
868253551 = "What is a Maid Robot?"
773887947 = "Rio modifies Avant-Garde-kun to do housework. When Rio suggests mass-producing them, Sensei argues that 'Maid Robots are better.' Rio suggests that putting a maid outfit on them makes them maid robots, and despite Sensei's counter-arguments, she wins the debate with a syllogism."
2264036531 = "Soliloquy"
2513546491 = "After finishing work in their room, Sensei hears Rio's meaningful voice inside the transport ship. Peeking in to see what's happening, Sensei finds Rio wearing an HMD and talking. She explains she was upgrading the transport ship. Once the misunderstanding that she was talking to someone in virtual space is cleared, she talks about the avatar she's using."
2142602582 = "Thought Experiment"
3668229248 = "During AMAS maintenance, Rio confesses she used to believe AI had no ego. However, that view changed after meeting Aris. She then asks Sensei to join her in a thought experiment, quietly sharing a moment alone."
1608494230 = "Unexpected Variable"
2718709279 = "Rio adds a heating function to her suit and asks Sensei to test it. While the function works fine, the room gets too warm, and Rio quietly unzips the front of her suit."
3220881707 = "Stress Relief"
2066240305 = "Kei is getting used to her new body. However, she's troubled by how she should relieve stress. Mumbling that she doesn't have complaints about this body, she makes a small request for a ribbon to tie her hair."
1827657751 = "Welcome To Kivotos"
544438161 = "Sensei visits Kei's class observation. In class, Kei displays knowledge surpassing the instructor. When Kei worries if a student with all-encompassing knowledge needs to attend school, Sensei replies that classes aren't the only way to learn. Being told that interacting with people is also important, Kei decides to think it over for a bit."
3726540946 = "Quest"
2715974409 = "A MomoTalk message from Kei arrives asking for help. Rushing there, Sensei finds Kei being doted on by Millennium students. Accepted as Aris's twin sister, Kei begins to adjust to school life, despite some confusion."
1521323340 = "Out Of Control"
1338830859 = "Kei sends a disgruntled MomoTalk saying 'There are too many bugs.' Heading to the Game Development clubroom, Sensei finds Kei debugging an alpha version of the club's new game. The two work together to debug the alpha version while trying to incorporate Momoi and the others' ideas."
2007896298 = "Regarding the Living Environment"
3837031192 = "When Sensei visits the Game Development Department, they find Kei cleaning. Complaining about the members' lack of cleaning skills, she frets about the influence they might have on Aris. When she asks Sensei if they clean properly, Sensei is at a loss for words."
2197644324 = "Flowing Twilight"
2760439479 = "Kei visits Schale on duty. While grumbling about Sensei's heavy workload, she offers to help with tomorrow's duties too. Sensei proposes going shopping as thanks. However, Sensei's eyes get blurry from fatigue. Kei gently tells Sensei not to push themselves too hard."
1595074934 = "Hero Training"
405265064 = "Aris is delighted to have obtained new equipment. However, she realizes she can't master it as she is, so she begins training. During the training, Aris twists her ankle, and Sensei carries her home on their back."
1206023533 = "The Starting Town"
53651717 = "When Aris asks to train again, Sensei says they've prepared secret training. It involves playing games while wearing her armor. After playing 'Tales Saga Chronicle' and other games, Aris is delighted with the training's effect, saying she no longer gets nervous even while armored."
1220509438 = "The Meaning of Difference"
940994582 = "Aris's hero armor, Abi-Eshuh, which has undergone numerous modifications, begins to experience trouble. Worn down by repeated battles, Abi-Eshuh has reached a stage where it might not be fixable next time. Aris wishes for Abi-Eshuh to be loved just as much as the Sword of Light."
1247641963 = "When Magic Begins"
830455537 = "Sensei gets a message from Aris late at night. Following Aris's suggestion to look out the window, Sensei sees a beautiful night sky. Aris says she wanted to share this view. Sensei and Aris enjoy a peaceful moment together."
2829727388 = "The Hero Returns?"
3540463318 = "Sensei is surprised when Aris appears wearing the supposedly broken Abi-Eshuh. She explains she had a replica made from its fragments. Though its performance is lower than before, Aris laughs, saying this appearance is valuable simply because it makes so many people happy."
640504906 = "Life Staff (1)"
1047587791 = "Himari declares she will act as Sensei's 'Life Staff' and begins providing support after modifying part of AMAS. Himari laughs, saying no one else could provide such meticulous support."
544066948 = "Rules and Concepts"
1970386051 = "Sensei ends up watching Himari maintain her 'wheelchair.' When Sensei says it still looks like a motorcycle, Himari tries to explain the difference between a wheelchair and a motorcycle."
2839455324 = "Under the Same Starry Sky"
3945440914 = "Himari and Sensei go for a night drive in the newly maintained 'wheelchair.' Speeding under the night sky, the two share a secret moment together."
53718002 = "Life Staff (2)"
1960948734 = "Himari oversleeps and gets depressed, saying she failed as a Life Staff. However, when Sensei tells her it's okay to lean on them, she asks to be pampered for the rest of the day and makes various requests."
4237772262 = "The Perfect Maid"
1658156830 = "Sensei is surprised by Toki's perfect support. She explains that she hadn't intervened much before because Sensei was managing fine on their own. However, since it's now an 'emergency,' she's acting as a perfect maid beyond her usual duties. To make her assistance perfect, Toki proposes 24-hour close protection."
1805231996 = "Hobbies (Tentative)"
3531035594 = "Returning from a reconnaissance mission, Toki reports being healed by mechanical animals. Afterward, she talks passionately about her recent interests in streaming culture and game let's-plays, sharing a peaceful time with Sensei. As the conversation shifts to hobbies and growth... Toki falls asleep by Sensei's side before they know it."
1208888951 = "Upgrade"
364125731 = "Toki contacts Sensei saying she's been 'upgraded.' She explains she has a new weapon. Enthusiastically describing the dual energy pistols as the best combination, Toki mentions she wants to modify her ArmGear to fire like energy rockets. When Sensei stops her, saying it's dangerous, Toki pouts. In the end, Sensei has to gently soothe her."
3590033319 = "Memories of Sunrise"
3047442248 = "After finishing a dawn reconnaissance mission, Toki calls Sensei to see a view she wants to show them. It's a beautiful sunrise. Watching the view, Toki asks if Sensei could be the 'last' person remaining if the 'final' moment came now. As the sunrise ends and they return to daily life, Toki declares once more that 'I am by Sensei's side.'"
1508081542 = "Locker Phobia"
121840633 = "Traumatized by emergency ejections from transport ship pods and cockpits, Yuzu says she can no longer feel calm even inside a locker. To reclaim her peaceful place, she enters a locker with Sensei to overcome her fear."
566993182 = "UZQueen's Slump"
4132271700 = "Yuzu is struggling with a VR game where she has to move her own body. Sensei helps by giving Yuzu a shoulder ride to divide the roles, and they climb the rankings together."
1591579143 = "Game Tournament"
1792195982 = "A highly popular, hard-to-find game is the prize for a tournament winner. Since the match is decided by a VR game that Yuzu is bad at, she plays co-op with Sensei. They brilliantly win and obtain the long-awaited new game."
2902368979 = "The Savior of the World and the Gamer"
823660841 = "Yuzu gradually gets used to the VR game she was bad at. She invites Sensei to a world she cleared alone to see the ending. Conversing about how games are also reality, the two spend a peaceful time inside the VR game."
351853014 = "Efficiency and Inefficiency"
2129235531 = "Triggered by her waking him up in the morning, Sensei accompanies Eimi on her 'walk.' While occasionally fighting enemies, the two exchange words about the events on the Steel Continent. Eimi tells Sensei that her way of thinking is changing."
2767044483 = "What is Given"
328091725 = "A polar night. While accompanying Eimi on patrol, Sensei's body gets cold. Eimi snuggles up to Sensei, calling it 'thermal equilibrium.' Explaining it as mutual influence to match temperatures, Eimi once again feels herself changing."
3643082009 = "Interference"
1339460084 = "Receiving a tense message from Eimi, Sensei rushes to her. Though they regroup without issue, Eimi apologizes for worrying Sensei. While aware of her own risk-taking nature, she asks Sensei to keep watching over her."
3089168655 = "Cocoa with You"
4100335731 = "Guided by Eimi, the two look up at the stars together on the roof of the transport ship. While drinking cocoa, Eimi tells Sensei her own answer regarding her changes. At the very least, Eimi is no longer alone, sharing her body heat with another under the starry sky."
2003795896 = "The Three Sacred Treasures"
3170475194 = "Rei made chocolates by molding her own gloves. She gives those along with chocolates shaped like a bat and ball to Sensei, and they have a lively baseball discussion while eating the 'Three Sacred Treasures' of baseball."
3449104670 = "Girl and Snacks"
1885555336 = "Hikari bought a new type of chocolate for Sensei. When Sensei is about to eat it, Hikari looks like she wants some too, so they share it together."
359030032 = "An Unexpected Present"
2185724888 = "Nozomi brought jelly for Sensei, who must be tired from work. When Nozomi and Hikari try to leave after handing it over, Sensei stops them and suggests playing together. After playing with all their might, the two help Sensei finish their work."
2821415725 = "I hate cheap chocolate"
3930966594 = "Aoba, who had been busy every day, couldn't find time to prepare and gave Sensei cheap chocolates. When Aoba tries to leave immediately, Sensei suggests she rest first and offers the sofa. Aoba heals her daily fatigue."
749178746 = "Cold Fingertips are"
3102107895 = "Nagusa gives Sensei some Hyakkiyako-limited chocolate cookies. Sensei tries them immediately, but they melt easily and get Sensei's hands dirty. Realizing that doesn't happen to her, Nagusa reflects on her own low body temperature. From then on, Nagusa feeds them to Sensei."
1761460889 = "The Girl Without Opening the Box"
2121407183 = "Niya gives a chocolate that looks flashy on the outside but is very bitter. When Sensei asks if it was a prank, Niya replies that there might be students who misunderstand based on surface appearances and have bitter experiences. While showing understanding, Sensei makes Niya eat the chocolate too."
3850859909 = "Mana Charge for Master"
905988701 = "Eri takes off her hat, saying she wants to show her resolve. Furthermore, she proposes doing an 'ahhh.' After being fed several pieces, Sensei then returns the favor to Eri. The two spend time supplying mana to each other."
3059797050 = "Until the Time You Remember"
3217050285 = "Kanoe prepared chocolate muffins filled with love. She hopes that eating them will help Sensei regain their memory. The muffins were delicious, but they had no effect. However, Kanoe doesn't seem depressed, leaving behind her 'Ihihi' laugh."
3389252788 = "Tiramisu on Hold"
3138201970 = "Sensei accepts an invitation and heads to Miyu's dorm. Miyu was still in the middle of making tiramisu, an unfamiliar task for her. Although it's finished after a short chat, they realize it tastes better if chilled for two hours. The two wait for the time to pass while talking."
2750803807 = "It's Sweet and Hard"
2839633723 = "Fuyu's present was a Gobstopper. She says she wants Sensei to think of her for as long as they're licking it, then leaves gallantly. Afterward, Fuyu squirms in embarrassment alone, reflecting on her own words."
2958867371 = "Mine!"
1371353270 = "When Sensei returns to Schale, the 'absolutely unmeltable chocolate' from Ritsu is sitting there. It's made of brown marble, and Sensei spends time listening to Ritsu's stories about sculpture."
3192072615 = "I have to go to the Love Museum!"
346158900 = "Surprised by Sensei appearing after sensing her presence, Love starts looking for the chocolate she prepared. Unable to find it, they end up sharing Love's half-eaten one. However, before Sensei can finish the chocolate, they get a call and have to head back."
3974083935 = "Chocolate Meringue Cookies"
3194591599 = "Subaru is indignant at the extravagance of making sweets. Nevertheless, by managing the ingredients, Subaru gives Sensei some homemade meringue cookies. The two eat them together and share a peaceful time."
977917830 = "The Critic's Chocolate Cake"
2491918438 = "Takane gives a critique of the holiday called Valentine's Day. She says that Kartoshka, which uses molasses—a byproduct of sugar making—is like Sensei, who finds all sorts of possibilities in students. Feeling a bit shy, Sensei eats the homemade Kartoshka with her."
3538379831 = "Chocolate Medovik"
2672738749 = "Yakumo suddenly brings up the 'Three Principles of Negotiation' and hands Sensei a Medovik, saying it's 'handmade.' However, it wasn't 'Yakumo's' handmade work, but one made by a shop craftsman. Realizing Yakumo was trying to please them in her own way, Sensei invites her for tea."
573696648 = "Perfect Plan (Tentative)"
4069694705 = "Kei hands Sensei some chocolate, saying she found it on the way. However, Sensei immediately sees through her and knows it's handmade. When Sensei eats one, it turns out Kei had mistaken salt for sugar. Watching Kei's expressions change rapidly, the two eat the chocolates Sensei was secretly carrying."
2291967865 = "Steel Continent Conquest War"
140464825 = "The time has finally come to begin the conquest of the Steel Continent mainland. Sensei and the others, Ein, Sof, Aur—and the Prophets of Decagrammaton. Their respective feelings collide."
