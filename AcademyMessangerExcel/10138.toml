[translation]
10138-101380010 = "Sensei, you said you were coming to the academy today, right?"
10138-101380020 = "Yeah, I've been asked to do a little investigation."
10138-101380030 = "That's perfect."
10138-101380040 = "Could you pick up some accessory materials for me?"
10138-101380050 = "The shop here doesn't have the right ones."
10138-101380060 = "……Is this a request for smuggling?"
10138-101380070 = "No way!"
10138-101380080 = "They aren't regulated items or anything!"
10138-101380090 = "They won't get flagged at the checkpoint!"
10138-101380100 = "I'll send you the list."
10138-101380110 = "Please do this while you're on your way here!"
10138-101380120 = "Sensei, did you make it home okay?"
10138-101380130 = "You didn't get torn up again, did you?"
10138-101380140 = "I'm fine! No problems here!"
10138-101380150 = "Hehe. You owe me one for this."
10138-101380160 = "Make sure you pay me back properly later, okay?"
10138-101380170 = "I'm glad it was Rena who found me!"
10138-101380180 = "Well, I wasn't glad about it at all!?"
10138-101380190 = "Oh well. I'm just glad you made it back safely."
10138-101380200 = "I'll contact you again."
10138-101380210 = "You haven't forgotten about the other day, have you?"
10138-101380220 = "The chance to pay me back has arrived."
10138-101380230 = "What do you need me to do?"
10138-101380240 = "It's kind of hard to explain in a message."
10138-101380250 = "Can you just come over for now?"
10138-101380260 = "At that time, at that place."
10138-101380270 = "Sensei... what should I do?"
10138-101380280 = "What's wrong?"
10138-101380290 = "I showed the seniors..."
10138-101380300 = "that photo we talked about."
10138-101380310 = "And Sensei's arm..."
10138-101380320 = "was faintly visible in the photo."
10138-101380330 = "It was there, wasn't it?"
10138-101380340 = "Was that a bad thing...?"
10138-101380350 = "I couldn't exactly say I went with you, could I?"
10138-101380360 = "So, I told them that was the true form of the ghost."
10138-101380370 = "With my own mouth..."
10138-101380380 = "Screech!!!"
10138-101380390 = "That there was a ghost..."
10138-101380400 = "I!!! I said it with my own mouth!"
10138-101380410 = "And then the seniors..."
10138-101380420 = "made a huge fuss, saying this was the seventh mystery!!!!"
10138-101380430 = "Ahhhhhhh!! Seriously!!!!!!"
10138-101380440 = "Just you wait!!!!"
10138-101380450 = "Next time, for sure...!!!!!"
10138-101380460 = "Let's do our best together..."
10138-101380470 = "Do you remember the other day?"
10138-101380480 = "The time Sensei's arm was in the photo,"
10138-101380490 = "and I told the seniors"
10138-101380500 = "that it was a ghost."
10138-101380510 = "I remember. I'm sorry..."
10138-101380520 = "Why are you apologizing, Sensei?"
10138-101380530 = "It's my fault for not noticing you were in the shot."
10138-101380540 = "So..."
10138-101380550 = "The seniors told me"
10138-101380560 = "that I should make an amulet."
10138-101380570 = "So, while I'm making one for myself,"
10138-101380580 = "I thought I'd make one for you too."
10138-101380590 = "Rena... is making an amulet?"
10138-101380600 = "Wow."
10138-101380610 = "Don't repeat it back to me!"
10138-101380620 = "I think it's ridiculous too, you know!"
10138-101380630 = "Anyway, come by when you're free."
10138-101380640 = "Alright, I'll head over now!"
10138-101380650 = "Sensei, how have you been since then?"
10138-101380660 = "Nothing weird has happened, right?"
10138-101380670 = "Like stepping in gum or something?"
10138-101380680 = "I'm doing just fine thanks to Rena's amulet!"
10138-101380690 = "It's not like I believe in amulets or anything, but..."
10138-101380700 = "Keep wearing it all the time."
10138-101380710 = "Since it's something I gave you."
10138-101380720 = "Got it?"
10138-101380730 = "Yeah! Because it's something filled with Rena's feelings."
10138-101380740 = "There you go saying things like that again."
10138-101380750 = "Well then, see you later."
10138-101380760 = "Sensei, you're coming to Wild Hunt today, right?"
10138-101380770 = "That's right. Should I buy you a chocolate banana crepe?"
10138-101380780 = "I don't need one!"
10138-101380790 = "Actually, I have a favor to ask."
10138-101380800 = "I need you to buy some accessory materials."
10138-101380810 = "The shop was hit by terrorism."
10138-101380820 = "Terrorism!?"
10138-101380830 = "Someone drew some weird pictures"
10138-101380840 = "on the shop's walls..."
10138-101380850 = "They're closed until they can get it all off."
10138-101380860 = "Sigh..."
10138-101380870 = "So that's the situation, I'm counting on you."
10138-101380880 = "I'll buy that chocolate banana crepe anyway!"
10138-101380890 = "Do whatever you want!?"