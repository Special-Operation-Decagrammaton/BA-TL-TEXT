[translation]
10130-101300010 = "This number..."
10130-101300020 = "Is it yours, Sensei?"
10130-101300030 = "I just wanted to confirm."
10130-101300040 = "Yes, it is. No worries."
10130-101300050 = "That's good to hear."
10130-101300060 = "I'm reporting on my recent status."
10130-101300070 = "A lot has happened,"
10130-101300080 = "and I've been assigned to patrol Arius."
10130-101300090 = "A patrol?"
10130-101300100 = "Yes."
10130-101300110 = "Just wanted to let you know quickly."
10130-101300120 = "I see."
10130-101300130 = "Then, let's go right away—"
10130-101300140 = "We have to go to Arius!"
10130-101300150 = "Huh?"
10130-101300160 = "Why would you say that?"
10130-101300170 = "Good morning, Sensei."
10130-101300180 = "It's Subaru's turn on duty today!"
10130-101300190 = "That's right."
10130-101300200 = "Regarding the work at Schale,"
10130-101300210 = "I've done some research beforehand."
10130-101300220 = "I'm ready."
10130-101300230 = "Are you a little nervous?"
10130-101300240 = "No."
10130-101300250 = "Not at all."
10130-101300260 = "There's no reason for me to be nervous."
10130-101300270 = "Are you underestimating me?"
10130-101300280 = "I see."
10130-101300290 = "I'll just pretend that's the case!"
10130-101300300 = "Sensei...?"
10130-101300310 = "It's a matter of school policy, I suppose..."
10130-101300320 = "I've started working a part-time job."
10130-101300330 = "Subaru is working part-time!!?"
10130-101300340 = "You're overreacting!"
10130-101300350 = "It's embarrassing, so please stop!"
10130-101300360 = "I only did what was expected, yet I received extra compensation."
10130-101300370 = "I don't really understand the outside world..."
10130-101300380 = "Well, there aren't many kids who can do what you do..."
10130-101300390 = "...So, does the world actually function properly like that?"
10130-101300400 = "...Yeah, surprisingly."
10130-101300410 = "I... I understand it even less now..."
10130-101300420 = "Hello, Sensei."
10130-101300430 = "It's a holiday today, how are you spending it?"
10130-101300440 = "I managed to finish my work yesterday, so..."
10130-101300450 = "I can finally rest today..."
10130-101300460 = "So adults can't rest until they finish their work..."
10130-101300470 = "That's tough... maybe I should become a child again."
10130-101300480 = "Subaru-senpai, give me a snack."
10130-101300490 = "What are you saying!? Honestly..."
10130-101300500 = "As for me,"
10130-101300510 = "Thanks to the pay from my part-time job,"
10130-101300520 = "I have a little extra money,"
10130-101300530 = "But I don't know what to spend it on."
10130-101300540 = "Is there anything you want to do or anything you want?"
10130-101300550 = "Huh?"
10130-101300560 = "Ah..."
10130-101300570 = "Hmm..."
10130-101300580 = "Hmm..."
10130-101300590 = "It's not that"
10130-101300600 = "I don't have anything,"
10130-101300610 = "But perhaps because I was out in the wind for a while,"
10130-101300620 = "I feel like I've caught a chill."
10130-101300630 = "You'll have to take responsibility, Sensei."
10130-101300640 = "How should I take responsibility!?"
10130-101300650 = "I'm joking."
10130-101300660 = "Instead,"
10130-101300670 = "Please accompany me shopping again."
10130-101300680 = "I'll practice a different song by then."
10130-101300690 = "Hello, Sensei."
10130-101300700 = "I'm on patrol, but I thought I'd reach out."
10130-101300710 = "Working hard again today?"
10130-101300720 = "It's important work."
10130-101300730 = "I have to look after"
10130-101300740 = "My juniors, after all."
10130-101300750 = "What about yourself, Subaru?"
10130-101300760 = "Huh?"
10130-101300770 = "I haven't really thought about that."
10130-101300780 = "I thought about it a little bit, though..."
10130-101300790 = "I wonder if I can play heavy metal on a harmonica."
10130-101300800 = "Well, as a teacher,"
10130-101300810 = "I'd like to say nothing is impossible, but..."
10130-101300820 = "I see."
10130-101300830 = "If you say so, Sensei..."
10130-101300840 = "I'll definitely play heavy metal on the harmonica someday!"