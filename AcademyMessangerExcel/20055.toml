20055-200550040 = "But my body..."
20055-200550050 = "Yuzu can't fit into her locker...?"
20055-200550060 = "I'm heading over there right now!"
20055-200550070 = "Eh?"
20055-200550080 = "N-no, there's no need for you to come all the way here..."
20055-200550090 = "Uuu..."
