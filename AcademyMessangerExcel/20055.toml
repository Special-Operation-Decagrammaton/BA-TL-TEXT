20055-200550110 = "So games..."
20055-200550120 = "Were this difficult after all..."
20055-200550130 = "I can't believe Yuzu would say something like that..."
20055-200550140 = "I'm heading over there right now!"
20055-200550150 = "Eh?"
20055-200550160 = "W-wait, please!"
20055-200550170 = "I-I'm really okay, I promise!"
20055-200550180 = "The latest VR game console that was just released,"
20055-200550190 = "'Virtual Boss 4.0'..."
20055-200550200 = "Were you able to get one, Sensei...?"
20055-200550210 = "I couldn't get one either..."
20055-200550220 = "I couldn't even add it to my cart..."
