[translation]
10138-120 = "Sensei, over here."
10138-130 = "We're going to uncover\nthis fraud together."
10138-140 = "The charm Senpai gave me...\nWhere did I put it...?"
10138-150 = "I-I'm just looking for it because\nit was a gift, that's all!"
10138-160 = "Come on, I'm not giving up\nuntil the very end!"
10138-170 = "I'll prove that it's all\na bunch of lies!"
10138-180 = "Hiss! Fraud! Nonsense!\nBring it on!"
10138-190 = "I'm going to settle this\ntonight!"
10138-200 = "It was all pretty\nweird, but..."
10138-210 = "Well, it was fun, so\nI guess it's fine."
10138-220 = "Hmph, it's all just\na fraud anyway!"
10138-230 = "...P-probably, anyway."
10138-240 = "I-I suddenly feel\na chill..."
10138-250 = "I-It's just the wind,\nright...? Right?"
10138-260 = "Ugh, what's with this\nTsuchinoko nonsense?"
10138-270 = "It's just a lizard, right?"
10138-280 = "E-Eek!?"
10138-290 = "...Oh, it's just you, Sensei.\nDon't poke me so suddenly!"
10138-300 = "Ah, there's a mountain of\nsuspicious items here..."
10138-310 = "Maybe there's something useful.\nShould we take a look?"
10138-320 = "Sensei, do you know\nwhat this is?"
10138-330 = "There's all sorts of stuff here..."
10138-340 = "Well, looking back on it...\nMaybe it's a good memory. Hehe."
10138-350 = "T-This place is safe...\nright?"
10138-360 = "Ghosts aren't just going to\npop out, right...?"
10138-370 = "D-Don't just watch, help me!"
10138-380 = "Sorting through this alone is\nscary—I mean, a lot of work!?"
10138-390 = "Oh, this might be useful for something."
10138-400 = "Wait, you found that\nin the junk pile?"
10138-410 = "I really hope this\nactually comes in handy..."
10138-420 = "Here you go. I'm the one who\nwent and got it, so you'd better be grateful!"
10138-520 = "Hmm... Shall we check\nthe clues we've gathered?"
10138-530 = "Let's organize the events together."
10138-540 = "Hmph, it wasn't such a big deal\nafter all."
10138-550 = "Let's keep this up and\nkeep exposing everything!"
10138-560 = "I-I'm more scared of the\nsuspension bridge than ghosts..."
10138-570 = "Hiss! Stop playing around\nand focus on the investigation!"