[translation]
20055-10 = "Blue... *huff*...! Archive!"
20055-20 = "Millennium Science School... I'm Hanaoka Yuzu from the Game Development Department... I know I'm dressed like this, but... please, take care of me..."
20055-30 = "(A peaceful daily life... I truly understand how precious it is now.)"
20055-40 = "The sofa... it won't suddenly launch me, will it...?"
20055-50 = "It's warm and smells nice... I like it. Ehehe."
20055-60 = "I... don't want to go inside a locker for a while... ugh."
20055-70 = "Is this really... a bit too flashy...? Uuu..."
20055-80 = "Fueee...! T-this outfit is, um..."
20055-90 = "...W-welcome back, Sensei."
20055-100 = "I-I was waiting for you, Sensei...!"
20055-110 = "Time to sortie..."
20055-120 = "N-no, that's not it. Let's start our duties...!"
20055-130 = "This suit is more comfortable than I thought, but..."
20055-140 = "More than that... it's embarrassing..."
20055-150 = "The texture of the suit is kind of strange, isn't it? It feels like it could even deflect bullets."
20055-160 = "Even though it's supposed to cover my whole body... I feel kind of restless... ugh..."
20055-170 = "This suit... can even sync with a PC..."
20055-180 = "Will it be useful... when I'm on duty?"
20055-190 = "A-are you hot...?"
20055-200 = "T-this suit... the surface is cold and feels nice, you know...?"
20055-210 = "Happy birthday...!"
20055-220 = "U-um, as a birthday present..."
20055-230 = "I prepared a game for you..."
20055-240 = "W-what do you think...?"
20055-250 = "Th-thank you, Sensei..."
20055-260 = "For not forgetting about me..."
20055-270 = "A lot has happened, but a year has passed in the blink of an eye, hasn't it?"
20055-280 = "...Happy New Year, Sensei."
20055-290 = "I-it's not a Santa outfit, but... it is red... so, it's basically the same thing, right?"
20055-300 = "M-merry Christmas, Sensei!"
20055-310 = "Th-there are so many people wearing outfits more impressive than mine...!"
20055-320 = "Ah, n-no, it's not like I wanted to wear one too...!"
20055-340 = "Look, Sensei."
20055-350 = "This is the world I protected to the end."
20055-360 = "...Of course, I know."
20055-370 = "I'm not the only one who has seen this sight."
20055-380 = "During the tournament, you said something like this, didn't you?"
20055-390 = "That this moment right now, this game... is our reality."
20055-400 = "So, even if it's a world with a fixed ending..."
20055-410 = "Even if everyone in this world..."
20055-420 = "Follows the same scenario..."
20055-430 = "The choices I made, and these feelings..."
20055-440 = "Are undoubtedly real."
20055-2600 = "Practice like it's the real thing. And treat the real thing like a game...! I'll do my best...!"