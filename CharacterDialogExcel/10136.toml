[translation]
10136-10 = "Blue Archive."
10136-20 = "Under these circumstances... I suppose I should change, too. How is it, Sensei? Does it suit me?"
10136-30 = "Ugh... I'm running low on caffeine."
10136-40 = "I'd love to come here with just you next time, Sensei."
10136-50 = "A quick break over there..."
10136-60 = "This backpack... it feels kind of hot."
10136-70 = "It's so peaceful..."
10136-80 = "I saw you coming through my scope. Looking forward to working with you today, too."
10136-90 = "How's your hot coffee? Mine is iced, so make sure you don't mix them up."
10136-100 = "Am I not hot, you ask? Hmm, I wonder. I think I'm still okay."
10136-110 = "Well, even if it is hot, if I can be with you, Sensei..."
10136-120 = "I think I can endure it for as long as it takes."
10136-130 = "I wish you'd call me for duty more often."
10136-140 = "For the sake of my efficiency, of course."
10136-150 = "Hmm, it's not like my studies actually progress faster just because I'm at Schale, but..."
10136-160 = "I just want to be by your side, Sensei."
10136-170 = "Here you go, Sensei, it's done."
10136-180 = "Hehe, I finished it pretty quickly, didn't I?"
10136-190 = "I wonder if there's any other student as capable as me... What do you think, Sensei?"
10136-200 = "You always say things like, 'Think about how others feel when you talk to them,' right?"
10136-210 = "I used to think that was just inefficient."
10136-220 = "But now... I think I'm starting to understand why, just a little."
10136-230 = "Because I'm curious about how you feel, Sensei... and what you're thinking."
10136-240 = "You always tell me to get along with everyone..."
10136-250 = "But..."
10136-260 = "...Honestly, it's a bit of a hassle."
10136-270 = "As long as I have you, Sensei, that's enough for me."
10136-280 = "I haven't forgotten. Today is your birthday, right, Sensei?"
10136-290 = "I've already secured the perimeter, so—"
10136-300 = "Would you like to go out somewhere?"
10136-310 = "Just the two of us."
10136-320 = "Thank you for celebrating my birthday."
10136-330 = "Hmm? What do I want for a present?"
10136-340 = "It's fine, I've already received it."
10136-350 = "The gift of you, Sensei."
10136-360 = "New Year's..."
10136-370 = "Before, I would have just thought of it as one of the 365 days."
10136-380 = "But now, it might be a little different."
10136-390 = "Hehe, Happy New Year, Sensei."
10136-400 = "I like Christmas."
10136-410 = "Because it's cool out."
10136-420 = "Huh? There are Christmases that aren't cool...? I wouldn't like that at all."
10136-430 = "I used to think of Halloween as just a day to get calories as efficiently as possible, but..."
10136-440 = "I think I'll actually enjoy the festivities this time."
10136-450 = "Of course, I'll play pranks and get candy too. I don't plan on holding back."
10136-470 = "Welcome, Sensei."
10136-480 = "The sky looks so strange, doesn't it?"
10136-490 = "It looks similar to the night sky we know..."
10136-500 = "But if you look closely, it's completely different."
10136-510 = "It's just like me right now."
10136-520 = "I never really used to look up at the sky like this before, but..."
10136-530 = "Lately, I've come to like it."
10136-540 = "But I wonder why."
10136-550 = "Every time I look up, your face comes to mind, Sensei."
10136-560 = "Hehe, I wonder why that is."
10136-570 = "Sensei."
10136-580 = "I'm really glad I met you, Sensei."
10136-590 = "Yeah, really. That's what I truly think."
10136-2600 = "This is my first time using a weapon of this shape, but... for the sake of the mission, I'll master it quickly. ...And for your sake, too, Sensei."