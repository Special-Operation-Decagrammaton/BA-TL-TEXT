[translation]
20057-10 = "Blue Archive. Hehe."
20057-20 = "Millennium Science School, call sign zero-three, Murokasa Akane. I greet you as a student. Hehe, though I suppose I was a student to begin with, wasn't I?"
20057-30 = "I suppose we should prepare some cake for now."
20057-40 = "This place is strangely relaxing."
20057-50 = "I'd like to have that furniture in our clubroom, too."
20057-60 = "(It's been cleaned well, but... the attention to detail is lacking.)"
20057-70 = "(This much space... I wonder how much explosive material I'd need...)"
20057-80 = "Welcome back, Sensei. I have prepared for our 'lesson'."
20057-90 = "Which unit shall we cover in today's 'lesson'?"
20057-100 = "I look forward to your well-paced instruction."
20057-110 = "Should I call you Sensei, or Master?"
20057-120 = "I see... So you prefer Sensei."
20057-130 = "Understood, 'Sensei'."
20057-140 = "Interacting with you as a 'student'... It's a strange feeling."
20057-150 = "Though, of course, I am your student on a daily basis."
20057-160 = "There is an art to cleaning, you know."
20057-170 = "My tastes are a bit eccentric, though..."
20057-180 = "Hehe. That applies to both kinds of 'cleaning'. I'm quite the perfectionist."
20057-190 = "Would you consider becoming a full-time teacher at Millennium?"
20057-200 = "That way, I could attend your lessons every day..."
20057-210 = "'Millennium's Sensei'—I think that has a nice ring to it."
20057-220 = "I am often described as an 'honor student', but..."
20057-230 = "That isn't necessarily true on the inside."
20057-240 = "Everyone has something they keep hidden within."
20057-250 = "Therefore—"
20057-260 = "How about a little game of fire between teacher and student?"
20057-270 = "I'm just joking."
20057-280 = "Today is your birthday, isn't it, Sensei? Of course I remember."
20057-290 = "So... which version of me would you like to celebrate with?"
20057-300 = "The student? Or the maid?"
20057-310 = "Sensei, do you know what day it is today?"
20057-320 = "That's right, it's my birthday."
20057-330 = "And today, I've come to you as a 'student'."
20057-340 = "Even if I'm not allowed to as a 'maid', I thought it might be okay to be a little selfish..."
20057-350 = "So, as a gift... I would like your time, Sensei."
20057-360 = "Happy New Year, Sensei. I look forward to working with you again this year."
20057-370 = "I'm not here as a 'maid' today, after all."
20057-380 = "Let's skip the formal greetings... Shall we go to the shrine together?"
20057-390 = "It's Christmas, isn't it? Might I... expect a present?"
20057-400 = "Hehe, it's fine even if you haven't prepared one."
20057-410 = "Just having you by my side is enough."
20057-420 = "Halloween... a day overflowing with sweets and mischief..."
20057-430 = "So, I've baked some sweets for today."
20057-440 = "You'll eat them with me, won't you?"
20057-460 = "Hehe."
20057-470 = "It's more... embarrassing than I thought."
20057-480 = "Being honest with myself..."
20057-490 = "It's a feeling I'm not quite used to."
20057-500 = "Yes, as you say."
20057-510 = "I believe it was something I needed."
20057-520 = "I've caused you quite a bit of trouble, Sensei."
20057-530 = "Even so, I, who was able to meet you—"
20057-540 = "Yes, I truly think I was fortunate."
20057-550 = "Everything flows, and eventually, it will all be forgotten."
20057-560 = "Even this very moment, someday..."
20057-570 = "But, I will remember."
20057-580 = "Even if you were to forget, Sensei."
20057-590 = "Because the things that are truly important are never lost."
20057-2600 = "In Kivotos, a gun is a necessity. That doesn't change whether you're a maid or a student. Among the many guns out there... I will continue to hone my skills with this 'cleaning tool' I received from you."